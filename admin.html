<!DOCTYPE html>
<html>
<head>
<title>FAESP - Coordenação</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
  margin:0;
  font-family:'Segoe UI';
  background:#f5f5f7;
  display:flex;
  height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  background:#ffffff;
  padding:20px;
  border-right:1px solid #eee;
}

.logo{
  font-weight:bold;
  font-size:18px;
  margin-bottom:20px;
}

.menu button{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:none;
  background:#f1f1f1;
  border-radius:8px;
  cursor:pointer;
  text-align:left;
}

.menu button:hover{
  background:#e5e5e5;
}

/* CONTENT */
.content{
  flex:1;
  padding:30px;
}

.header{
  font-size:22px;
  font-weight:bold;
  margin-bottom:20px;
}

/* CARD STYLE (Netflix-like) */
.card{
  background:white;
  border-radius:12px;
  padding:20px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
  margin-bottom:20px;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  border-bottom:1px solid #eee;
  text-align:left;
}

/* INPUT */
input,select{
  width:100%;
  padding:8px;
  margin:5px 0;
}

/* BUTTON */
.btn{
  background:#2c5364;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:6px;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="sidebar">

<div class="logo">🎓 FAESP</div>

<div class="menu">
<button onclick="dashboard()">🏠 Dashboard</button>
<button onclick="alunos()">👤 Cadastros</button>
<button onclick="disciplinasMaster()">📚 Disciplinas</button>
<button onclick="notas()">📝 Notas</button>
<button onclick="frequencia()">📅 Presença</button>
<button onclick="avisos()">📢 Avisos</button>
<button onclick="financeiro()">💰 Financeiro</button>
</div>

</div>

<div class="content">

<div class="header">Coordenação</div>
<div id="conteudo"></div>

</div>
<script>

const client = supabase.createClient(
  "https://nzygdvixqmiltelgzzrn.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56eWdkdml4cW1pbHRlbGd6enJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDk5MjQsImV4cCI6MjA5MTY4NTkyNH0.wMaTGEgL_VCbSewnB-4BmdoA6rcGJWDsWIVaIo5dTy8"
);

const conteudo = document.getElementById("conteudo");

//////////////////////////////////////////////////
// DASHBOARD
//////////////////////////////////////////////////

async function dashboard(){

  const { data: usuarios } = await client.from("usuarios").select("*");

  const alunos = (usuarios||[]).filter(u=>u.tipo==="Aluno").length;
  const professores = (usuarios||[]).filter(u=>u.tipo==="Professor").length;

  conteudo.innerHTML = `
  <div class="card">
    <h3>📊 Dashboard</h3>
    <p>Alunos: ${alunos}</p>
    <p>Professores: ${professores}</p>
  </div>
  `;
}

//////////////////////////////////////////////////
// CADASTROS
//////////////////////////////////////////////////

async function alunos(){

  const { data } = await client.from("usuarios").select("*");

  let html = `
  <div class="card">
  <h3>Cadastros</h3>

  <input id="nome" placeholder="Nome">
  <input id="email" placeholder="Email">

  <select id="tipo">
    <option value="Aluno">Aluno</option>
    <option value="Professor">Professor</option>
  </select>

  <button class="btn" onclick="cadastrar()">Salvar</button>

  <table>
  <tr><th>Nome</th><th>Email</th><th>Tipo</th></tr>
  `;

  (data||[]).forEach(u=>{
    html+=`
    <tr>
    <td>${u.nome}</td>
    <td>${u.email}</td>
    <td>${u.tipo}</td>
    </tr>
    `;
  });

  html+="</table></div>";

  conteudo.innerHTML = html;
}

async function cadastrar(){
  await client.from("usuarios").insert([{
    nome: nome.value,
    email: email.value,
    tipo: tipo.value
  }]);

  alunos();
}

//////////////////////////////////////////////////
// DISCIPLINAS
//////////////////////////////////////////////////

async function disciplinasMaster(){

  conteudo.innerHTML = `
  <div class="card">
  <h3>Disciplinas</h3>

  <input id="disciplina" placeholder="Nome">

  <button class="btn" onclick="salvarDisciplina()">Salvar</button>

  <div id="lista"></div>
  </div>
  `;

  carregarDisc();
}

async function carregarDisc(){

  const { data } = await client.from("disciplinas_master").select("*");

  let html = "<ul>";

  (data||[]).forEach(d=>{
    html+=`<li>${d.nome}</li>`;
  });

  html+="</ul>";

  document.getElementById("lista").innerHTML = html;
}

async function salvarDisciplina(){
  await client.from("disciplinas_master").insert([{
    nome: disciplina.value
  }]);

  carregarDisc();
}
  //////////////////////////////////////////////////
// NOTAS
//////////////////////////////////////////////////

function notas(){
  conteudo.innerHTML = `<div class="card">Notas em breve</div>`;
}

//////////////////////////////////////////////////
// PRESENÇA
//////////////////////////////////////////////////

function frequencia(){
  conteudo.innerHTML = `<div class="card">Presença em breve</div>`;
}

//////////////////////////////////////////////////
// AVISOS
//////////////////////////////////////////////////

function avisos(){
  conteudo.innerHTML = `<div class="card">Avisos em breve</div>`;
}

//////////////////////////////////////////////////
// FINANCEIRO + PDF
//////////////////////////////////////////////////

function financeiro(){

  conteudo.innerHTML = `
  <div class="card">
  <h3>Financeiro</h3>

  <input id="valor" placeholder="Valor">

  <button class="btn" onclick="gerarPDF()">Gerar PDF</button>
  </div>
  `;
}

function gerarPDF(){

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.text("FAESP",20,20);
  doc.text("Valor: " + valor.value,20,40);

  doc.save("recibo.pdf");
}

//////////////////////////////////////////////////
// INIT
//////////////////////////////////////////////////

dashboard();

</script>
</body>
</html>
