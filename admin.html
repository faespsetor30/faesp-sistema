<!DOCTYPE html>
<html>
<head>
  <title>FAESP - Coordenação</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; background: #eef2f7; flex-direction: column; }
    .main { display: flex; flex: 1; }

    .sidebar {
      width: 240px; background: white; padding: 20px;
      display: flex; flex-direction: column; justify-content: space-between;
      border-right: 1px solid #ddd; align-items: center;
    }

    .logo { width: 120px; margin-bottom: 10px; }
    .menu button {
      width: 100%; padding: 12px; margin-bottom: 10px;
      border: none; background: #f1f5f9; border-radius: 10px;
      cursor: pointer;
    }

    .menu button:hover { background: #e2e8f0; }

    .logout {
      background: black; color: white; font-weight: bold;
      padding: 12px; border-radius: 10px; border: none;
      width: 100%;
    }

    .content { flex: 1; padding: 25px; }

    .header, .box {
      background: white; padding: 20px; border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    table { width:100%; border-collapse: collapse; margin-top:10px; }

    th, td {
      padding:10px;
      border-bottom:1px solid #ddd;
      text-align:center;
    }

    .btn {
      background:#2c5364; color:white; border:none;
      padding:6px 10px; border-radius:6px;
    }

    input, select {
      padding:8px; margin-top:5px; width:100%;
    }
  </style>
</head>

<body>

<div class="main">

  <div class="sidebar">
    <div style="width:100%; text-align:center;">
      <img src="logo faesp.png" class="logo">
      <h3>👑 COORDENAÇÃO</h3>

      <div class="menu">
        <button onclick="alunos()">📋 Cadastros</button>
        <button onclick="disciplinasMaster()">📚 Disciplinas (Curso)</button>
      </div>
    </div>

    <button class="logout" onclick="sair()">🚪 Sair</button>
  </div>

  <div class="content">
    <div class="header">
      <h2>FAESP - SETOR 30</h2>
    </div>

    <div class="box" id="conteudo"></div>
  </div>

</div>

<script>

// 🔐 PROTEÇÃO
const usuario = JSON.parse(localStorage.getItem("usuario"));
if (!usuario || usuario.tipo !== "Coordenacao") {
  window.location.href = "index.html";
}

// SUPABASE
const client = supabase.createClient(
  "https://nzygdvixqmiltelgzzrn.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56eWdkdml4cW1pbHRlbGd6enJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDk5MjQsImV4cCI6MjA5MTY4NTkyNH0.wMaTGEgL_VCbSewnB-4BmdoA6rcGJWDsWIVaIo5dTy8"
);

// LOGOUT
function sair() {
  localStorage.removeItem("usuario");
  window.location.href = "index.html";
}

// 👤 CADASTRO (CURSO PADRONIZADO)
async function alunos() {

  const { data } = await client.from("usuarios").select("*");

  let html = `
    <h3>📋 Cadastros</h3>

    <div>
      <input id="nome" placeholder="Nome">
      <input id="email" placeholder="Email">

      <select id="curso">
        <option value="Curso Básico">Curso Básico</option>
        <option value="Curso Médio">Curso Médio</option>
      </select>

      <br><br>
      <button class="btn" onclick="cadastrarUsuario()">Cadastrar</button>
    </div>

    <table>
      <tr><th>Nome</th><th>Curso</th></tr>
  `;

  data.forEach(u => {
    html += `<tr><td>${u.nome}</td><td>${u.curso}</td></tr>`;
  });

  html += "</table>";

  document.getElementById("conteudo").innerHTML = html;
}

// SALVAR USUÁRIO
async function cadastrarUsuario() {
  await client.from("usuarios").insert([{
    nome: document.getElementById("nome").value,
    email: document.getElementById("email").value,
    curso: document.getElementById("curso").value,
    status: "pendente"
  }]);

  alert("Cadastrado!");
  alunos();
}

// 📚 DISCIPLINAS MASTER (CORRIGIDO)
async function disciplinasMaster() {

  const { data } = await client.from("disciplinas_master").select("*");

  let html = `
    <h3>📚 Disciplinas por Curso</h3>

    <select id="cursoMaster">
      <option value="Curso Básico">Curso Básico</option>
      <option value="Curso Médio">Curso Médio</option>
    </select>

    <input id="nomeDisciplina" placeholder="Nome da disciplina">

    <button class="btn" onclick="salvarDisciplinaMaster()">Cadastrar</button>

    <table>
      <tr><th>Curso</th><th>Disciplina</th></tr>
  `;

  data.forEach(d => {
    html += `<tr><td>${d.curso}</td><td>${d.nome}</td></tr>`;
  });

  html += "</table>";

  document.getElementById("conteudo").innerHTML = html;
}

// SALVAR DISCIPLINA (CORRIGIDO)
async function salvarDisciplinaMaster() {

  const curso = document.getElementById("cursoMaster").value;
  const nome = document.getElementById("nomeDisciplina").value.trim();

  if (!nome) return alert("Digite o nome");

  await client.from("disciplinas_master").insert([
    { curso, nome }
  ]);

  alert("Salvo!");
  disciplinasMaster();
}

</script>

</body>
</html>
