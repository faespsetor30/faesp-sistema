</div>

// proteção simples
const usuario = JSON.parse(localStorage.getItem("usuario"));

function sair(){

//////////////////////////////////////////////////
// 👤 CADASTROS (CORRIGIDO)
//////////////////////////////////////////////////
async function alunos(){
  const { data } = await client.from("usuarios").select("*");

  let html = `
    <h3>📋 Cadastros</h3>

    <input id="nome" placeholder="Nome">
    <input id="email" placeholder="Email">

    <select id="tipo">
      <option value="Aluno">Aluno</option>
      <option value="Professor">Professor</option>
      <option value="Coordenacao">Coordenação</option>
    </select>

    <button class="btn" onclick="cadastrarUsuario()">Cadastrar</button>

    <table>
      <tr>
        <th>Nome</th>
        <th>Email</th>
        <th>Curso</th>
        <th>Status</th>
        <th>Tipo</th>
        <th>Ações</th>
      </tr>
  `;

  data.forEach(u=>{
    html += `
      <tr>
        <td>
          <a class="nome-link" href="detalhe-aluno.html?id=${u.id}">
            ${u.nome}
          </a>
        </td>
        <td>${u.email}</td>
        <td>${u.curso || "-"}</td>
        <td>${u.status}</td>
        <td>${u.tipo}</td>
        <td>
          <button class="btn" onclick="aprovar('${u.id}')">✔️</button>
          <button class="btn" style="background:red" onclick="excluir('${u.id}')">🗑️</button>
        </td>
      </tr>
    `;
  });

  conteudo.innerHTML = html + "</table>";
}

async function cadastrarUsuario(){
  if(!nome.value || !email.value){
    alert("Preencha nome e email");
    return;
  }
  await client.from("usuarios").insert([{
    nome: nome.value,
    email: email.value,
    tipo: tipo.value,
    status: "pendente"
  }]);
  alunos();
}

async function aprovar(id){
  await client.from("usuarios").update({ status:"ativo" }).eq("id",id);
  alunos();
}

async function excluir(id){
  if(confirm("Excluir usuário?")){
    await client.from("usuarios").delete().eq("id",id);
    alunos();
  }
}

//////////////////////////////////////////////////
// 📚 DISCIPLINAS (AJUSTADO COM PROFESSOR 🔥)
//////////////////////////////////////////////////

async function disciplinasMaster(){

  let html=`
    <h3>📚 Disciplinas por Curso</h3>

    <select id="cursoMaster" onchange="carregarDisciplinasCurso()">
      <option value="Curso Básico">Curso Básico</option>
      <option value="Curso Médio">Curso Médio</option>
    </select>

    <input id="nomeDisciplina" placeholder="Nome da disciplina">

    <button class="btn" onclick="salvarDisciplinaMaster()">Cadastrar</button>

    <div id="tabela"></div>
  `;

  conteudo.innerHTML=html;

  carregarDisciplinasCurso();
}

async function carregarDisciplinasCurso(){

  const curso = document.getElementById("cursoMaster").value;

  const { data } = await client
    .from("disciplinas_master")
    .select("*")
    .eq("curso", curso);

  let html=`
    <table>
      <tr>
        <th>Curso</th>
        <th>Disciplina</th>
        <th>Histórico</th>
        <th>Ação</th>
      </tr>
  `;

  data.forEach(d=>{
    html+=`
      <tr>
        <td>${d.curso}</td>
        <td>${d.nome}</td>

        <td>
          <button class="btn" onclick="abrirHistorico('${d.nome}','${d.curso}')">📄</button>
        </td>

        <td>
          <button class="btn" style="background:red;" onclick="excluirDisciplina('${d.id}')">🗑️</button>
        </td>
      </tr>
    `;
  });

  html+="</table>";

  document.getElementById("tabela").innerHTML=html;
}

async function salvarDisciplinaMaster(){

  const curso = document.getElementById("cursoMaster").value;
  const nome = document.getElementById("nomeDisciplina").value;

  if(!nome){
    alert("Digite o nome da disciplina");
    return;
  }

  await client.from("disciplinas_master").insert([{curso,nome}]);

  document.getElementById("nomeDisciplina").value="";
  carregarDisciplinasCurso();
}

async function excluirDisciplina(id){
  if(!confirm("Excluir disciplina?")) return;

  await client.from("disciplinas_master").delete().eq("id",id);

  carregarDisciplinasCurso();
}

//////////////////////////////////////////////////
// 📄 HISTÓRICO COM PROFESSOR 🔥
//////////////////////////////////////////////////

async function abrirHistorico(disciplina, curso){

  const { data } = await client
    .from("disciplinas_historico")
    .select("*")
    .eq("disciplina", disciplina)
    .eq("curso", curso);

  let html = `
    <h3>📄 Histórico - ${disciplina}</h3>

    <input id="profHist" placeholder="Professor">
    <input id="inicioHist" type="date">
    <input id="fimHist" type="date">

    <button class="btn" onclick="salvarHistorico('${disciplina}','${curso}')">
      Salvar período
    </button>

    <br><br>

    <table>
      <tr>
        <th>Professor</th>
        <th>Início</th>
        <th>Fim</th>
      </tr>
  `;

  data.forEach(h=>{
    html+=`
      <tr>
        <td>${h.professor}</td>
        <td>${h.data_inicio}</td>
        <td>${h.data_fim || "-"}</td>
      </tr>
    `;
  });

  html += "</table>";

  conteudo.innerHTML = html;
}

async function salvarHistorico(disciplina, curso){

  const professor = document.getElementById("profHist").value;
  const inicio = document.getElementById("inicioHist").value;
  const fim = document.getElementById("fimHist").value;

  if(!professor || !inicio){
    alert("Preencha os campos");
    return;
  }

  await client.from("disciplinas_historico").insert([{
    disciplina,
    curso,
    professor,
    data_inicio: inicio,
    data_fim: fim || null
  }]);

  alert("Histórico salvo!");

  abrirHistorico(disciplina, curso);
}

//////////////////////////////////////////////////
// 📅 PRESENÇA (mantido)
//////////////////////////////////////////////////

async function frequencia(){
  const { data: alunos } = await client.from("usuarios").select("*").eq("tipo","Aluno");
  const { data: disc } = await client.from("disciplinas_master").select("*");

  conteudo.innerHTML = `
    <h3>📅 Presença</h3>

    <select id="alunoP">${alunos.map(a=>`<option value="${a.email}">${a.nome}</option>`).join("")}</select>
    <select id="discP">${disc.map(d=>`<option>${d.nome}</option>`).join("")}</select>

    <input type="date" id="dataP">

    <select id="presP">
      <option value="true">Presente</option>
      <option value="false">Falta</option>
    </select>

    <button class="btn" onclick="salvarF()">Salvar</button>
  `;
}

async function salvarF(){
  await client.from("frequencia").insert([{
    email: alunoP.value,
    disciplina: discP.value,
    data: dataP.value,
    presente: presP.value==="true"
  }]);
  alert("Presença salva");
}

//////////////////////////////////////////////////
// 📊 BOLETIM PDF (mantido)
//////////////////////////////////////////////////

async function gerarBoletim(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const email = alunoSelect.value;

  const { data: aluno } = await client.from("usuarios").select("*").eq("email",email).single();
  const { data: notas } = await client.from("disciplinas").select("*").eq("email",email);
  const { data: freq } = await client.from("frequencia").select("*").eq("email",email);

  const logo = new Image();
  logo.src = "logo faesp.png";
  await new Promise(r=>logo.onload=r);

  doc.addImage(logo,"PNG",15,10,30,30);
  doc.text("FAESP - SETOR 30",105,20,{align:"center"});
  doc.text(`Aluno: ${aluno.nome}`,15,55);

  const linhas = notas.map(n=>{
    const p = freq.filter(f=>f.disciplina===n.nome);
    const perc = p.length ? Math.round((p.filter(f=>f.presente).length/p.length)*100) : 0;
    return [n.nome,n.nota||"-",perc+"%"];
  });

  doc.autoTable({
    startY:65,
    head:[["Disciplina","Nota","Presença"]],
    body:linhas
  });

  doc.save(`Boletim_${aluno.nome.replaceAll(" ","_")}.pdf`);
}
</script>
