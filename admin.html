<!DOCTYPE html>
<html>
<head>
  <title>FAESP - Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      height: 100vh;
      background: #eef2f7;
      flex-direction: column;
    }

    .main { display: flex; flex: 1; }

    /* SIDEBAR */
    .sidebar {
      width: 240px;
      background: white;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border-right: 1px solid #ddd;
      align-items: center;
    }

    .logo {
      width: 120px;
      margin-bottom: 10px;
    }

    .menu {
      width: 100%;
    }

    .menu button {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border: none;
      background: #f1f5f9;
      border-radius: 10px;
      cursor: pointer;
      text-align: left;
      font-weight: 500;
    }

    .menu button:hover {
      background: #e2e8f0;
    }

    .logout {
      background: black;
      color: white;
      font-weight: bold;
      padding: 12px;
      border-radius: 10px;
      border: none;
      width: 100%;
      cursor: pointer;
    }

    /* CONTEÚDO */
    .content {
      flex: 1;
      padding: 25px;
    }

    .header {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    /* RODAPÉ */
    .footer {
      background: #1e293b;
      color: white;
      text-align: center;
      padding: 10px;
      font-size: 13px;
    }
  </style>
</head>

<body>

<div class="main">

  <!-- MENU -->
  <div class="sidebar">

    <div style="width:100%; text-align:center;">
      <img src="logo faesp.png" class="logo">

      <h3>👑 ADMIN</h3>

      <div class="menu">
        <button onclick="alunos()">👨‍🎓 Alunos</button>
        <button onclick="disciplinas()">📚 Disciplinas</button>
        <button onclick="notas()">📝 Notas</button>
        <button onclick="professores()">👨‍🏫 Professores</button>
        <button onclick="financeiro()">💰 Financeiro</button>
        <button onclick="avisos()">📢 Avisos</button>
        <button onclick="cronograma()">📅 Cronograma</button>
      </div>
    </div>

    <button class="logout" onclick="sair()">🚪 Sair</button>

  </div>

  <!-- CONTEÚDO -->
  <div class="content">

    <div class="header">
      <h2>FAESP - SETOR 30 (ADMIN)</h2>
      <p>Painel administrativo</p>
    </div>

    <div class="box" id="conteudo">
      Bem-vinda ao painel ADM 👑
    </div>

  </div>

</div>

<!-- RODAPÉ -->
<div class="footer">
  AD. Belém - Rua Rio Tiete, 126 - Jardim Europa - Campo Limpo Paulista - SP
</div>

<script>
const client = supabase.createClient(
  "https://nzygdvixqmiltelgzzrn.supabase.co",
  "SUA_CHAVE_AQUI"
);

// LOGOUT
function sair() {
  localStorage.removeItem("usuario");
  window.location.href = "index.html";
}

// TEMP (depois você conecta tudo)
function alunos(){document.getElementById("conteudo").innerHTML="👨‍🎓 Alunos";}
function disciplinas(){document.getElementById("conteudo").innerHTML="📚 Disciplinas";}
function notas(){document.getElementById("conteudo").innerHTML="📝 Notas";}
function professores(){document.getElementById("conteudo").innerHTML="👨‍🏫 Professores";}
function financeiro(){document.getElementById("conteudo").innerHTML="💰 Financeiro";}
function avisos(){document.getElementById("conteudo").innerHTML="📢 Avisos";}
function cronograma(){document.getElementById("conteudo").innerHTML="📅 Cronograma";}
</script>

</body>
</html>
