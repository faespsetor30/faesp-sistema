async function dashboard(){

  const { data: usuarios } = await client.from("usuarios").select("*");
  const { data: hist } = await client.from("disciplinas_historico").select("*");

  const alunos = usuarios.filter(u=>u.tipo==="Aluno").length;
  const professores = usuarios.filter(u=>u.tipo==="Professor").length;
  const ativos = usuarios.filter(u=>u.status==="ativo").length;

  const hoje = new Date().toISOString().split("T")[0];

  const atuais = hist.filter(h=>{
    return h.data_inicio <= hoje && (!h.data_fim || h.data_fim >= hoje);
  });

  let lista = "";

  atuais.forEach(a=>{
    lista += `
      <div style="padding:10px;background:#f1f5f9;margin:5px;border-radius:8px">
        📘 <strong>${a.curso}</strong> - ${a.disciplina}<br>
        📅 ${a.data_inicio} até ${a.data_fim || "Atual"}
      </div>
    `;
  });

  conteudo.innerHTML = `
    <h2>📊 Dashboard</h2>

    <div style="display:flex; gap:20px; flex-wrap:wrap; margin-bottom:20px;">
      <div style="flex:1; min-width:180px; background:white; padding:20px; border-radius:12px; text-align:center;">
        👨‍🎓<br><strong>${alunos}</strong><br>Alunos
      </div>
      <div style="flex:1; min-width:180px; background:white; padding:20px; border-radius:12px; text-align:center;">
        👨‍🏫<br><strong>${professores}</strong><br>Professores
      </div>
      <div style="flex:1; min-width:180px; background:white; padding:20px; border-radius:12px; text-align:center;">
        ✅<br><strong>${ativos}</strong><br>Ativos
      </div>
    </div>

    <h3>📚 Matérias em andamento</h3>
    ${lista || "Nenhuma ativa"}
  `;
}

async function alunos(){
  const { data } = await client.from("usuarios").select("*");

  let html = `

    <input id="nome" placeholder="Nome">
    <input id="email" placeholder="Email">

    <select id="tipo">
      <option value="Aluno">Aluno</option>
      <option value="Professor">Professor</option>
      <option value="Coordenacao">Coordenação</option>
    </select>

    <br><br>
    <button class="btn" onclick="cadastrarUsuario()">Cadastrar</button>

    <table>
      <tr>
        <th>Nome</th>
        <th>Email</th>
        <th>Curso</th>
        <th>Status</th>
        <th>Tipo</th>
        <th>Ações</th>
      </tr>
  `;

  data.forEach(u=>{
    html+=`
      <tr>
        <td><a class="nome-link" href="detalhe-aluno.html?id=${u.id}">${u.nome}</a></td>
        <td>${u.email}</td>
        <td>${u.curso || "Não definido"}</td>
        <td>${u.status}</td>

        <td>
          <select onchange="alterarTipo('${u.id}',this.value)">
            <option ${u.tipo==="Aluno"?"selected":""}>Aluno</option>
            <option ${u.tipo==="Professor"?"selected":""}>Professor</option>
            <option ${u.tipo==="Coordenacao"?"selected":""}>Coordenação</option>
          </select>
        </td>

        <td>
          <button class="btn" onclick="aprovar('${u.id}')">✔️</button>
          <button class="btn" style="background:red;" onclick="excluir('${u.id}')">🗑️</button>
        </td>
      </tr>
    `;
  });

  html+="</table>";
  conteudo.innerHTML=html;
}

async function cadastrarUsuario(){
  await client.from("usuarios").insert([{
    nome: nome.value,
    email: email.value,
    tipo: tipo.value,
    status:"pendente"
  }]);
  alunos();
}

async function alterarTipo(id,tipo){
  await client.from("usuarios").update({tipo}).eq("id",id);
  alunos();
}

async function aprovar(id){
  await client.from("usuarios").update({status:"ativo"}).eq("id",id);
  alunos();
}

async function excluir(id){
  if(!confirm("Excluir?")) return;
  await client.from("usuarios").delete().eq("id",id);
  alunos();
}

async function salvarNota(email,nome,nota){

//////////////////////////////////////////////////
// 📊 BOLETIM BONITO
//////////////////////////////////////////////////

async function gerarBoletim(){

  const email = alunoSelect.value;

  if(!email){
    alert("Selecione um aluno");
    return;
  }

  const { data: aluno } = await client.from("usuarios").select("*").eq("email",email).single();
  const { data: notas } = await client.from("disciplinas").select("*").eq("email",email);
  const { data: freq } = await client.from("frequencia").select("*").eq("email",email);

  let soma = 0;
  let qtd = 0;
  let linhas = "";

  notas.forEach(n=>{
    const lista = freq.filter(f=>f.disciplina===n.nome);
    const total = lista.length;
    const pres = lista.filter(f=>f.presente).length;
    const perc = total>0 ? Math.round((pres/total)*100) : 0;

    const nota = parseFloat(n.nota) || 0;

    if(n.nota){
      soma += nota;
      qtd++;
    }

    linhas += `
      <tr>
        <td>${n.nome}</td>
        <td>${n.nota || "-"}</td>
        <td>${perc}%</td>
      </tr>
    `;
  });

  const media = qtd > 0 ? (soma / qtd).toFixed(1) : "-";
  const situacao = media >= 7 ? "APROVADO" : "REPROVADO";

  let html = `
    <div style="font-family:Segoe UI;padding:30px;max-width:800px;margin:auto;border:1px solid #ddd;border-radius:10px;">
      <div style="text-align:center;margin-bottom:20px;">
        <h2>🎓 FAESP - SETOR 30</h2>
        <p style="color:#555;">Boletim Escolar</p>
      </div>

      <div style="margin-bottom:20px;">
        <strong>Aluno:</strong> ${aluno.nome}<br>
        <strong>Email:</strong> ${aluno.email}
      </div>

      <table style="width:100%;border-collapse:collapse;">
        <tr style="background:#2c5364;color:white;">
          <th>Disciplina</th>
          <th>Nota</th>
          <th>Presença</th>
        </tr>
        ${linhas}
      </table>

      <div style="margin-top:20px;display:flex;justify-content:space-between;font-size:18px;">
        <div><strong>Média:</strong> ${media}</div>
        <div><strong>Situação:</strong> 
          <span style="color:${situacao==='APROVADO'?'green':'red'}">${situacao}</span>
        </div>
      </div>

      <div style="margin-top:40px;text-align:center;color:#777;">
        ___________________________<br>
        Coordenação FAESP
      </div>
    </div>
  `;

  const w = window.open("", "_blank", "width=900,height=700");
  w.document.write(html);
  w.document.close();
}
