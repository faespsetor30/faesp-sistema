<!DOCTYPE html>
<html>
<head>
  <title>FAESP - Coordenação</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body { margin:0; font-family:'Segoe UI'; display:flex; height:100vh; background:#eef2f7; flex-direction:column;}
    .main { display:flex; flex:1;}

    .sidebar {
      width:240px; background:white; padding:20px;
      display:flex; flex-direction:column; justify-content:space-between;
      border-right:1px solid #ddd; align-items:center;
    }

    .logo { width:120px; margin-bottom:10px;}

    .menu button {
      width:100%; padding:12px; margin-bottom:10px;
      border:none; background:#f1f5f9; border-radius:10px;
      cursor:pointer; text-align:left;
    }

    .menu button:hover { background:#e2e8f0;}

    .logout {
      background:black; color:white; font-weight:bold;
      padding:12px; border-radius:10px; border:none;
      width:100%;
    }

    .content { flex:1; padding:25px;}

    .header, .box {
      background:white; padding:20px; border-radius:12px;
      margin-bottom:20px;
      box-shadow:0 5px 15px rgba(0,0,0,0.05);
    }

    table { width:100%; border-collapse:collapse; margin-top:10px;}

    th, td {
      padding:10px;
      border-bottom:1px solid #ddd;
      text-align:center;
    }

    .btn {
      background:#2c5364; color:white; border:none;
      padding:6px 10px; border-radius:6px; cursor:pointer;
    }

    input, select {
      padding:8px; margin-top:5px; width:100%;
    }
  </style>
</head>

<body>

<div class="main">

  <div class="sidebar">
    <div style="width:100%; text-align:center;">
      <img src="logo faesp.png" class="logo">
      <h3>👑 COORDENAÇÃO</h3>

      <div class="menu">
        <button onclick="alunos()">📋 Cadastros</button>
        <button onclick="disciplinasMaster()">📚 Disciplinas</button>
        <button onclick="notas()">📝 Notas</button>
      </div>
    </div>

    <button class="logout" onclick="sair()">🚪 Sair</button>
  </div>

  <div class="content">
    <div class="header">
      <h2>FAESP - SETOR 30</h2>
    </div>

    <div class="box" id="conteudo"></div>
  </div>

</div>

<script>

const client = supabase.createClient(
  "https://nzygdvixqmiltelgzzrn.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56eWdkdml4cW1pbHRlbGd6enJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDk5MjQsImV4cCI6MjA5MTY4NTkyNH0.wMaTGEgL_VCbSewnB-4BmdoA6rcGJWDsWIVaIo5dTy8"
);

// 🔐 proteção
const usuario = JSON.parse(localStorage.getItem("usuario"));
if (!usuario || usuario.tipo !== "Coordenacao") {
  window.location.href = "index.html";
}

// logout
function sair(){
  localStorage.removeItem("usuario");
  window.location.href="index.html";
}

//////////////////////////////////////////////////
// 📝 NOTAS + PDF PROFISSIONAL
//////////////////////////////////////////////////

async function notas(){

  const { data: alunos } = await client
    .from("usuarios")
    .select("*")
    .eq("tipo","Aluno");

  let options = `<option value="">Selecione o aluno</option>`;

  alunos.forEach(a=>{
    options += `<option value="${a.email}">${a.nome}</option>`;
  });

  let html = `
    <h3>📝 Notas / Histórico</h3>

    <select id="alunoSelect" onchange="carregarNotasAluno()">
      ${options}
    </select>

    <br><br>
    <button class="btn" onclick="gerarPDF()">📄 Gerar Boletim</button>

    <div id="tabelaNotas"></div>
  `;

  document.getElementById("conteudo").innerHTML = html;
}

async function carregarNotasAluno(){

  const email = document.getElementById("alunoSelect").value;
  if(!email) return;

  const { data } = await client
    .from("disciplinas")
    .select("*")
    .eq("email", email);

  let html = `
    <table>
      <tr>
        <th>Disciplina</th>
        <th>Professor</th>
        <th>Nota</th>
        <th>Status</th>
      </tr>
  `;

  data.forEach(d=>{

    let status = "Em andamento";
    let cor = "#6b7280";

    if(d.nota){
      if(d.nota >= 7){
        status = "Aprovado";
        cor = "green";
      }else{
        status = "Reprovado";
        cor = "red";
      }
    }

    html += `
      <tr>
        <td>${d.nome}</td>
        <td>${d.professor || "-"}</td>
        <td>
          <input type="number" min="0" max="10"
            value="${d.nota || ""}"
            onchange="salvarNota('${d.id}', this.value)">
        </td>
        <td style="color:${cor}; font-weight:bold;">
          ${status}
        </td>
      </tr>
    `;
  });

  html += "</table>";

  document.getElementById("tabelaNotas").innerHTML = html;
}

async function salvarNota(id, nota){
  await client.from("disciplinas").update({ nota }).eq("id", id);
}

//////////////////////////////////////////////////
// 📄 PDF BONITO (UPGRADE)
//////////////////////////////////////////////////

async function gerarPDF(){

  const email = document.getElementById("alunoSelect").value;
  if(!email) return alert("Selecione o aluno");

  const { data: aluno } = await client
    .from("usuarios")
    .select("*")
    .eq("email", email)
    .single();

  const { data: disciplinas } = await client
    .from("disciplinas")
    .select("*")
    .eq("email", email);

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y = 20;

  // 🖼️ LOGO (usa a mesma imagem do sistema)
  const logo = new Image();
  logo.src = "logo faesp.png";

  doc.addImage(logo, "PNG", 15, 10, 30, 30);

  // Título
  doc.setFontSize(18);
  doc.text("FAESP - BOLETIM ESCOLAR", 60, 20);

  y = 50;

  doc.setFontSize(12);
  doc.text("Aluno: " + aluno.nome, 20, y);
  y += 8;
  doc.text("Curso: " + (aluno.curso || "-"), 20, y);
  y += 8;
  doc.text("Data: " + new Date().toLocaleDateString(), 20, y);

  y += 15;

  // Cabeçalho tabela
  doc.setFillColor(44, 83, 100);
  doc.rect(20, y, 170, 8, "F");

  doc.setTextColor(255,255,255);
  doc.text("Disciplina", 22, y+6);
  doc.text("Nota", 120, y+6);
  doc.text("Status", 150, y+6);

  doc.setTextColor(0,0,0);

  y += 12;

  let soma = 0;
  let qtd = 0;

  disciplinas.forEach(d => {

    let status = "Em andamento";

    if(d.nota){
      soma += Number(d.nota);
      qtd++;

      status = d.nota >= 7 ? "Aprovado" : "Reprovado";
    }

    doc.text(d.nome, 20, y);
    doc.text(String(d.nota || "-"), 120, y);
    doc.text(status, 150, y);

    y += 8;
  });

  // 🎯 MÉDIA
  y += 10;
  let media = qtd ? (soma / qtd).toFixed(2) : "-";

  doc.setFontSize(14);
  doc.text("Média Final: " + media, 20, y);

  // ✍️ ASSINATURA
  y += 30;

  doc.line(120, y, 190, y);
  doc.setFontSize(10);
  doc.text("Coordenação FAESP", 130, y + 5);

  doc.save("boletim_" + aluno.nome + ".pdf");
}

</script>

</body>
</html>
