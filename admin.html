<!DOCTYPE html>
<html>
<head>
  <title>FAESP - Coordenação</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; background: #eef2f7; flex-direction: column; }
    .main { display: flex; flex: 1; }

    .sidebar {
      width: 240px; background: white; padding: 20px;
      display: flex; flex-direction: column; justify-content: space-between;
      border-right: 1px solid #ddd; align-items: center;
    }

    .logo { width: 120px; margin-bottom: 10px; }
    .menu { width: 100%; }

    .menu button {
      width: 100%; padding: 12px; margin-bottom: 10px;
      border: none; background: #f1f5f9; border-radius: 10px;
      cursor: pointer; text-align: left; font-weight: 500;
    }

    .menu button:hover { background: #e2e8f0; }

    .logout {
      background: black; color: white; font-weight: bold;
      padding: 12px; border-radius: 10px; border: none;
      width: 100%; cursor: pointer;
    }

    .content { flex: 1; padding: 25px; }

    .header {
      background: white; padding: 20px; border-radius: 12px;
      margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    .box {
      background: white; padding: 20px; border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    .footer {
      background: #1e293b; color: white;
      text-align: center; padding: 10px; font-size: 13px;
    }

    table { width:100%; border-collapse: collapse; margin-top:10px; }

    th, td {
      padding:10px;
      border-bottom:1px solid #ddd;
      text-align:center;
    }

    th { background:#f8fafc; }

    .btn {
      background:#2c5364; color:white; border:none;
      padding:6px 10px; border-radius:6px; cursor:pointer;
    }

    input, select {
      padding:8px; border-radius:6px; border:1px solid #ccc;
      margin-top:5px; width:100%;
    }
  </style>
</head>

<body>

<div class="main">

  <div class="sidebar">
    <div style="width:100%; text-align:center;">
      <img src="logo faesp.png" class="logo">
      <h3>👑 COORDENAÇÃO</h3>

      <div class="menu">
        <button onclick="alunos()">📋 Cadastros</button>
        <button onclick="disciplinas()">📚 Disciplinas</button>
        <button onclick="notas()">📝 Notas / Boletim</button>
      </div>
    </div>

    <button class="logout" onclick="sair()">🚪 Sair</button>
  </div>

  <div class="content">
    <div class="header">
      <h2>FAESP - SETOR 30 (COORDENAÇÃO)</h2>
      <p>Painel da coordenação</p>
    </div>

    <div class="box" id="conteudo">
      Bem-vinda ao painel da coordenação 👑
    </div>
  </div>

</div>

<div class="footer">
  AD. Belém - Rua Rio Tiete, 126 - Campo Limpo Paulista - SP
</div>

<script>
const client = supabase.createClient(
  "https://nzygdvixqmiltelgzzrn.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56eWdkdml4cW1pbHRlbGd6enJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDk5MjQsImV4cCI6MjA5MTY4NTkyNH0.wMaTGEgL_VCbSewnB-4BmdoA6rcGJWDsWIVaIo5dTy8"
);

// LOGOUT
function sair() {
  localStorage.removeItem("usuario");
  window.location.href = "index.html";
}

// GERAR SENHA
function gerarSenha() {
  return Math.random().toString(36).slice(-8);
}

// 📋 CADASTROS
async function alunos() {
  const { data } = await client.from("usuarios").select("*");

  let html = `
    <h3>📋 Cadastros</h3>

    <div style="margin-bottom:20px;">
      <h4>➕ Novo Cadastro</h4>

      <input id="nome" placeholder="Nome">
      <input id="email" placeholder="Email">
      <input id="celular" placeholder="Celular">

      <select id="tipo">
        <option value="Aluno">Aluno</option>
        <option value="Professor">Professor</option>
        <option value="Coordenacao">Coordenação</option>
      </select>

      <input id="curso" placeholder="Curso">

      <br><br>
      <button class="btn" onclick="cadastrarUsuario()">Cadastrar</button>
    </div>

    <table>
      <tr>
        <th>Nome</th>
        <th>Email</th>
        <th>Status</th>
        <th>Tipo</th>
      </tr>
  `;

  data.forEach(u => {
    html += `
      <tr>
        <td>${u.nome}</td>
        <td>${u.email}</td>
        <td>${u.status}</td>
        <td>${u.tipo}</td>
      </tr>
    `;
  });

  html += "</table>";
  document.getElementById("conteudo").innerHTML = html;
}

// 🚀 CADASTRAR COM LOGIN
async function cadastrarUsuario() {
  const nome = document.getElementById("nome").value;
  const email = document.getElementById("email").value;
  const celular = document.getElementById("celular").value;
  const tipo = document.getElementById("tipo").value;
  const curso = document.getElementById("curso").value;

  const senha = gerarSenha();

  // cria no AUTH
  const { error: authError } = await client.auth.signUp({
    email: email,
    password: senha
  });

  if (authError) {
    alert("Erro no Auth 😢");
    return;
  }

  // salva no banco
  await client.from("usuarios").insert([
    {
      nome,
      email,
      celular,
      tipo,
      curso,
      status: "ativo"
    }
  ]);

  // envia whatsapp
  await fetch("https://api.z-api.io/instances/SEU_ID/token/SEU_TOKEN/send-text", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      phone: celular,
      message: `Olá ${nome} 🙌

Seu acesso à FAESP foi criado!

📧 Email: ${email}
🔑 Senha: ${senha}

Acesse o sistema e altere sua senha após login.`
    })
  });

  alert("Usuário criado e enviado no WhatsApp! 🚀");

  alunos();
}

// OUTROS
function disciplinas(){document.getElementById("conteudo").innerHTML="📚 Disciplinas";}
function notas(){document.getElementById("conteudo").innerHTML="📝 Notas";}
</script>

</body>
</html>
