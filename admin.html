<!DOCTYPE html>
<html>
<head>
  <title>FAESP - Coordenação</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; background: #eef2f7; flex-direction: column; }
    .main { display: flex; flex: 1; }

    .sidebar {
      width: 240px; background: white; padding: 20px;
      display: flex; flex-direction: column; justify-content: space-between;
      border-right: 1px solid #ddd; align-items: center;
    }

    .logo { width: 120px; margin-bottom: 10px; }
    .menu { width: 100%; }

    .menu button {
      width: 100%; padding: 12px; margin-bottom: 10px;
      border: none; background: #f1f5f9; border-radius: 10px;
      cursor: pointer; text-align: left; font-weight: 500;
    }

    .menu button:hover { background: #e2e8f0; }

    .logout {
      background: black; color: white; font-weight: bold;
      padding: 12px; border-radius: 10px; border: none;
      width: 100%; cursor: pointer;
    }

    .content { flex: 1; padding: 25px; }

    .header {
      background: white; padding: 20px; border-radius: 12px;
      margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    .box {
      background: white; padding: 20px; border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    .footer {
      background: #1e293b; color: white;
      text-align: center; padding: 10px; font-size: 13px;
    }

    table { width:100%; border-collapse: collapse; margin-top:10px; }

    th, td {
      padding:10px;
      border-bottom:1px solid #ddd;
      text-align:center;
    }

    th { background:#f8fafc; }

    .btn {
      background:#2c5364; color:white; border:none;
      padding:6px 10px; border-radius:6px; cursor:pointer;
      margin:2px;
    }

    input, select {
      padding:8px; border-radius:6px; border:1px solid #ccc;
      margin-top:5px; width:100%;
    }

    a.nome-link {
      color:#2c5364;
      font-weight:bold;
      text-decoration:none;
    }

    a.nome-link:hover {
      text-decoration:underline;
    }

  </style>
</head>

<body>

<div class="main">

  <div class="sidebar">
    <div style="width:100%; text-align:center;">
      <img src="logo faesp.png" class="logo">
      <h3>👑 COORDENAÇÃO</h3>

      <div class="menu">
        <button onclick="alunos()">📋 Cadastros</button>
        <button onclick="disciplinas()">📚 Disciplinas</button>
        <button onclick="notas()">📝 Notas / Boletim</button>
      </div>
    </div>

    <button class="logout" onclick="sair()">🚪 Sair</button>
  </div>

  <div class="content">
    <div class="header">
      <h2>FAESP - SETOR 30 (COORDENAÇÃO)</h2>
      <p>Painel da coordenação</p>
    </div>

    <div class="box" id="conteudo">
      Bem-vinda ao painel da coordenação 👑
    </div>
  </div>

</div>

<div class="footer">
  AD. Belém - Rua Rio Tiete, 126 - Campo Limpo Paulista - SP
</div>

<script>

// 🔐 PROTEÇÃO
const usuario = JSON.parse(localStorage.getItem("usuario"));

if (!usuario) {
  alert("Faça login primeiro");
  window.location.href = "index.html";
}

if (usuario.tipo !== "Coordenacao") {
  alert("Acesso restrito à coordenação");
  window.location.href = "dashboard.html";
}

if (usuario.status !== "ativo") {
  alert("Usuário não autorizado");
  window.location.href = "index.html";
}

// SUPABASE
const client = supabase.createClient(
  "https://nzygdvixqmiltelgzzrn.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56eWdkdml4cW1pbHRlbGd6enJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDk5MjQsImV4cCI6MjA5MTY4NTkyNH0.wMaTGEgL_VCbSewnB-4BmdoA6rcGJWDsWIVaIo5dTy8"
);

// LOGOUT
function sair() {
  localStorage.removeItem("usuario");
  window.location.href = "index.html";
}

// 📋 CADASTROS
async function alunos() {

  const { data } = await client.from("usuarios").select("*");

  let html = `
    <h3>📋 Cadastros</h3>

    <div style="margin-bottom:20px;">
      <h4>➕ Novo Cadastro</h4>
      <input id="nome" placeholder="Nome">
      <input id="email" placeholder="Email">
      <input id="celular" placeholder="Celular">
      <select id="tipo">
        <option value="Aluno">Aluno</option>
        <option value="Professor">Professor</option>
        <option value="Coordenacao">Coordenação</option>
      </select>
      <input id="curso" placeholder="Curso">
      <br><br>
      <button class="btn" onclick="cadastrarUsuario()">Cadastrar</button>
    </div>

    <table>
      <tr>
        <th>Nome</th>
        <th>Email</th>
        <th>Status</th>
        <th>Tipo</th>
        <th>Ações</th>
      </tr>
  `;

  data.forEach(u => {
    html += `
      <tr>
        <td>
          <a class="nome-link" href="detalhe-aluno.html?id=${u.id}">
            ${u.nome}
          </a>
        </td>
        <td>${u.email}</td>
        <td>${u.status}</td>
        <td>
          <select onchange="alterarTipo('${u.id}', this.value)">
            <option value="Aluno" ${u.tipo === "Aluno" ? "selected" : ""}>Aluno</option>
            <option value="Professor" ${u.tipo === "Professor" ? "selected" : ""}>Professor</option>
            <option value="Coordenacao" ${u.tipo === "Coordenacao" ? "selected" : ""}>Coordenação</option>
          </select>
        </td>
        <td>
          ${
            u.status === "pendente"
            ? `
              <button class="btn" onclick="aprovar('${u.id}')">✅</button>
              <button class="btn" style="background:red;" onclick="recusar('${u.id}')">❌</button>
              <button class="btn" style="background:#6b7280;" onclick="excluir('${u.id}')">🗑️</button>
            `
            : `
              ✔️
              <button class="btn" style="background:#6b7280;" onclick="excluir('${u.id}')">🗑️</button>
            `
          }
        </td>
      </tr>
    `;
  });

  html += "</table>";

  document.getElementById("conteudo").innerHTML = html;
}

// RESTO DO CÓDIGO (SEM ALTERAÇÃO)
async function alterarTipo(id, tipo) {
  await client.from("usuarios").update({ tipo }).eq("id", id);
  alunos();
}

async function aprovar(id) {
  const { data: usuario } = await client
    .from("usuarios")
    .select("*")
    .eq("id", id)
    .single();

  const { error } = await client.auth.signInWithOtp({
    email: usuario.email,
    options: {
      emailRedirectTo: "https://faesp-sistema.vercel.app/primeiro-acesso.html"
    }
  });

  if (error) {
    alert("Erro ao enviar email: " + error.message);
    return;
  }

  await client
    .from("usuarios")
    .update({ status: "ativo", primeiro_acesso: true })
    .eq("id", id);

  alert("Usuário aprovado!");
  alunos();
}

async function recusar(id) {
  await client.from("usuarios").update({ status: "recusado" }).eq("id", id);
  alert("Recusado!");
  alunos();
}

async function excluir(id) {
  const confirmar = confirm("Tem certeza que deseja excluir?");
  if (!confirmar) return;

  const { data: usuario } = await client
    .from("usuarios")
    .select("*")
    .eq("id", id)
    .single();

  await client.from("usuarios").delete().eq("id", id);

  await fetch("https://nzygdvixqmiltelgzzrn.supabase.co/functions/v1/delete-user", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ email: usuario.email })
  });

  alert("Usuário excluído!");
  alunos();
}

async function cadastrarUsuario() {
  const nome = document.getElementById("nome").value;
  const email = document.getElementById("email").value;
  const celular = document.getElementById("celular").value;
  const tipo = document.getElementById("tipo").value;
  const curso = document.getElementById("curso").value;

  await client.from("usuarios").insert([
    { nome, email, celular, tipo, curso, status: "pendente" }
  ]);

  alert("Usuário cadastrado!");
  alunos();
}

function disciplinas(){
  document.getElementById("conteudo").innerHTML="📚 Disciplinas";
}

function notas(){
  document.getElementById("conteudo").innerHTML="📝 Notas";
}

</script>

</body>
</html>
