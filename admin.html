<!DOCTYPE html>
<html>
<head>
  <title>FAESP - Coordenação</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    body {
      margin:0;
      font-family:'Segoe UI';
      display:flex;
      flex-direction:column;
      height:100vh;
      background:#eef2f7;
    }

    .main {
      display:flex;
      flex:1;
      width:100%;
    }

    .sidebar {
      width:240px;
      background:white;
      padding:20px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      border-right:1px solid #ddd;
      align-items:center;
    }

    .logo { width:120px; margin-bottom:10px;}

    .menu button {
      width:100%;
      padding:12px;
      margin-bottom:10px;
      border:none;
      background:#f1f5f9;
      border-radius:10px;
      cursor:pointer;
      text-align:left;
    }

    .menu button:hover { background:#e2e8f0;}

    .logout {
      background:black;
      color:white;
      font-weight:bold;
      padding:12px;
      border-radius:10px;
      border:none;
      width:100%;
    }

    .content {
      flex:1;
      padding:25px;
      width:100%;
    }

    .header, .box {
      background:white;
      padding:20px;
      border-radius:12px;
      margin-bottom:20px;
      box-shadow:0 5px 15px rgba(0,0,0,0.05);
    }

    table {
      width:100%;
      border-collapse:collapse;
      margin-top:10px;
    }

    th, td {
      padding:10px;
      border-bottom:1px solid #ddd;
      text-align:center;
    }

    .btn {
      background:#2c5364;
      color:white;
      border:none;
      padding:6px 10px;
      border-radius:6px;
      cursor:pointer;
    }

    input, select {
      padding:8px;
      margin-top:5px;
      width:100%;
    }

    a.nome-link {
      color:#2c5364;
      font-weight:bold;
      text-decoration:none;
    }

    a.nome-link:hover { text-decoration:underline;}
  </style>
</head>

<body>

<div class="main">

  <div class="sidebar">
    <div style="width:100%; text-align:center;">
      <img src="logo faesp.png" class="logo">
      <h3>👑 COORDENAÇÃO</h3>

      <div class="menu">
        <button onclick="dashboard()">🏠 Dashboard</button>
        <button onclick="alunos()">📋 Cadastros</button>
        <button onclick="disciplinasMaster()">📚 Disciplinas</button>
        <button onclick="notas()">📝 Notas</button>
        <button onclick="frequencia()">📅 Presença</button>
        <button onclick="avisos()">📢 Avisos</button>
        <button onclick="financeiro()">💰 Financeiro</button>
      </div>
    </div>

    <button class="logout" onclick="sair()">🚪 Sair</button>
  </div>

  <div class="content">
    <div class="header">
      <h2>FAESP - SETOR 30</h2>
    </div>

    <div class="box" id="conteudo"></div>
  </div>

</div>

<script>

const client = supabase.createClient(
  "https://nzygdvixqmiltelgzzrn.supabase.co",
  "SUA_KEY"
);

const conteudo = document.getElementById("conteudo");

function sair(){
  localStorage.removeItem("usuario");
  window.location.href="index.html";
}

//////////////////////////////////////////////////
// DASHBOARD
//////////////////////////////////////////////////

async function dashboard(){
  const { data: usuarios } = await client.from("usuarios").select("*");
  const { data: hist } = await client.from("disciplinas_historico").select("*");

  const alunos = usuarios.filter(u=>u.tipo==="Aluno").length;
  const professores = usuarios.filter(u=>u.tipo==="Professor").length;
  const ativos = usuarios.filter(u=>u.status==="ativo").length;

  const hoje = new Date().toISOString().split("T")[0];

  const atuais = hist.filter(h=>{
    return h.data_inicio <= hoje && (!h.data_fim || h.data_fim >= hoje);
  });

  let lista = "";

  atuais.forEach(a=>{
    lista += `
      <div style="padding:10px;background:#f1f5f9;margin:5px;border-radius:8px">
        📘 <strong>${a.curso}</strong> - ${a.disciplina}<br>
        📅 ${a.data_inicio} até ${a.data_fim || "Atual"}
      </div>
    `;
  });

  conteudo.innerHTML = `
    <h2>📊 Dashboard</h2>
    <div style="display:flex; gap:20px; flex-wrap:wrap;">
      <div>👨‍🎓 ${alunos}</div>
      <div>👨‍🏫 ${professores}</div>
      <div>✅ ${ativos}</div>
    </div>
    ${lista}
  `;
}

//////////////////////////////////////////////////
// DISCIPLINAS (CORRIGIDO)
//////////////////////////////////////////////////

async function disciplinasMaster(){

  let html=`
    <h3>📚 Disciplinas por Curso</h3>

    <select id="cursoMaster" onchange="carregarDisciplinasCurso()">
      <option value="Curso Básico">Curso Básico</option>
      <option value="Curso Médio">Curso Médio</option>
    </select>

    <input id="nomeDisciplina" placeholder="Nome da disciplina">

    <button class="btn" onclick="salvarDisciplinaMaster()">Cadastrar</button>

    <div id="tabela"></div>
  `;

  conteudo.innerHTML=html;
  carregarDisciplinasCurso();
}

async function carregarDisciplinasCurso(){

  const { data } = await client
    .from("disciplinas_master")
    .select("*")
    .eq("curso", document.getElementById("cursoMaster").value);

  let html=`<table>
    <tr><th>Curso</th><th>Disciplina</th><th>Histórico</th><th>Ação</th></tr>`;

  data.forEach(d=>{
    html+=`
      <tr>
        <td>${d.curso}</td>
        <td>${d.nome}</td>
        <td><button class="btn" onclick="abrirHistorico('${d.nome}','${d.curso}')">📄</button></td>
        <td><button class="btn" style="background:red;" onclick="excluirDisciplina('${d.id}')">🗑️</button></td>
      </tr>`;
  });

  html+="</table>";

  document.getElementById("tabela").innerHTML = html;
}
  async function salvarDisciplinaMaster(){
  await client.from("disciplinas_master").insert([{
    curso: document.getElementById("cursoMaster").value,
    nome: nomeDisciplina.value
  }]);
  carregarDisciplinasCurso();
}

async function excluirDisciplina(id){
  if(!confirm("Excluir disciplina?")) return;
  await client.from("disciplinas_master").delete().eq("id",id);
  carregarDisciplinasCurso();
}

//////////////////////////////////////////////////
// FINANCEIRO + PDF (MANTIDO)
//////////////////////////////////////////////////

async function financeiro(){

  const { data: alunos } = await client.from("usuarios").select("*").eq("tipo","Aluno");
  const { data } = await client.from("financeiro").select("*");

  let html = `
    <h3>💰 Financeiro</h3>

    <select id="alunoFin">
      ${alunos.map(a=>`<option value="${a.email}">${a.nome}</option>`).join("")}
    </select>

    <input id="disciplinaFin" placeholder="Disciplina">
    <input id="valorFin" type="number" placeholder="Valor">

    <select id="statusFin">
      <option value="pago">Pago</option>
      <option value="pendente">Pendente</option>
      <option value="atrasado">Atrasado</option>
    </select>

    <input id="dataFin" type="date">

    <button class="btn" onclick="salvarFinanceiro()">Salvar</button>
  `;

  conteudo.innerHTML=html;
}

async function salvarFinanceiro(){

  const alunoSelect = document.getElementById("alunoFin");

  const alunoSelecionado = alunoSelect.options[alunoSelect.selectedIndex].text;
  const email = alunoSelect.value;

  const disciplina = document.getElementById("disciplinaFin").value;
  const valor = document.getElementById("valorFin").value;
  const status = document.getElementById("statusFin").value;
  const data = document.getElementById("dataFin").value;

  await client.from("financeiro").insert([{
    email,
    disciplina,
    valor: Number(valor),
    status,
    data_pagamento: data
  }]);

  gerarPDFPagamento({
    aluno: alunoSelecionado,
    email,
    disciplina,
    valor,
    status,
    data
  });

  financeiro();
}

async function gerarPDFPagamento(dados){

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.text("FAESP - SETOR 30", 20, 20);
  doc.text(`Aluno: ${dados.aluno}`, 20, 40);
  doc.text(`Valor: R$ ${dados.valor}`, 20, 50);

  doc.save("recibo.pdf");
}

dashboard();

</script>
</body>
</html>
