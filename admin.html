<!DOCTYPE html>
<html lang="pt-br">
<head>
  <title>FAESP - Coordenação</title>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>

  <style>
    body { margin:0; font-family:'Segoe UI'; display:flex; height:100vh; background:#eef2f7; flex-direction:column;}
    .main { display:flex; flex:1;}
    .sidebar {
      width:240px; background:white; padding:20px;
      display:flex; flex-direction:column; justify-content:space-between;
      border-right:1px solid #ddd; align-items:center;
    }
    .logo { width:120px; margin-bottom:10px;}
    .menu button {
      width:100%; padding:12px; margin-bottom:10px;
      border:none; background:#f1f5f9; border-radius:10px;
      cursor:pointer; text-align:left;
    }
    .menu button:hover { background:#e2e8f0;}
    .logout {
      background:black; color:white; font-weight:bold;
      padding:12px; border-radius:10px; border:none;
      width:100%;
    }
    .content { flex:1; padding:25px;}
    .header, .box {
      background:white; padding:20px; border-radius:12px;
      margin-bottom:20px;
      box-shadow:0 5px 15px rgba(0,0,0,0.05);
    }
    table { width:100%; border-collapse:collapse; margin-top:10px;}
    th, td {
      padding:10px;
      border-bottom:1px solid #ddd;
      text-align:center;
    }
    .btn {
      background:#2c5364; color:white; border:none;
      padding:6px 10px; border-radius:6px; cursor:pointer;
    }
    input, select {
      padding:8px; margin-top:5px; width:100%;
    }
    a.nome-link {
      color:#2c5364;
      font-weight:bold;
      text-decoration:none;
    }
    a.nome-link:hover { text-decoration:underline;}
  </style>
</head>

<body>

<div class="main">

  <div class="sidebar">
    <div style="width:100%; text-align:center;">
      <img src="logo-faesp.png" class="logo">
      <h3>👑 COORDENAÇÃO</h3>

      <div class="menu">
        <button onclick="alunos()">📋 Cadastros</button>
        <button onclick="disciplinasMaster()">📚 Disciplinas</button>
        <button onclick="notas()">📝 Notas</button>
        <button onclick="frequencia()">📅 Presença</button>
      </div>
    </div>

    <button class="logout" onclick="sair()">🚪 Sair</button>
  </div>

  <div class="content">
    <div class="header">
      <h2>FAESP - SETOR 30</h2>
    </div>

    <div class="box" id="conteudo"></div>
  </div>

</div>

<script>
const client = supabase.createClient(
  "https://nzygdvixqmiltelgzzrn.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56eWdkdml4cW1pbHRlbGd6enJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDk5MjQsImV4cCI6MjA5MTY4NTkyNH0.wMaTGEgL_VCbSewnB-4BmdoA6rcGJWDsWIVaIo5dTy8"
);

// proteção simples
const usuario = JSON.parse(localStorage.getItem("usuario"));
if (!usuario || usuario.tipo !== "Coordenacao") {
  window.location.href = "index.html";
}

function sair(){
  localStorage.removeItem("usuario");
  window.location.href="index.html";
}

//////////////////////////////////////////////////
// NOTAS
//////////////////////////////////////////////////

async function notas(){
  const { data: alunos } = await client.from("usuarios").select("*").eq("tipo","Aluno");

  conteudo.innerHTML = `
    <h3>📝 Notas</h3>
    <select id="alunoSelect">
      <option value="">Selecione</option>
      ${alunos.map(a=>`<option value="${a.email}">${a.nome}</option>`).join("")}
    </select>
    <button class="btn" onclick="gerarBoletim()">📊 Gerar Boletim PDF</button>
  `;
}

//////////////////////////////////////////////////
// BOLETIM EM PDF
//////////////////////////////////////////////////

async function gerarBoletim(){

  const email = alunoSelect.value;
  if(!email){
    alert("Selecione um aluno");
    return;
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const { data: aluno } = await client
    .from("usuarios")
    .select("*")
    .eq("email", email)
    .single();

  const { data: notas } = await client
    .from("disciplinas")
    .select("*")
    .eq("email", email);

  const { data: freq } = await client
    .from("frequencia")
    .select("*")
    .eq("email", email);

  const logo = new Image();
  logo.src = "logo-faesp.png";
  await new Promise(resolve => logo.onload = resolve);

  doc.addImage(logo, "PNG", 15, 10, 30, 30);
  doc.setFontSize(16);
  doc.text("FAESP - SETOR 30", 105, 18, { align: "center" });
  doc.setFontSize(12);
  doc.text("Boletim Escolar", 105, 26, { align: "center" });

  doc.setFontSize(10);
  doc.text(`Aluno: ${aluno.nome}`, 15, 50);
  doc.text(`Email: ${aluno.email}`, 15, 56);
  doc.text(`Curso: ${aluno.curso || "-"}`, 15, 62);

  let soma = 0;
  let qtd = 0;

  const linhas = notas.map(n => {
    const presencas = freq.filter(f => f.disciplina === n.nome);
    const total = presencas.length;
    const presentes = presencas.filter(f => f.presente).length;
    const perc = total ? Math.round((presentes / total) * 100) : 0;

    const nota = parseFloat(n.nota) || 0;
    if(n.nota){
      soma += nota;
      qtd++;
    }

    return [ n.nome, n.nota || "-", perc + "%" ];
  });

  doc.autoTable({
    startY: 70,
    head: [["Disciplina", "Nota", "Presença"]],
    body: linhas,
    styles: { halign:"center", fontSize:10 },
    headStyles: { fillColor:[44,83,100] }
  });

  const media = qtd ? (soma/qtd).toFixed(1) : "-";
  const situacao = media >= 7 ? "APROVADO" : "REPROVADO";
  const y = doc.lastAutoTable.finalY + 15;

  doc.setFontSize(12);
  doc.text(`Média Final: ${media}`, 15, y);
  doc.setTextColor(situacao==="APROVADO"?0:200, situacao==="APROVADO"?150:0, 0);
  doc.text(`Situação: ${situacao}`, 150, y);
  doc.setTextColor(0);

  doc.setFontSize(10);
  doc.text("_________________________________", 105, y+30, {align:"center"});
  doc.text("Coordenação FAESP", 105, y+36, {align:"center"});

  doc.save(`Boletim_${aluno.nome.replaceAll(" ","_")}.pdf`);
}
</script>

</body>
</html>
``
