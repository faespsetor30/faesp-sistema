async function dashboard(){
  const { data: usuarios } = await client.from("usuarios").select("*");
  const { data: hist } = await client.from("disciplinas_historico").select("*");

  const alunos = usuarios.filter(u=>u.tipo==="Aluno").length;
  const professores = usuarios.filter(u=>u.tipo==="Professor").length;
  const ativos = usuarios.filter(u=>u.status==="ativo").length;

  const hoje = new Date().toISOString().split("T")[0];

  const atuais = hist.filter(h=>{
    return h.data_inicio <= hoje && (!h.data_fim || h.data_fim >= hoje);
  });

  let lista = "";

  atuais.forEach(a=>{
    lista += `
      <div style="padding:10px;background:#f1f5f9;margin:5px;border-radius:8px">
        📘 <strong>${a.curso}</strong> - ${a.disciplina}<br>
        📅 ${a.data_inicio} até ${a.data_fim || "Atual"}
      </div>
    `;
  });

  conteudo.innerHTML = `
    <h2>📊 Dashboard</h2>
    <div style="display:flex; gap:20px; flex-wrap:wrap;">
      <div>👨‍🎓 ${alunos}</div>
      <div>👨‍🏫 ${professores}</div>
      <div>✅ ${ativos}</div>
    </div>
    ${lista}
  `;
}

async function gerarBoletim(){

  const email = alunoSelect.value;

  if(!email){
    alert("Selecione um aluno");
    return;
  }

  const { data: aluno } = await client.from("usuarios").select("*").eq("email",email).single();
  const { data: notas } = await client.from("disciplinas").select("*").eq("email",email);
  const { data: freq } = await client.from("frequencia").select("*").eq("email",email);

  let soma = 0;
  let qtd = 0;
  let linhas = "";

  notas.forEach(n=>{
    const lista = freq.filter(f=>f.disciplina===n.nome);
    const total = lista.length;
    const pres = lista.filter(f=>f.presente).length;
    const perc = total>0 ? Math.round((pres/total)*100) : 0;

    const nota = parseFloat(n.nota) || 0;

    if(n.nota){
      soma += nota;
      qtd++;
    }

    linhas += `
      <tr>
        <td>${n.nome}</td>
        <td>${n.nota || "-"}</td>
        <td>${perc}%</td>
      </tr>
    `;
  });

  const media = qtd > 0 ? (soma / qtd).toFixed(1) : "-";
  const situacao = media >= 7 ? "APROVADO" : "REPROVADO";

  let html = `
    <div style="font-family:Segoe UI;padding:30px;max-width:800px;margin:auto;border:1px solid #ddd;border-radius:10px;">
      <h2 style="text-align:center;">🎓 FAESP</h2>

      <p><strong>Aluno:</strong> ${aluno.nome}</p>

      <table style="width:100%;border-collapse:collapse;">
        <tr style="background:#2c5364;color:white;">
          <th>Disciplina</th>
          <th>Nota</th>
          <th>Presença</th>
        </tr>
        ${linhas}
      </table>

      <div style="margin-top:20px;display:flex;justify-content:space-between;">
        <div>Média: ${media}</div>
        <div style="color:${situacao==='APROVADO'?'green':'red'}">${situacao}</div>
      </div>
    </div>
  `;

  const w = window.open("", "_blank");
  w.document.write(html);
  w.document.close();
}

      <button class="btn" onclick="finalizarPagamento()">Salvar Pagamento</button>

async function finalizarPagamento(){

  const valor = document.getElementById("valor").value;
  const forma = document.getElementById("forma").value;

  if (!valor || isNaN(valor)) {
    alert("Digite um valor válido");
    return;
  }

  if(!alunoSelecionado){
    alert("Selecione um aluno");
    return;
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const dataAtual = new Date().toLocaleDateString("pt-BR");

  // 🧾 MONTA PDF
  doc.text("RECIBO DE PAGAMENTO", 70, 20);
  doc.text("Recebedor: FAESP - Setor 30", 20, 40);

  doc.text(`Nome: ${alunoSelecionado.nome}`, 20, 60);
  doc.text(`CPF: ${alunoSelecionado.cpf}`, 20, 70);
  doc.text(`Curso: ${alunoSelecionado.curso}`, 20, 80);

  doc.text(`Matéria: ${materiaSelecionada}`, 20, 100);

  doc.text(`Valor: R$ ${valor}`, 20, 120);
  doc.text(`Forma: ${forma}`, 20, 130);
  doc.text(`Data: ${dataAtual}`, 20, 140);

  doc.text("São Paulo", 20, 160);

  doc.line(20, 180, 100, 180);
  doc.text("Matheus Campos", 20, 190);

  // 🔥 CONVERTE PDF DIRETO (sem baixar)
  const pdfBlob = doc.output("blob");

  const nomeArquivo = `recibo_${alunoSelecionado.id}_${Date.now()}.pdf`;

  // 🔥 UPLOAD AUTOMÁTICO
  const { error: uploadError } = await client.storage
    .from("comprovantes")
    .upload(nomeArquivo, pdfBlob);

  if (uploadError) {
    console.log(uploadError);
    alert("Erro ao subir PDF");
    return;
  }

  // 🔗 URL DO PDF
  const { data: urlData } = client.storage
    .from("comprovantes")
    .getPublicUrl(nomeArquivo);

  const pdfUrl = urlData.publicUrl;

  // 💾 SALVA NO BANCO
  const { error: insertError } = await client
    .from("pagamentos")
    .insert([{
      aluno_id: alunoSelecionado.id,
      nome_aluno: alunoSelecionado.nome,
      cpf: alunoSelecionado.cpf,
      curso: alunoSelecionado.curso,
      materia: materiaSelecionada,
      valor: parseFloat(valor),
      forma_pagamento: forma,
      recibo_url: pdfUrl
    }]);

  if (insertError) {
    console.log(insertError);
    alert("Erro ao salvar pagamento");
    return;
  }

  alert("Pagamento salvo com sucesso! 🎉");

  // 🧹 LIMPA TELA
  document.getElementById("valor").value = "";
  document.getElementById("areaPagamento").style.display = "none";
}
