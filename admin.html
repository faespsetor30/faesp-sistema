<!DOCTYPE html>
<html>
<head>
  <title>FAESP - Coordenação</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { margin:0; font-family:'Segoe UI'; display:flex; height:100vh; background:#eef2f7; flex-direction:column;}
    .main { display:flex; flex:1;}

    .sidebar {
      width:240px; background:white; padding:20px;
      display:flex; flex-direction:column; justify-content:space-between;
      border-right:1px solid #ddd; align-items:center;
    }

    .logo { width:120px; margin-bottom:10px;}

    .menu button {
      width:100%; padding:12px; margin-bottom:10px;
      border:none; background:#f1f5f9; border-radius:10px;
      cursor:pointer; text-align:left;
    }

    .menu button:hover { background:#e2e8f0;}

    .logout {
      background:black; color:white; font-weight:bold;
      padding:12px; border-radius:10px; border:none;
      width:100%;
    }

    .content { flex:1; padding:25px;}

    .header, .box {
      background:white; padding:20px; border-radius:12px;
      margin-bottom:20px;
      box-shadow:0 5px 15px rgba(0,0,0,0.05);
    }

    table { width:100%; border-collapse:collapse; margin-top:10px;}

    th, td {
      padding:10px;
      border-bottom:1px solid #ddd;
      text-align:center;
    }

    .btn {
      background:#2c5364; color:white; border:none;
      padding:6px 10px; border-radius:6px; cursor:pointer;
    }

    input, select {
      padding:8px; margin-top:5px; width:100%;
    }

    a.nome-link {
      color:#2c5364;
      font-weight:bold;
      text-decoration:none;
    }

    a.nome-link:hover { text-decoration:underline;}
  </style>
</head>

<body>

<div class="main">

  <div class="sidebar">
    <div style="width:100%; text-align:center;">
      <img src="logo faesp.png" class="logo">
      <h3>👑 COORDENAÇÃO</h3>

      <div class="menu">
        <button onclick="alunos()">📋 Cadastros</button>
        <button onclick="disciplinasMaster()">📚 Disciplinas</button>
        <button onclick="notas()">📝 Notas</button>
        <button onclick="frequencia()">📅 Presença</button>
      </div>
    </div>

    <button class="logout" onclick="sair()">🚪 Sair</button>
  </div>

  <div class="content">
    <div class="header">
      <h2>FAESP - SETOR 30</h2>
    </div>

    <div class="box" id="conteudo"></div>
  </div>

</div>

<script>

const client = supabase.createClient(
  "https://nzygdvixqmiltelgzzrn.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56eWdkdml4cW1pbHRlbGd6enJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDk5MjQsImV4cCI6MjA5MTY4NTkyNH0.wMaTGEgL_VCbSewnB-4BmdoA6rcGJWDsWIVaIo5dTy8"
);

// 🔐 proteção
const usuario = JSON.parse(localStorage.getItem("usuario"));
if (!usuario || usuario.tipo !== "Coordenacao") {
  window.location.href = "index.html";
}

function sair(){
  localStorage.removeItem("usuario");
  window.location.href="index.html";
}

//////////////////////////////////////////////////
// 👤 CADASTROS
//////////////////////////////////////////////////

async function alunos(){
  const { data } = await client.from("usuarios").select("*");

  let html = `
    <h3>📋 Cadastros</h3>

    <input id="nome" placeholder="Nome">
    <input id="email" placeholder="Email">

    <select id="tipo">
      <option value="Aluno">Aluno</option>
      <option value="Professor">Professor</option>
      <option value="Coordenacao">Coordenação</option>
    </select>

    <br><br>
    <button class="btn" onclick="cadastrarUsuario()">Cadastrar</button>

    <table>
      <tr>
        <th>Nome</th>
        <th>Email</th>
        <th>Curso</th>
        <th>Status</th>
        <th>Tipo</th>
        <th>Ações</th>
      </tr>
  `;

  data.forEach(u=>{
    html+=`
      <tr>
        <td><a class="nome-link" href="detalhe-aluno.html?id=${u.id}">${u.nome}</a></td>
        <td>${u.email}</td>
        <td>${u.curso || "Não definido"}</td>
        <td>${u.status}</td>

        <td>
          <select onchange="alterarTipo('${u.id}',this.value)">
            <option ${u.tipo==="Aluno"?"selected":""}>Aluno</option>
            <option ${u.tipo==="Professor"?"selected":""}>Professor</option>
            <option ${u.tipo==="Coordenacao"?"selected":""}>Coordenação</option>
          </select>
        </td>

        <td>
          <button class="btn" onclick="aprovar('${u.id}')">✔️</button>
          <button class="btn" style="background:red;" onclick="excluir('${u.id}')">🗑️</button>
        </td>
      </tr>
    `;
  });

  html+="</table>";
  conteudo.innerHTML=html;
}

async function cadastrarUsuario(){
  await client.from("usuarios").insert([{
    nome: nome.value,
    email: email.value,
    tipo: tipo.value,
    status:"pendente"
  }]);
  alunos();
}

async function alterarTipo(id,tipo){
  await client.from("usuarios").update({tipo}).eq("id",id);
  alunos();
}

async function aprovar(id){
  await client.from("usuarios").update({status:"ativo"}).eq("id",id);
  alunos();
}

async function excluir(id){
  if(!confirm("Excluir?")) return;
  await client.from("usuarios").delete().eq("id",id);
  alunos();
}

//////////////////////////////////////////////////
// 📚 DISCIPLINAS
//////////////////////////////////////////////////

async function disciplinasMaster(){

  let html=`
    <h3>📚 Disciplinas por Curso</h3>

    <select id="cursoMaster" onchange="carregarDisciplinasCurso()">
      <option value="Curso Básico">Curso Básico</option>
      <option value="Curso Médio">Curso Médio</option>
    </select>

    <input id="nomeDisciplina" placeholder="Nome da disciplina">

    <button class="btn" onclick="salvarDisciplinaMaster()">Cadastrar</button>

    <div id="tabela"></div>
  `;

  conteudo.innerHTML=html;
  carregarDisciplinasCurso();
}

async function carregarDisciplinasCurso(){

  const { data } = await client
    .from("disciplinas_master")
    .select("*")
    .eq("curso", cursoMaster.value);

  let html=`<table>
    <tr><th>Curso</th><th>Disciplina</th><th>Histórico</th><th>Ação</th></tr>`;

  data.forEach(d=>{
    html+=`
      <tr>
        <td>${d.curso}</td>
        <td>${d.nome}</td>
        <td><button class="btn" onclick="abrirHistorico('${d.nome}','${d.curso}')">📄</button></td>
        <td><button class="btn" style="background:red;" onclick="excluirDisciplina('${d.id}')">🗑️</button></td>
      </tr>`;
  });

  html+="</table>";
  tabela.innerHTML=html;
}

async function salvarDisciplinaMaster(){
  await client.from("disciplinas_master").insert([{
    curso:cursoMaster.value,
    nome:nomeDisciplina.value
  }]);
  carregarDisciplinasCurso();
}

async function excluirDisciplina(id){
  if(!confirm("Excluir disciplina?")) return;
  await client.from("disciplinas_master").delete().eq("id",id);
  carregarDisciplinasCurso();
}

//////////////////////////////////////////////////
// 📄 HISTÓRICO
//////////////////////////////////////////////////

async function abrirHistorico(disciplina, curso){

  const { data } = await client
    .from("disciplinas_historico")
    .select("*")
    .eq("disciplina", disciplina)
    .eq("curso", curso);

  let html = `
    <h3>📄 Histórico - ${disciplina}</h3>

    <input id="profHist" placeholder="Professor">
    <input id="inicioHist" type="date">
    <input id="fimHist" type="date">

    <button class="btn" onclick="salvarHistorico('${disciplina}','${curso}')">Salvar</button>

    <table>
      <tr><th>Professor</th><th>Início</th><th>Fim</th></tr>
  `;

  data.forEach(h=>{
    html+=`
      <tr>
        <td>${h.professor}</td>
        <td>${h.data_inicio}</td>
        <td>${h.data_fim || "-"}</td>
      </tr>`;
  });

  html+="</table>";
  conteudo.innerHTML=html;
}

async function salvarHistorico(disciplina, curso){
  await client.from("disciplinas_historico").insert([{
    disciplina,
    curso,
    professor:profHist.value,
    data_inicio:inicioHist.value,
    data_fim:fimHist.value || null
  }]);
  abrirHistorico(disciplina, curso);
}

//////////////////////////////////////////////////
// 📝 NOTAS
//////////////////////////////////////////////////

async function notas(){

  const { data: alunos } = await client.from("usuarios").select("*").eq("tipo","Aluno");

  let html=`
    <h3>📝 Notas</h3>

    <select id="alunoSelect" onchange="carregarNotasAluno()">
      <option value="">Selecione</option>
      ${alunos.map(a=>`<option value="${a.email}">${a.nome}</option>`).join("")}
    </select>

    <button class="btn" onclick="gerarBoletim()">📊 Boletim</button>

    <div id="tabelaNotas"></div>
  `;

  conteudo.innerHTML=html;
}

async function carregarNotasAluno(){

  const email = alunoSelect.value;

  const { data: disciplinasMaster } = await client.from("disciplinas_master").select("*");
  const { data: notas } = await client.from("disciplinas").select("*").eq("email",email);

  let html="<table><tr><th>Disciplina</th><th>Nota</th></tr>";

  disciplinasMaster.forEach(d=>{
    const nota = notas.find(n=>n.nome===d.nome);
    html+=`
      <tr>
        <td>${d.nome}</td>
        <td><input value="${nota?nota.nota:""}" onchange="salvarNota('${email}','${d.nome}',this.value)"></td>
      </tr>`;
  });

  html+="</table>";
  tabelaNotas.innerHTML=html;
}

async function salvarNota(email,nome,nota){

  const { data } = await client.from("disciplinas").select("*").eq("email",email).eq("nome",nome);

  if(data.length>0){
    await client.from("disciplinas").update({nota}).eq("id",data[0].id);
  }else{
    await client.from("disciplinas").insert([{email,nome,nota}]);
  }
}

//////////////////////////////////////////////////
// 📅 PRESENÇA
//////////////////////////////////////////////////

async function frequencia(){

  const { data: alunos } = await client.from("usuarios").select("*").eq("tipo","Aluno");
  const { data: disciplinas } = await client.from("disciplinas_master").select("*");

  let html=`
    <h3>📅 Presença</h3>

    <select id="alunoFreq">
      ${alunos.map(a=>`<option value="${a.email}">${a.nome}</option>`).join("")}
    </select>

    <select id="disciplinaFreq">
      ${disciplinas.map(d=>`<option>${d.nome}</option>`).join("")}
    </select>

    <input type="date" id="dataFreq">

    <select id="presenca">
      <option value="true">Presente</option>
      <option value="false">Falta</option>
    </select>

    <button class="btn" onclick="salvarFrequencia()">Salvar</button>
  `;

  conteudo.innerHTML=html;
}

async function salvarFrequencia(){

  await client.from("frequencia").insert([{
    email: alunoFreq.value,
    disciplina: disciplinaFreq.value,
    data: dataFreq.value,
    presente: presenca.value==="true"
  }]);

  alert("Salvo!");
}

//////////////////////////////////////////////////
// 📊 BOLETIM
//////////////////////////////////////////////////

async function gerarBoletim(){

  const email = alunoSelect.value;

  const { data: aluno } = await client.from("usuarios").select("*").eq("email",email).single();
  const { data: notas } = await client.from("disciplinas").select("*").eq("email",email);
  const { data: freq } = await client.from("frequencia").select("*").eq("email",email);

  let html=`
    <div style="font-family:Segoe UI;padding:20px">
      <h2 style="text-align:center">📊 BOLETIM FAESP</h2>
      <h3>${aluno.nome}</h3>

      <table style="width:100%">
        <tr>
          <th>Disciplina</th>
          <th>Nota</th>
          <th>Presença</th>
        </tr>
  `;

  notas.forEach(n=>{

    const lista = freq.filter(f=>f.disciplina===n.nome);
    const total = lista.length;
    const pres = lista.filter(f=>f.presente).length;

    const perc = total>0 ? Math.round((pres/total)*100) : 0;

    html+=`
      <tr>
        <td>${n.nome}</td>
        <td>${n.nota||"-"}</td>
        <td>${perc}%</td>
      </tr>
    `;
  });

  html+="</table></div>";

  const w = window.open();
  w.document.write(html);
}

</script>

</body>
</html>
