async function dashboard(){
  const { data: usuarios } = await client.from("usuarios").select("*");
  const { data: hist } = await client.from("disciplinas_historico").select("*");

  const alunos = usuarios.filter(u=>u.tipo==="Aluno").length;
  const professores = usuarios.filter(u=>u.tipo==="Professor").length;
  const ativos = usuarios.filter(u=>u.status==="ativo").length;

  const hoje = new Date().toISOString().split("T")[0];

  const atuais = hist.filter(h=>{
    return h.data_inicio <= hoje && (!h.data_fim || h.data_fim >= hoje);
  });

  let lista = "";

  atuais.forEach(a=>{
    lista += `
      <div style="padding:10px;background:#f1f5f9;margin:5px;border-radius:8px">
        📘 <strong>${a.curso}</strong> - ${a.disciplina}<br>
        📅 ${a.data_inicio} até ${a.data_fim || "Atual"}
      </div>
    `;
  });

  conteudo.innerHTML = `
    <h2>📊 Dashboard</h2>
    <div style="display:flex; gap:20px; flex-wrap:wrap;">
      <div>👨‍🎓 ${alunos}</div>
      <div>👨‍🏫 ${professores}</div>
      <div>✅ ${ativos}</div>
    </div>
    ${lista}
  `;
}

//////////////////////////////////////////////////
// 📊 BOLETIM
//////////////////////////////////////////////////

async function gerarBoletim(){

  const email = alunoSelect.value;

  if(!email){
    alert("Selecione um aluno");
    return;
  }

  const { data: aluno } = await client.from("usuarios").select("*").eq("email",email).single();
  const { data: notas } = await client.from("disciplinas").select("*").eq("email",email);
  const { data: freq } = await client.from("frequencia").select("*").eq("email",email);

  let soma = 0;
  let qtd = 0;
  let linhas = "";

  notas.forEach(n=>{
    const lista = freq.filter(f=>f.disciplina===n.nome);
    const total = lista.length;
    const pres = lista.filter(f=>f.presente).length;
    const perc = total>0 ? Math.round((pres/total)*100) : 0;

    const nota = parseFloat(n.nota) || 0;

    if(n.nota){
      soma += nota;
      qtd++;
    }

    linhas += `
      <tr>
        <td>${n.nome}</td>
        <td>${n.nota || "-"}</td>
        <td>${perc}%</td>
      </tr>
    `;
  });

  const media = qtd > 0 ? (soma / qtd).toFixed(1) : "-";
  const situacao = media >= 7 ? "APROVADO" : "REPROVADO";

  let html = `
    <div style="font-family:Segoe UI;padding:30px;max-width:800px;margin:auto;border:1px solid #ddd;border-radius:10px;">
      <h2 style="text-align:center;">🎓 FAESP</h2>

      <p><strong>Aluno:</strong> ${aluno.nome}</p>

      <table style="width:100%;border-collapse:collapse;">
        <tr style="background:#2c5364;color:white;">
          <th>Disciplina</th>
          <th>Nota</th>
          <th>Presença</th>
        </tr>
        ${linhas}
      </table>

      <div style="margin-top:20px;display:flex;justify-content:space-between;">
        <div>Média: ${media}</div>
        <div style="color:${situacao==='APROVADO'?'green':'red'}">${situacao}</div>
      </div>
    </div>
  `;

  const w = window.open("", "_blank");
  w.document.write(html);
  w.document.close();
}

async function salvarFinanceiro(){

  const status = document.getElementById("statusFin").value;
  const data = document.getElementById("dataFin").value;

  const alunoSelecionado = alunoSelect.options[alunoSelect.selectedIndex].text;
  const email = alunoSelect.value;

  await client.from("financeiro").insert([{
    email: email,
    disciplina: disciplina,
    valor: Number(valor),
    status: status,
    data_pagamento: data,
    pdf_url: ""
  }]);

  gerarPDFPagamento({
    aluno: alunoSelecionado,
    email: email,
    disciplina: disciplina,
    valor: valor,
    status: status,
    data: data
  });

  financeiro();
}

async function gerarPDFPagamento(dados){

  doc.setFont("helvetica","bold");
  doc.setFontSize(16);
  doc.text("FAESP - SETOR 30", 20, 20);

  doc.setFontSize(12);
  doc.setFont("helvetica","normal");

  doc.text(`Aluno: ${dados.aluno}`, 20, 40);
  doc.text(`Email: ${dados.email}`, 20, 50);
  doc.text(`Disciplina: ${dados.disciplina}`, 20, 60);
  doc.text(`Valor: R$ ${dados.valor}`, 20, 70);
  doc.text(`Status: ${dados.status}`, 20, 80);
  doc.text(`Data: ${dados.data}`, 20, 90);

  doc.text("_________________________________", 20, 120);
  doc.text("Coordenação FAESP", 20, 130);

  doc.save(`recibo-${dados.aluno}.pdf`);
}
