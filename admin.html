<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>FAESP - Coordenação</title>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>

  <style>
    body { margin:0; font-family:'Segoe UI'; height:100vh; background:#eef2f7; }
    .main { display:flex; height:100%; }
    .sidebar {
      width:240px; background:white; padding:20px;
      display:flex; flex-direction:column; justify-content:space-between;
      border-right:1px solid #ddd; align-items:center;
    }
    .logo { width:120px; margin-bottom:10px; }
    .menu button {
      width:100%; padding:12px; margin-bottom:10px;
      border:none; background:#f1f5f9; border-radius:10px;
      cursor:pointer; text-align:left;
    }
    .menu button:hover { background:#e2e8f0; }
    .logout {
      background:black; color:white; font-weight:bold;
      padding:12px; border-radius:10px; border:none; width:100%;
    }
    .content { flex:1; padding:25px; }
    .header, .box {
      background:white; padding:20px; border-radius:12px;
      margin-bottom:20px;
      box-shadow:0 5px 15px rgba(0,0,0,0.05);
    }
    table { width:100%; border-collapse:collapse; margin-top:15px; }
    th, td { padding:10px; border-bottom:1px solid #ddd; text-align:center; }
    .btn { background:#2c5364; color:white; border:none; padding:6px 10px; border-radius:6px; cursor:pointer; }
    input, select { padding:8px; margin-top:5px; width:100%; }
    a.nome-link { color:#2c5364; font-weight:bold; text-decoration:none; }
  </style>
</head>

<body>

<div class="main">

  <div class="sidebar">
    <div style="width:100%; text-align:center;">
      <img src="logo-faesp.png" class="logo">
      <h3>👑 COORDENAÇÃO</h3>

      <div class="menu">
        <button onclick="alunos()">📋 Cadastros</button>
        <button onclick="disciplinasMaster()">📚 Disciplinas</button>
        <button onclick="notas()">📝 Notas</button>
        <button onclick="frequencia()">📅 Presença</button>
      </div>
    </div>

    <button class="logout" onclick="sair()">🚪 Sair</button>
  </div>

  <div class="content">
    <div class="header">
      <h2>FAESP - SETOR 30</h2>
    </div>
    <div class="box" id="conteudo"></div>
  </div>

</div>

<script>
const client = supabase.createClient(
  "https://nzygdvixqmiltelgzzrn.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56eWdkdml4cW1pbHRlbGd6enJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDk5MjQsImV4cCI6MjA5MTY4NTkyNH0.wMaTGEgL_VCbSewnB-4BmdoA6rcGJWDsWIVaIo5dTy8"
);

// proteção simples
const usuario = JSON.parse(localStorage.getItem("usuario"));
if (!usuario || usuario.tipo !== "Coordenacao") {
  window.location.href = "index.html";
}

function sair(){
  localStorage.removeItem("usuario");
  window.location.href="index.html";
}

//////////////////////////////////////////////////
// 👤 CADASTROS
//////////////////////////////////////////////////
async function alunos(){
  const { data } = await client.from("usuarios").select("*");

  let html = `
    <h3>📋 Cadastros</h3>
    <input id="nome" placeholder="Nome">
    <input id="email" placeholder="Email">
    <select id="tipo">
      <option>Aluno</option>
      <option>Professor</option>
      <option>Coordenacao</option>
    </select>
    <button class="btn" onclick="cadastrarUsuario()">Cadastrar</button>

    <table>
      <tr><th>Nome</th><th>Email</th><th>Curso</th><th>Status</th><th>Tipo</th><th>Ações</th></tr>
  `;

  data.forEach(u=>{
    html+=`
      <tr>
        <td><a class="nome-link">${u.nome}</a></td>
        <td>${u.email}</td>
        <td>${u.curso || "-"}</td>
        <td>${u.status}</td>
        <td>${u.tipo}</td>
        <td>
          <button class="btn" onclick="aprovar('${u.id}')">✔️</button>
          <button class="btn" style="background:red" onclick="excluir('${u.id}')">🗑️</button>
        </td>
      </tr>
    `;
  });

  conteudo.innerHTML = html + "</table>";
}

async function cadastrarUsuario(){
  if(!nome.value || !email.value) return alert("Preencha tudo");
  await client.from("usuarios").insert([{ nome:nome.value, email:email.value, tipo:tipo.value, status:"pendente" }]);
  alunos();
}

async function aprovar(id){
  await client.from("usuarios").update({status:"ativo"}).eq("id",id);
  alunos();
}

async function excluir(id){
  if(confirm("Excluir usuário?")){
    await client.from("usuarios").delete().eq("id",id);
    alunos();
  }
}

//////////////////////////////////////////////////
// 📚 DISCIPLINAS
//////////////////////////////////////////////////
async function disciplinasMaster(){
  const { data } = await client.from("disciplinas_master").select("*");

  let html = `
    <h3>📚 Disciplinas</h3>
    <input id="nomeDisc" placeholder="Disciplina">
    <input id="cursoDisc" placeholder="Curso">
    <button class="btn" onclick="salvarDisc()">Salvar</button>
    <table><tr><th>Curso</th><th>Disciplina</th></tr>
  `;

  data.forEach(d=>{
    html+=`<tr><td>${d.curso}</td><td>${d.nome}</td></tr>`;
  });

  conteudo.innerHTML = html + "</table>";
}

async function salvarDisc(){
  await client.from("disciplinas_master").insert([{ nome:nomeDisc.value, curso:cursoDisc.value }]);
  disciplinasMaster();
}

//////////////////////////////////////////////////
// 📝 NOTAS + PDF
//////////////////////////////////////////////////
async function notas(){
  const { data: alunos } = await client.from("usuarios").select("*").eq("tipo","Aluno");

  conteudo.innerHTML = `
    <h3>📝 Notas</h3>
    <select id="alunoSelect">${alunos.map(a=>`<option value="${a.email}">${a.nome}</option>`)}</select>
    <button class="btn" onclick="gerarBoletim()">📊 Gerar Boletim PDF</button>
  `;
}

//////////////////////////////////////////////////
// 📅 PRESENÇA
//////////////////////////////////////////////////
async function frequencia(){
  const { data: alunos } = await client.from("usuarios").select("*").eq("tipo","Aluno");
  const { data: disc } = await client.from("disciplinas_master").select("*");

  conteudo.innerHTML = `
    <h3>📅 Presença</h3>
    <select id="alunoP">${alunos.map(a=>`<option value="${a.email}">${a.nome}</option>`)}</select>
    <select id="discP">${disc.map(d=>`<option>${d.nome}</option>`)}</select>
    <input type="date" id="dataP">
    <select id="presP"><option>true</option><option>false</option></select>
    <button class="btn" onclick="salvarF()">Salvar</button>
  `;
}

async function salvarF(){
  await client.from("frequencia").insert([{ email:alunoP.value, disciplina:discP.value, data:dataP.value, presente:presP.value==="true" }]);
  alert("Salvo");
}

//////////////////////////////////////////////////
// 📊 BOLETIM PDF
//////////////////////////////////////////////////
async function gerarBoletim(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const email = alunoSelect.value;
  const { data: aluno } = await client.from("usuarios").select("*").eq("email",email).single();
  const { data: notas } = await client.from("disciplinas").select("*").eq("email",email);
  const { data: freq } = await client.from("frequencia").select("*").eq("email",email);

  const logo = new Image();
  logo.src = "logo faesp.png";
  await new Promise(r=>logo.onload=r);

  doc.addImage(logo,"PNG",15,10,30,30);
  doc.text("FAESP - SETOR 30",105,20,{align:"center"});
  doc.text(`Aluno: ${aluno.nome}`,15,55);

  const linhas = notas.map(n=>{
    const p = freq.filter(f=>f.disciplina===n.nome);
    const perc = p.length?Math.round((p.filter(f=>f.presente).length/p.length)*100):0;
    return [n.nome,n.nota||"-",perc+"%"];
  });

  doc.autoTable({ startY:65, head:[["Disciplina","Nota","Presença"]], body:linhas });
  doc.save(`Boletim_${aluno.nome}.pdf`);
}
</script>

</body>
</html>
``
