<!DOCTYPE html>
<html>
<head>
  <title>FAESP - Coordenação</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { margin:0; font-family:'Segoe UI'; display:flex; height:100vh; background:#eef2f7; flex-direction:column;}
    .main { display:flex; flex:1;}

    .sidebar {
      width:240px; background:white; padding:20px;
      display:flex; flex-direction:column; justify-content:space-between;
      border-right:1px solid #ddd; align-items:center;
    }

    .logo { width:120px; margin-bottom:10px;}

    .menu { width:100%; }

    .menu button {
      width:100%; padding:12px; margin-bottom:10px;
      border:none; background:#f1f5f9; border-radius:10px;
      cursor:pointer; text-align:left;
    }

    .menu button:hover { background:#e2e8f0; }

    .logout {
      background:black; color:white; font-weight:bold;
      padding:12px; border-radius:10px; border:none;
      width:100%;
    }

    .content { flex:1; padding:25px; }

    .header {
      background:white; padding:20px; border-radius:12px;
      margin-bottom:20px; box-shadow:0 5px 15px rgba(0,0,0,0.05);
    }

    .box {
      background:white; padding:20px; border-radius:12px;
      box-shadow:0 5px 15px rgba(0,0,0,0.05);
    }

    table { width:100%; border-collapse:collapse; margin-top:10px;}
    th, td { padding:10px; border-bottom:1px solid #ddd; text-align:center;}
    th { background:#f8fafc;}

    .btn { background:#2c5364; color:white; border:none; padding:6px 10px; border-radius:6px;}
    .danger { background:red; color:white;}
    .gray { background:#6b7280; color:white;}

    input, select { padding:8px; margin-top:5px; width:100%; }

    a { color:#2c5364; font-weight:bold; text-decoration:none;}
  </style>
</head>

<body>

<div class="main">

  <div class="sidebar">
    <div style="width:100%; text-align:center;">
      <img src="logo faesp.png" class="logo">
      <h3>👑 COORDENAÇÃO</h3>

      <div class="menu">
        <button onclick="alunos()">📋 Cadastros</button>
        <button onclick="disciplinas()">📚 Disciplinas</button>
      </div>
    </div>

    <button class="logout" onclick="sair()">🚪 Sair</button>
  </div>

  <div class="content">
    <div class="header">
      <h2>FAESP - SETOR 30 (COORDENAÇÃO)</h2>
      <p>Painel administrativo</p>
    </div>

    <div class="box" id="conteudo"></div>
  </div>

</div>

<script>

const client = supabase.createClient(
  "https://nzygdvixqmiltelgzzrn.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56eWdkdml4cW1pbHRlbGd6enJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDk5MjQsImV4cCI6MjA5MTY4NTkyNH0.wMaTGEgL_VCbSewnB-4BmdoA6rcGJWDsWIVaIo5dTy8"
);

// 🔐 PROTEÇÃO
const usuario = JSON.parse(localStorage.getItem("usuario"));
if (!usuario || usuario.tipo !== "Coordenacao") {
  window.location.href = "index.html";
}

// LOGOUT
function sair(){
  localStorage.removeItem("usuario");
  window.location.href="index.html";
}

// 📋 CADASTROS
async function alunos(){

  const { data } = await client.from("usuarios").select("*");

  let html = `
  <h3>📋 Cadastros</h3>

  <input id="nome" placeholder="Nome">
  <input id="email" placeholder="Email">

  <select id="curso">
    <option value="">Selecione o curso</option>
    <option value="Curso Básico">Curso Básico</option>
    <option value="Curso Médio">Curso Médio</option>
  </select>

  <select id="tipo">
    <option value="Aluno">Aluno</option>
    <option value="Professor">Professor</option>
    <option value="Coordenacao">Coordenação</option>
  </select>

  <br><br>
  <button class="btn" onclick="cadastrarUsuario()">Cadastrar</button>

  <table>
    <tr>
      <th>Nome</th>
      <th>Email</th>
      <th>Curso</th>
      <th>Status</th>
      <th>Tipo</th>
      <th>Ações</th>
    </tr>
  `;

  data.forEach(u=>{
    html+=`
    <tr>
      <td><a href="detalhe-aluno.html?id=${u.id}">${u.nome}</a></td>
      <td>${u.email}</td>
      <td>${u.curso || "Não definido"}</td>
      <td>${u.status}</td>

      <td>
        <select onchange="alterarTipo('${u.id}', this.value)">
          <option ${u.tipo==="Aluno"?"selected":""}>Aluno</option>
          <option ${u.tipo==="Professor"?"selected":""}>Professor</option>
          <option ${u.tipo==="Coordenacao"?"selected":""}>Coordenação</option>
        </select>
      </td>

      <td>
        ${
          u.status==="pendente"
          ? `<button class="btn" onclick="aprovar('${u.id}')">✅</button>
             <button class="danger" onclick="recusar('${u.id}')">❌</button>`
          : "✔️"
        }
        <button class="gray" onclick="excluir('${u.id}')">🗑️</button>
      </td>
    </tr>
    `;
  });

  html+="</table>";

  document.getElementById("conteudo").innerHTML=html;
}

// FUNÇÕES
async function cadastrarUsuario(){
  const curso=document.getElementById("curso").value;
  if(!curso){ alert("Selecione o curso"); return;}

  await client.from("usuarios").insert([{
    nome:document.getElementById("nome").value,
    email:document.getElementById("email").value,
    curso,
    tipo:document.getElementById("tipo").value,
    status:"pendente"
  }]);

  alert("Cadastrado!");
  alunos();
}

async function alterarTipo(id,tipo){
  await client.from("usuarios").update({tipo}).eq("id",id);
  alunos();
}

async function aprovar(id){
  await client.from("usuarios").update({status:"ativo"}).eq("id",id);
  alunos();
}

async function recusar(id){
  await client.from("usuarios").update({status:"recusado"}).eq("id",id);
  alunos();
}

async function excluir(id){
  if(!confirm("Excluir?")) return;
  await client.from("usuarios").delete().eq("id",id);
  alunos();
}

function disciplinas(){
  document.getElementById("conteudo").innerHTML="📚 Em construção";
}

// LOAD
alunos();

</script>

</body>
</html>
