<!DOCTYPE html>
<html>
<head>
  <title>FAESP - Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      height: 100vh;
      background: #eef2f7;
      flex-direction: column;
    }

    .main { display: flex; flex: 1; }

    .sidebar {
      width: 240px;
      background: white;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border-right: 1px solid #ddd;
      align-items: center;
    }

    .logo {
      width: 120px;
      margin-bottom: 10px;
    }

    .menu { width: 100%; }

    .menu button {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border: none;
      background: #f1f5f9;
      border-radius: 10px;
      cursor: pointer;
      text-align: left;
      font-weight: 500;
    }

    .menu button:hover {
      background: #e2e8f0;
    }

    .logout {
      background: black;
      color: white;
      font-weight: bold;
      padding: 12px;
      border-radius: 10px;
      border: none;
      width: 100%;
      cursor: pointer;
    }

    .content {
      flex: 1;
      padding: 25px;
    }

    .header {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    .footer {
      background: #1e293b;
      color: white;
      text-align: center;
      padding: 10px;
      font-size: 13px;
    }

    table {
      width:100%;
      border-collapse: collapse;
      margin-top:10px;
    }

    th, td {
      padding:10px;
      border-bottom:1px solid #ddd;
    }

    th { background:#f8fafc; }

    .btn {
      background:#2c5364;
      color:white;
      border:none;
      padding:6px 10px;
      border-radius:6px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div class="main">

  <div class="sidebar">
    <div style="width:100%; text-align:center;">
      <img src="logo faesp.png" class="logo">
      <h3>👑 ADMIN</h3>

      <div class="menu">
        <button onclick="alunos()">👨‍🎓 Alunos</button>
        <button onclick="disciplinas()">📚 Disciplinas</button>
        <button onclick="notas()">📝 Notas</button>
        <button onclick="professores()">👨‍🏫 Professores</button>
        <button onclick="financeiro()">💰 Financeiro</button>
        <button onclick="avisos()">📢 Avisos</button>
        <button onclick="cronograma()">📅 Cronograma</button>
      </div>
    </div>

    <button class="logout" onclick="sair()">🚪 Sair</button>
  </div>

  <div class="content">

    <div class="header">
      <h2>FAESP - SETOR 30 (ADMIN)</h2>
      <p>Painel administrativo</p>
    </div>

    <div class="box" id="conteudo">
      Bem-vinda ao painel ADM 👑
    </div>

  </div>

</div>

<div class="footer">
  AD. Belém - Rua Rio Tiete, 126 - Jardim Europa - Campo Limpo Paulista - SP
</div>

<script>
const client = supabase.createClient(
  "https://nzygdvixqmiltelgzzrn.supabase.co",
  "SUA_CHAVE_AQUI"
);

// LOGOUT
function sair() {
  localStorage.removeItem("usuario");
  window.location.href = "index.html";
}

// 🔥 FUNÇÃO REAL DE ALUNOS
async function alunos() {
  try {
    const { data, error } = await client
      .from("usuarios")
      .select("*");

    if (error) {
      console.error(error);
      document.getElementById("conteudo").innerHTML = "Erro ao carregar alunos";
      return;
    }

    let html = "<h3>👨‍🎓 Alunos</h3>";
    html += "<table><tr><th>Nome</th><th>Email</th><th>Status</th><th>Ação</th></tr>";

    data.forEach(u => {
      html += `
        <tr>
          <td>${u.nome}</td>
          <td>${u.email}</td>
          <td>${u.status}</td>
          <td>
            ${u.status !== "ativo"
              ? `<button class="btn" onclick="aprovarAluno('${u.id}')">Aprovar</button>`
              : "✔️"}
          </td>
        </tr>
      `;
    });

    html += "</table>";

    document.getElementById("conteudo").innerHTML = html;

  } catch (e) {
    console.error(e);
    document.getElementById("conteudo").innerHTML = "Erro ao carregar alunos";
  }
}

// 🔥 APROVAR ALUNO
async function aprovarAluno(id) {
  await client
    .from("usuarios")
    .update({ status: "ativo" })
    .eq("id", id);

  alert("Aluno aprovado!");
  alunos();
}

// OUTROS (placeholder)
function disciplinas(){document.getElementById("conteudo").innerHTML="📚 Disciplinas";}
function notas(){document.getElementById("conteudo").innerHTML="📝 Notas";}
function professores(){document.getElementById("conteudo").innerHTML="👨‍🏫 Professores";}
function financeiro(){document.getElementById("conteudo").innerHTML="💰 Financeiro";}
function avisos(){document.getElementById("conteudo").innerHTML="📢 Avisos";}
function cronograma(){document.getElementById("conteudo").innerHTML="📅 Cronograma";}
</script>

</body>
</html>
