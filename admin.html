<!DOCTYPE html>
<html>
<head>
  <title>FAESP - Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      height: 100vh;
      background: #eef2f7;
      flex-direction: column;
    }

    .main { display: flex; flex: 1; }

    .sidebar {
      width: 240px;
      background: white;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border-right: 1px solid #ddd;
      align-items: center;
    }

    .logo { width: 120px; margin-bottom: 10px; }

    .menu { width: 100%; }

    .menu button {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border: none;
      background: #f1f5f9;
      border-radius: 10px;
      cursor: pointer;
      text-align: left;
      font-weight: 500;
    }

    .menu button:hover { background: #e2e8f0; }

    .logout {
      background: black;
      color: white;
      font-weight: bold;
      padding: 12px;
      border-radius: 10px;
      border: none;
      width: 100%;
      cursor: pointer;
    }

    .content { flex: 1; padding: 25px; }

    .header {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    .footer {
      background: #1e293b;
      color: white;
      text-align: center;
      padding: 10px;
      font-size: 13px;
    }

    table {
      width:100%;
      border-collapse: collapse;
      margin-top:10px;
    }

    th, td {
      padding:10px;
      border-bottom:1px solid #ddd;
    }

    th { background:#f8fafc; }

    .btn {
      background:#2c5364;
      color:white;
      border:none;
      padding:6px 10px;
      border-radius:6px;
      cursor:pointer;
    }

    .btn-danger {
      background:#dc2626;
      margin-left:5px;
    }

    .top-bar {
      display:flex;
      gap:10px;
      margin-bottom:10px;
      flex-wrap:wrap;
    }

    input, select {
      padding:8px;
      border-radius:6px;
      border:1px solid #ccc;
    }

    .contador {
      font-weight:bold;
      margin-bottom:10px;
    }
  </style>
</head>

<body>

<div class="main">

  <div class="sidebar">
    <div style="width:100%; text-align:center;">
      <img src="logo faesp.png" class="logo">
      <h3>👑 ADMIN</h3>

      <div class="menu">
        <button onclick="alunos()">👨‍🎓 Alunos</button>
        <button onclick="disciplinas()">📚 Disciplinas</button>
        <button onclick="notas()">📝 Notas</button>
        <button onclick="professores()">👨‍🏫 Professores</button>
        <button onclick="financeiro()">💰 Financeiro</button>
        <button onclick="avisos()">📢 Avisos</button>
        <button onclick="cronograma()">📅 Cronograma</button>
      </div>
    </div>

    <button class="logout" onclick="sair()">🚪 Sair</button>
  </div>

  <div class="content">

    <div class="header">
      <h2>FAESP - SETOR 30 (ADMIN)</h2>
      <p>Painel administrativo</p>
    </div>

    <div class="box" id="conteudo">
      Bem-vinda ao painel ADM 👑
    </div>

  </div>

</div>

<div class="footer">
  AD. Belém - Rua Rio Tiete, 126 - Jardim Europa - Campo Limpo Paulista - SP
</div>

<script>
const client = supabase.createClient(
  "https://nzygdvixqmiltelgzzrn.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56eWdkdml4cW1pbHRlbGd6enJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDk5MjQsImV4cCI6MjA5MTY4NTkyNH0.wMaTGEgL_VCbSewnB-4BmdoA6rcGJWDsWIVaIo5dTy8"
);

// LOGOUT
function sair() {
  localStorage.removeItem("usuario");
  window.location.href = "index.html";
}

// 🔥 ALUNOS COMPLETO
async function alunos() {
  const { data } = await client.from("usuarios").select("*");

  let pendentes = data.filter(u => u.status === "pendente").length;
  let ativos = data.filter(u => u.status === "ativo").length;

  let html = `
    <h3>👨‍🎓 Alunos</h3>

    <div class="contador">
      📊 Ativos: ${ativos} | ⏳ Pendentes: ${pendentes}
    </div>

    <div class="top-bar">
      <input id="buscaAluno" placeholder="🔎 Buscar..." onkeyup="filtrar()">
      <select id="filtroStatus" onchange="filtrar()">
        <option value="">Todos</option>
        <option value="ativo">Ativo</option>
        <option value="pendente">Pendente</option>
        <option value="recusado">Recusado</option>
      </select>
      <button class="btn" onclick="exportarExcel()">📥 Exportar</button>
    </div>

    <table id="tabela">
      <tr><th>Nome</th><th>Email</th><th>Status</th><th>Ação</th></tr>
  `;

  data.forEach(u => {
    html += `
      <tr>
        <td>${u.nome}</td>
        <td>${u.email}</td>
        <td>${u.status}</td>
        <td>
          ${u.status === "pendente"
            ? `
              <button class="btn" onclick="aprovarAluno('${u.id}','${u.nome}')">✔️</button>
              <button class="btn btn-danger" onclick="recusarAluno('${u.id}')">❌</button>
            `
            : u.status === "ativo" ? "✔️" : "❌"}
        </td>
      </tr>
    `;
  });

  html += "</table>";

  document.getElementById("conteudo").innerHTML = html;

  // 🔔 NOTIFICAÇÃO
  if (pendentes > 0) {
    alert("⚠️ Existem " + pendentes + " alunos pendentes!");
  }
}

// 🔎 FILTRO
function filtrar() {
  const busca = document.getElementById("buscaAluno").value.toLowerCase();
  const status = document.getElementById("filtroStatus").value;

  document.querySelectorAll("#tabela tr").forEach((tr, i) => {
    if (i === 0) return;

    const nome = tr.children[0].innerText.toLowerCase();
    const email = tr.children[1].innerText.toLowerCase();
    const st = tr.children[2].innerText;

    const ok = (nome.includes(busca) || email.includes(busca)) &&
               (!status || st === status);

    tr.style.display = ok ? "" : "none";
  });
}

// 📥 EXPORTAR
function exportarExcel() {
  let tabela = document.getElementById("tabela").outerHTML;
  let blob = new Blob([tabela], { type: "application/vnd.ms-excel" });
  let link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "alunos.xls";
  link.click();
}

// 🔥 APROVAR
async function aprovarAluno(id, nome) {
  await client.from("usuarios").update({ status: "ativo" }).eq("id", id);
  alert("✅ " + nome + " aprovado!");
  alunos();
}

// 🔥 RECUSAR
async function recusarAluno(id) {
  await client.from("usuarios").update({ status: "recusado" }).eq("id", id);
  alert("❌ Aluno recusado!");
  alunos();
}

// OUTROS
function disciplinas(){document.getElementById("conteudo").innerHTML="📚 Disciplinas";}
function notas(){document.getElementById("conteudo").innerHTML="📝 Notas";}
function professores(){document.getElementById("conteudo").innerHTML="👨‍🏫 Professores";}
function financeiro(){document.getElementById("conteudo").innerHTML="💰 Financeiro";}
function avisos(){document.getElementById("conteudo").innerHTML="📢 Avisos";}
function cronograma(){document.getElementById("conteudo").innerHTML="📅 Cronograma";}
</script>

</body>
</html>
