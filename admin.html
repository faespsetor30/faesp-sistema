<!DOCTYPE html>
<html>
<head>
  <title>FAESP - Coordenação</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; background: #eef2f7; flex-direction: column; }
    .main { display: flex; flex: 1; }

    .sidebar {
      width: 240px; background: white; padding: 20px;
      display: flex; flex-direction: column; justify-content: space-between;
      border-right: 1px solid #ddd; align-items: center;
    }

    .logo { width: 120px; margin-bottom: 10px; }
    .menu { width: 100%; }

    .menu button {
      width: 100%; padding: 12px; margin-bottom: 10px;
      border: none; background: #f1f5f9; border-radius: 10px;
      cursor: pointer; text-align: left; font-weight: 500;
    }

    .menu button:hover { background: #e2e8f0; }

    .logout {
      background: black; color: white; font-weight: bold;
      padding: 12px; border-radius: 10px; border: none;
      width: 100%; cursor: pointer;
    }

    .content { flex: 1; padding: 25px; }

    .header {
      background: white; padding: 20px; border-radius: 12px;
      margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    .box {
      background: white; padding: 20px; border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    .footer {
      background: #1e293b; color: white;
      text-align: center; padding: 10px; font-size: 13px;
    }

    table { width:100%; border-collapse: collapse; margin-top:10px; }

    th, td {
      padding:10px;
      border-bottom:1px solid #ddd;
      text-align:center;
    }

    th { background:#f8fafc; }

    .btn {
      background:#2c5364; color:white; border:none;
      padding:6px 10px; border-radius:6px; cursor:pointer;
      margin:2px;
    }

    input, select {
      padding:8px; border-radius:6px; border:1px solid #ccc;
      margin-top:5px; width:100%;
    }

    a.nome-link {
      color:#2c5364;
      font-weight:bold;
      text-decoration:none;
    }

    a.nome-link:hover {
      text-decoration:underline;
    }

  </style>
</head>

<body>

<div class="main">

  <div class="sidebar">
    <div style="width:100%; text-align:center;">
      <img src="logo faesp.png" class="logo">
      <h3>👑 COORDENAÇÃO</h3>

      <div class="menu">
        <button onclick="alunos()">📋 Cadastros</button>
        <button onclick="disciplinasMaster()">📚 Disciplinas (Curso)</button>
        <button onclick="notas()">📝 Notas / Boletim</button>
      </div>
    </div>

    <button class="logout" onclick="sair()">🚪 Sair</button>
  </div>

  <div class="content">
    <div class="header">
      <h2>FAESP - SETOR 30 (COORDENAÇÃO)</h2>
      <p>Painel da coordenação</p>
    </div>

    <div class="box" id="conteudo">
      Bem-vinda ao painel da coordenação 👑
    </div>
  </div>

</div>

<div class="footer">
  AD. Belém - Rua Rio Tiete, 126 - Campo Limpo Paulista - SP
</div>

<script>

// 🔐 PROTEÇÃO
const usuario = JSON.parse(localStorage.getItem("usuario"));

if (!usuario) {
  alert("Faça login primeiro");
  window.location.href = "index.html";
}

if (usuario.tipo !== "Coordenacao") {
  alert("Acesso restrito à coordenação");
  window.location.href = "dashboard.html";
}

if (usuario.status !== "ativo") {
  alert("Usuário não autorizado");
  window.location.href = "index.html";
}

// SUPABASE
const client = supabase.createClient(
  "https://nzygdvixqmiltelgzzrn.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56eWdkdml4cW1pbHRlbGd6enJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDk5MjQsImV4cCI6MjA5MTY4NTkyNH0.wMaTGEgL_VCbSewnB-4BmdoA6rcGJWDsWIVaIo5dTy8"
);

// LOGOUT
function sair() {
  localStorage.removeItem("usuario");
  window.location.href = "index.html";
}

// 📋 CADASTROS (igual ao seu)
async function alunos() {

  const { data } = await client.from("usuarios").select("*");

  let html = `<h3>📋 Cadastros</h3>`;

  html += `<table>
    <tr>
      <th>Nome</th>
      <th>Email</th>
      <th>Status</th>
      <th>Tipo</th>
    </tr>`;

  data.forEach(u => {
    html += `
      <tr>
        <td>
          <a class="nome-link" href="detalhe-aluno.html?id=${u.id}">
            ${u.nome}
          </a>
        </td>
        <td>${u.email}</td>
        <td>${u.status}</td>
        <td>${u.tipo}</td>
      </tr>
    `;
  });

  html += "</table>";

  document.getElementById("conteudo").innerHTML = html;
}

// 📚 NOVO: DISCIPLINAS MASTER
async function disciplinasMaster() {

  const { data } = await client
    .from("disciplinas_master")
    .select("*");

  let html = `
    <h3>📚 Disciplinas por Curso</h3>

    <div style="margin-bottom:20px;">
      <h4>➕ Nova Disciplina</h4>

      <select id="cursoMaster">
        <option value="Curso Básico">Curso Básico</option>
        <option value="Curso Médio">Curso Médio</option>
      </select>

      <input id="nomeDisciplina" placeholder="Nome da disciplina">

      <br><br>
      <button class="btn" onclick="salvarDisciplinaMaster()">Cadastrar</button>
    </div>

    <table>
      <tr>
        <th>Curso</th>
        <th>Disciplina</th>
        <th>Ação</th>
      </tr>
  `;

  data.forEach(d => {
    html += `
      <tr>
        <td>${d.curso}</td>
        <td>${d.nome}</td>
        <td>
          <button class="btn" style="background:red;"
            onclick="excluirDisciplinaMaster('${d.id}')">
            🗑️
          </button>
        </td>
      </tr>
    `;
  });

  html += "</table>";

  document.getElementById("conteudo").innerHTML = html;
}

// SALVAR
async function salvarDisciplinaMaster() {

  const curso = document.getElementById("cursoMaster").value;
  const nome = document.getElementById("nomeDisciplina").value;

  if (!nome) {
    alert("Digite o nome da disciplina");
    return;
  }

  await client.from("disciplinas_master").insert([
    { curso, nome }
  ]);

  alert("Disciplina cadastrada!");
  disciplinasMaster();
}

// EXCLUIR
async function excluirDisciplinaMaster(id) {

  const confirmar = confirm("Deseja excluir?");
  if (!confirmar) return;

  await client.from("disciplinas_master").delete().eq("id", id);

  alert("Excluído!");
  disciplinasMaster();
}

// OUTROS
function notas(){
  document.getElementById("conteudo").innerHTML="📝 Notas";
}

</script>

</body>
</html>
