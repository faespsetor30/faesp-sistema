<!DOCTYPE html>
<html>
<head>
  <title>FAESP - Coordenação</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body { margin:0; font-family:'Segoe UI'; display:flex; height:100vh; background:#eef2f7; flex-direction:column;}
    .main { display:flex; flex:1;}

    .sidebar {
      width:240px; background:white; padding:20px;
      display:flex; flex-direction:column; justify-content:space-between;
      border-right:1px solid #ddd; align-items:center;
    }

    .logo { width:120px; margin-bottom:10px;}

    .menu button {
      width:100%; padding:12px; margin-bottom:10px;
      border:none; background:#f1f5f9; border-radius:10px;
      cursor:pointer; text-align:left;
    }

    .menu button:hover { background:#e2e8f0;}

    .logout {
      background:black; color:white; font-weight:bold;
      padding:12px; border-radius:10px; border:none;
      width:100%;
    }

    .content { flex:1; padding:25px;}

    .header, .box {
      background:white; padding:20px; border-radius:12px;
      margin-bottom:20px;
      box-shadow:0 5px 15px rgba(0,0,0,0.05);
    }

    table { width:100%; border-collapse:collapse; margin-top:10px;}

    th, td {
      padding:10px;
      border-bottom:1px solid #ddd;
      text-align:center;
    }

    .btn {
      background:#2c5364; color:white; border:none;
      padding:6px 10px; border-radius:6px; cursor:pointer;
    }

    input, select {
      padding:8px; margin-top:5px; width:100%;
    }

    a.nome-link {
      color:#2c5364;
      font-weight:bold;
      text-decoration:none;
    }
  </style>
</head>

<body>

<div class="main">

  <div class="sidebar">
    <div style="width:100%; text-align:center;">
      <img src="logo faesp.png" class="logo">
      <h3>👑 COORDENAÇÃO</h3>

      <div class="menu">
        <button onclick="alunos()">📋 Cadastros</button>
        <button onclick="disciplinasMaster()">📚 Disciplinas</button>
        <button onclick="notas()">📝 Notas</button>
      </div>
    </div>

    <button class="logout" onclick="sair()">🚪 Sair</button>
  </div>

  <div class="content">
    <div class="header">
      <h2>FAESP - SETOR 30</h2>
    </div>

    <div class="box" id="conteudo"></div>
  </div>

</div>

<script>

const client = supabase.createClient(
  "https://nzygdvixqmiltelgzzrn.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56eWdkdml4cW1pbHRlbGd6enJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDk5MjQsImV4cCI6MjA5MTY4NTkyNH0.wMaTGEgL_VCbSewnB-4BmdoA6rcGJWDsWIVaIo5dTy8"
);

// 🔐 proteção
const usuario = JSON.parse(localStorage.getItem("usuario"));
if (!usuario || usuario.tipo !== "Coordenacao") {
  window.location.href = "index.html";
}

// iniciar tela padrão
document.addEventListener("DOMContentLoaded", () => {
  alunos();
});

// logout
function sair(){
  localStorage.removeItem("usuario");
  window.location.href="index.html";
}

//////////////////////////////////////////////////
// 👤 CADASTROS (RESTAURADO)
//////////////////////////////////////////////////

async function alunos(){

  const { data } = await client.from("usuarios").select("*");

  let html = `
    <h3>📋 Cadastros</h3>

    <input id="nome" placeholder="Nome">
    <input id="email" placeholder="Email">

    <select id="tipo">
      <option value="Aluno">Aluno</option>
      <option value="Professor">Professor</option>
      <option value="Coordenacao">Coordenação</option>
    </select>

    <br><br>
    <button class="btn" onclick="cadastrarUsuario()">Cadastrar</button>

    <table>
      <tr>
        <th>Nome</th>
        <th>Email</th>
        <th>Curso</th>
        <th>Status</th>
        <th>Tipo</th>
        <th>Ações</th>
      </tr>
  `;

  data.forEach(u=>{
    html+=`
      <tr>
        <td>${u.nome}</td>
        <td>${u.email}</td>
        <td>${u.curso || "-"}</td>
        <td>${u.status}</td>
        <td>${u.tipo}</td>
        <td>
          <button class="btn" onclick="aprovar('${u.id}')">✔️</button>
          <button class="btn" style="background:red;" onclick="excluir('${u.id}')">🗑️</button>
        </td>
      </tr>
    `;
  });

  html+="</table>";
  conteudo.innerHTML=html;
}

async function cadastrarUsuario(){
  await client.from("usuarios").insert([{
    nome: nome.value,
    email: email.value,
    tipo: tipo.value,
    status:"pendente"
  }]);
  alunos();
}

async function aprovar(id){
  await client.from("usuarios").update({status:"ativo"}).eq("id",id);
  alunos();
}

async function excluir(id){
  if(!confirm("Excluir?")) return;
  await client.from("usuarios").delete().eq("id",id);
  alunos();
}

//////////////////////////////////////////////////
// 📚 DISCIPLINAS (COM PROFESSOR EDITÁVEL)
//////////////////////////////////////////////////

async function disciplinasMaster(){

  const { data: professores } = await client
    .from("usuarios")
    .select("*")
    .eq("tipo","Professor");

  let html=`
    <h3>📚 Disciplinas</h3>

    <select id="cursoMaster" onchange="carregarDisciplinasCurso()">
      <option value="Curso Básico">Curso Básico</option>
      <option value="Curso Médio">Curso Médio</option>
    </select>

    <input id="nomeDisciplina" placeholder="Disciplina">

    <select id="professorDisciplina">
      ${professores.map(p=>`<option>${p.nome}</option>`).join("")}
    </select>

    <button class="btn" onclick="salvarDisciplinaMaster()">Cadastrar</button>

    <div id="tabela"></div>
  `;

  conteudo.innerHTML=html;
  carregarDisciplinasCurso();
}

async function carregarDisciplinasCurso(){

  const curso = cursoMaster.value;

  const { data } = await client
    .from("disciplinas_master")
    .select("*")
    .eq("curso",curso);

  let html="<table><tr><th>Disciplina</th><th>Professor</th></tr>";

  data.forEach(d=>{
    html+=`<tr>
      <td>${d.nome}</td>
      <td>${d.professor || "-"}</td>
    </tr>`;
  });

  html+="</table>";

  tabela.innerHTML=html;
}

async function salvarDisciplinaMaster(){
  await client.from("disciplinas_master").insert([{
    curso:cursoMaster.value,
    nome:nomeDisciplina.value,
    professor:professorDisciplina.value
  }]);

  carregarDisciplinasCurso();
}

//////////////////////////////////////////////////
// 📝 NOTAS + PDF
//////////////////////////////////////////////////

async function notas(){

  const { data: alunos } = await client
    .from("usuarios")
    .select("*")
    .eq("tipo","Aluno");

  let html=`
    <h3>📝 Notas</h3>
    <select id="alunoSelect" onchange="carregarNotasAluno()">
      ${alunos.map(a=>`<option value="${a.email}">${a.nome}</option>`).join("")}
    </select>

    <button class="btn" onclick="gerarPDF()">📄 PDF</button>

    <div id="tabelaNotas"></div>
  `;

  conteudo.innerHTML=html;
}

async function carregarNotasAluno(){

  const email = alunoSelect.value;

  const { data } = await client
    .from("disciplinas")
    .select("*")
    .eq("email",email);

  let html="<table><tr><th>Disciplina</th><th>Nota</th></tr>";

  data.forEach(d=>{
    html+=`<tr>
      <td>${d.nome}</td>
      <td><input value="${d.nota||""}" onchange="salvarNota('${d.id}',this.value)"></td>
    </tr>`;
  });

  html+="</table>";

  tabelaNotas.innerHTML=html;
}

async function salvarNota(id,nota){
  await client.from("disciplinas").update({nota}).eq("id",id);
}

async function gerarPDF(){

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.text("Boletim FAESP",20,20);
  doc.save("boletim.pdf");
}

</script>

</body>
</html>
