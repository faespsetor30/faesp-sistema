<!DOCTYPE html>
<html>
<head>
  <title>FAESP - Coordenação</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { margin: 0; font-family: 'Segoe UI'; display: flex; height: 100vh; background:#eef2f7; }
    .sidebar { width:240px; background:white; padding:20px; border-right:1px solid #ddd; }
    .content { flex:1; padding:25px; }
    .box { background:white; padding:20px; border-radius:12px; box-shadow:0 5px 15px rgba(0,0,0,0.05); }

    button { padding:6px 10px; margin:2px; cursor:pointer; }
    input, select { width:100%; padding:8px; margin-top:5px; }

    table { width:100%; margin-top:10px; border-collapse:collapse; }
    th, td { padding:10px; border-bottom:1px solid #ddd; text-align:center; }

    .btn { background:#2c5364; color:white; border:none; border-radius:6px; }
    .danger { background:red; color:white; }
    .gray { background:#6b7280; color:white; }

    a { color:#2c5364; font-weight:bold; text-decoration:none; }
  </style>
</head>

<body>

<div class="sidebar">
  <h3>👑 Coordenação</h3>
  <button onclick="alunos()">📋 Cadastros</button>
  <button onclick="disciplinas()">📚 Disciplinas</button>
</div>

<div class="content">
  <div class="box" id="conteudo"></div>
</div>

<script>

// 🔐 PROTEÇÃO
const usuario = JSON.parse(localStorage.getItem("usuario"));
if (!usuario || usuario.tipo !== "Coordenacao") {
  window.location.href = "index.html";
}

// 🔌 SUPABASE
const client = supabase.createClient(
  "https://nzygdvixqmiltelgzzrn.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56eWdkdml4cW1pbHRlbGd6enJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDk5MjQsImV4cCI6MjA5MTY4NTkyNH0.wMaTGEgL_VCbSewnB-4BmdoA6rcGJWDsWIVaIo5dTy8"
);

// 📋 CADASTROS
async function alunos() {

  const { data } = await client.from("usuarios").select("*");

  let html = `
    <h3>📋 Cadastros</h3>

    <div>
      <input id="nome" placeholder="Nome">
      <input id="email" placeholder="Email">

      <select id="curso">
        <option value="">Selecione o curso</option>
        <option value="Curso Básico">Curso Básico</option>
        <option value="Curso Médio">Curso Médio</option>
      </select>

      <select id="tipo">
        <option value="Aluno">Aluno</option>
        <option value="Professor">Professor</option>
        <option value="Coordenacao">Coordenação</option>
      </select>

      <br><br>
      <button class="btn" onclick="cadastrarUsuario()">Cadastrar</button>
    </div>

    <table>
      <tr>
        <th>Nome</th>
        <th>Email</th>
        <th>Curso</th>
        <th>Status</th>
        <th>Tipo</th>
        <th>Ações</th>
      </tr>
  `;

  data.forEach(u => {
    html += `
      <tr>
        <td>
          <a href="detalhe-aluno.html?id=${u.id}">
            ${u.nome}
          </a>
        </td>
        <td>${u.email}</td>
        <td>${u.curso || "Não definido"}</td>
        <td>${u.status}</td>

        <td>
          <select onchange="alterarTipo('${u.id}', this.value)">
            <option ${u.tipo==="Aluno"?"selected":""}>Aluno</option>
            <option ${u.tipo==="Professor"?"selected":""}>Professor</option>
            <option ${u.tipo==="Coordenacao"?"selected":""}>Coordenação</option>
          </select>
        </td>

        <td>
          ${
            u.status === "pendente"
            ? `
              <button class="btn" onclick="aprovar('${u.id}')">✅</button>
              <button class="danger" onclick="recusar('${u.id}')">❌</button>
            `
            : `✔️`
          }
          <button class="gray" onclick="excluir('${u.id}')">🗑️</button>
        </td>
      </tr>
    `;
  });

  html += "</table>";

  document.getElementById("conteudo").innerHTML = html;
}

// ➕ CADASTRAR
async function cadastrarUsuario() {

  const nome = document.getElementById("nome").value;
  const email = document.getElementById("email").value;
  const curso = document.getElementById("curso").value;
  const tipo = document.getElementById("tipo").value;

  if (!curso) {
    alert("Selecione o curso!");
    return;
  }

  await client.from("usuarios").insert([{
    nome, email, curso, tipo, status:"pendente"
  }]);

  alert("Cadastrado!");
  alunos();
}

// 🔄 ALTERAR TIPO
async function alterarTipo(id, tipo) {
  await client.from("usuarios").update({ tipo }).eq("id", id);
  alunos();
}

// ✅ APROVAR
async function aprovar(id) {
  await client.from("usuarios").update({ status:"ativo" }).eq("id", id);
  alert("Aprovado!");
  alunos();
}

// ❌ RECUSAR
async function recusar(id) {
  await client.from("usuarios").update({ status:"recusado" }).eq("id", id);
  alert("Recusado!");
  alunos();
}

// 🗑️ EXCLUIR
async function excluir(id) {

  const confirmar = confirm("Excluir usuário?");
  if (!confirmar) return;

  await client.from("usuarios").delete().eq("id", id);

  alert("Excluído!");
  alunos();
}

// 📚 DISCIPLINAS (placeholder)
function disciplinas(){
  document.getElementById("conteudo").innerHTML = "📚 Em desenvolvimento";
}

// LOAD
alunos();

</script>

</body>
</html>
