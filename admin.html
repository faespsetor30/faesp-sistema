<!DOCTYPE html>
<html>
<head>
  <title>FAESP - Coordenação</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { margin:0; font-family:'Segoe UI'; display:flex; height:100vh; background:#eef2f7; flex-direction:column;}
    .main { display:flex; flex:1;}

    .sidebar {
      width:240px; background:white; padding:20px;
      display:flex; flex-direction:column; justify-content:space-between;
      border-right:1px solid #ddd; align-items:center;
    }

    .logo { width:120px; margin-bottom:10px;}

    .menu button {
      width:100%; padding:12px; margin-bottom:10px;
      border:none; background:#f1f5f9; border-radius:10px;
      cursor:pointer; text-align:left;
    }

    .menu button:hover { background:#e2e8f0;}

    .logout {
      background:black; color:white; font-weight:bold;
      padding:12px; border-radius:10px; border:none;
      width:100%;
    }

    .content { flex:1; padding:25px;}

    .header, .box {
      background:white; padding:20px; border-radius:12px;
      margin-bottom:20px;
      box-shadow:0 5px 15px rgba(0,0,0,0.05);
    }

    table { width:100%; border-collapse:collapse; margin-top:10px;}

    th, td {
      padding:10px;
      border-bottom:1px solid #ddd;
      text-align:center;
    }

    .btn {
      background:#2c5364; color:white; border:none;
      padding:6px 10px; border-radius:6px; cursor:pointer;
    }

    input, select {
      padding:8px; margin-top:5px; width:100%;
    }

    a.nome-link {
      color:#2c5364;
      font-weight:bold;
      text-decoration:none;
    }

    a.nome-link:hover { text-decoration:underline;}
  </style>
</head>

<body>

<div class="main">

  <div class="sidebar">
    <div style="width:100%; text-align:center;">
      <img src="logo faesp.png" class="logo">
      <h3>👑 COORDENAÇÃO</h3>

      <div class="menu">
        <button onclick="dashboard()">🏠 Dashboard</button>
        <button onclick="alunos()">📋 Cadastros</button>
        <button onclick="disciplinasMaster()">📚 Disciplinas</button>
        <button onclick="notas()">📝 Notas</button>
        <button onclick="frequencia()">📅 Presença</button>
        <button onclick="avisos()">📢 Avisos</button>
      </div>
    </div>

    <button class="logout" onclick="sair()">🚪 Sair</button>
  </div>

  <div class="content">
    <div class="header">
      <h2>FAESP - SETOR 30</h2>
    </div>

    <div class="box" id="conteudo"></div>
  </div>

</div>

<script>

const client = supabase.createClient(
  "https://nzygdvixqmiltelgzzrn.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56eWdkdml4cW1pbHRlbGd6enJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDk5MjQsImV4cCI6MjA5MTY4NTkyNH0.wMaTGEgL_VCbSewnB-4BmdoA6rcGJWDsWIVaIo5dTy8"
);

// 🔐 proteção
const usuario = JSON.parse(localStorage.getItem("usuario"));
if (!usuario || usuario.tipo !== "Coordenacao") {
  window.location.href = "index.html";
}

function sair(){
  localStorage.removeItem("usuario");
  window.location.href="index.html";
}

//////////////////////////////////////////////////
// 🏠 DASHBOARD
//////////////////////////////////////////////////

async function dashboard(){

  const { data: usuarios } = await client.from("usuarios").select("*");
  const { data: hist } = await client.from("disciplinas_historico").select("*");

  const alunos = usuarios.filter(u=>u.tipo==="Aluno").length;
  const professores = usuarios.filter(u=>u.tipo==="Professor").length;
  const ativos = usuarios.filter(u=>u.status==="ativo").length;

  const hoje = new Date().toISOString().split("T")[0];

  const atuais = hist.filter(h=>{
    return h.data_inicio <= hoje && (!h.data_fim || h.data_fim >= hoje);
  });

  let lista = "";

  atuais.forEach(a=>{
    lista += `
      <div style="padding:10px;background:#f1f5f9;margin:5px;border-radius:8px">
        📘 <strong>${a.curso}</strong> - ${a.disciplina}<br>
        📅 ${a.data_inicio} até ${a.data_fim || "Atual"}
      </div>
    `;
  });

  conteudo.innerHTML = `
    <h2>📊 Dashboard</h2>

    <div style="display:flex; gap:20px; flex-wrap:wrap; margin-bottom:20px;">
      <div style="flex:1; min-width:180px; background:white; padding:20px; border-radius:12px; text-align:center;">
        👨‍🎓<br><strong>${alunos}</strong><br>Alunos
      </div>
      <div style="flex:1; min-width:180px; background:white; padding:20px; border-radius:12px; text-align:center;">
        👨‍🏫<br><strong>${professores}</strong><br>Professores
      </div>
      <div style="flex:1; min-width:180px; background:white; padding:20px; border-radius:12px; text-align:center;">
        ✅<br><strong>${ativos}</strong><br>Ativos
      </div>
    </div>

    <h3>📚 Matérias em andamento</h3>
    ${lista || "Nenhuma ativa"}
  `;
}

//////////////////////////////////////////////////
// 📢 AVISOS
//////////////////////////////////////////////////

async function avisos(){

  const { data } = await client
    .from("avisos")
    .select("*")
    .order("data", { ascending: false });

  let html = `
    <h3>📢 Avisos</h3>

    <input id="tituloAviso" placeholder="Título">
    <textarea id="mensagemAviso" placeholder="Mensagem" style="width:100%;padding:8px;margin-top:5px;"></textarea>
    <input type="date" id="dataAviso">

    <br><br>
    <button class="btn" onclick="salvarAviso()">Publicar</button>

    <hr><br>

    <table>
      <tr>
        <th>Título</th>
        <th>Mensagem</th>
        <th>Data</th>
        <th>Ação</th>
      </tr>
  `;

  data.forEach(a=>{
    html += `
      <tr>
        <td>${a.titulo}</td>
        <td>${a.mensagem}</td>
        <td>${a.data}</td>
        <td>
          <button class="btn" style="background:red;" onclick="excluirAviso('${a.id}')">🗑️</button>
        </td>
      </tr>
    `;
  });

  html += "</table>";

  conteudo.innerHTML = html;
}

async function salvarAviso(){
  await client.from("avisos").insert([{
    titulo: tituloAviso.value,
    mensagem: mensagemAviso.value,
    data: dataAviso.value
  }]);
  avisos();
}

async function excluirAviso(id){
  if(!confirm("Excluir aviso?")) return;
  await client.from("avisos").delete().eq("id", id);
  avisos();
}

// iniciar
dashboard();

</script>

</body>
</html>
