<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>FAESP - Coordenação</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>

<style>
body { margin:0; font-family:'Segoe UI'; background:#eef2f7; display:flex; height:100vh; }

.main { display:flex; width:100%; }

.sidebar {
  width:240px;
  background:white;
  padding:20px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  border-right:1px solid #ddd;
  align-items:center;
}

.logo { width:120px; margin-bottom:10px; }

.menu button {
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:none;
  background:#f1f5f9;
  border-radius:10px;
  cursor:pointer;
  text-align:left;
  transition:0.3s;
}

.menu button:hover {
  background:#2c5364;
  color:white;
  transform:translateX(5px);
}

.logout {
  background:black;
  color:white;
  font-weight:bold;
  padding:12px;
  border-radius:10px;
  border:none;
  width:100%;
}

.content { flex:1; padding:25px; }

.header {
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.box {
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
  animation:fade 0.4s ease;
}

@keyframes fade {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}

.btn {
  background:#2c5364;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
}

input, select {
  padding:10px;
  margin-top:5px;
  width:100%;
  border-radius:8px;
  border:1px solid #ddd;
}

table {
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
}

th, td {
  padding:10px;
  border-bottom:1px solid #ddd;
  text-align:center;
}

.cards {
  display:flex;
  gap:20px;
  margin-bottom:20px;
}

.card {
  flex:1;
  background:white;
  padding:20px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}
</style>
</head>

<body>

<div class="main">

<div class="sidebar">
  <div style="width:100%; text-align:center;">
    <img src="logo faesp.png" class="logo">
    <h3>👑 COORDENAÇÃO</h3>

    <div class="menu">
      <button onclick="dashboard()">🏠 Dashboard</button>
      <button onclick="alunos()">📋 Cadastros</button>
      <button onclick="disciplinasMaster()">📚 Disciplinas</button>
      <button onclick="notas()">📝 Notas</button>
      <button onclick="frequencia()">📅 Presença</button>
    </div>
  </div>

  <button class="logout" onclick="sair()">🚪 Sair</button>
</div>

<div class="content">
  <div class="header">
    <h2>FAESP - SETOR 30</h2>
  </div>

  <div class="box" id="conteudo"></div>
</div>

</div>

<script>

const client = supabase.createClient(
"https://nzygdvixqmiltelgzzrn.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56eWdkdml4cW1pbHRlbGd6enJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDk5MjQsImV4cCI6MjA5MTY4NTkyNH0.wMaTGEgL_VCbSewnB-4BmdoA6rcGJWDsWIVaIo5dTy8"
);

function sair(){
  localStorage.removeItem("usuario");
  location.href="index.html";
}

//////////////////////////////////////////////////
// 🏠 DASHBOARD
//////////////////////////////////////////////////

async function dashboard(){

  const { data: usuarios } = await client.from("usuarios").select("*");
  const { data: hist } = await client.from("disciplinas_historico").select("*");

  const alunos = usuarios.filter(u=>u.tipo==="Aluno").length;
  const professores = usuarios.filter(u=>u.tipo==="Professor").length;
  const ativos = usuarios.filter(u=>u.status==="ativo").length;

  const hoje = new Date().toISOString().split("T")[0];

  const atuais = hist.filter(h=> h.data_inicio <= hoje && (!h.data_fim || h.data_fim >= hoje));

  let lista = "";

  atuais.forEach(a=>{
    lista += `
      <div style="padding:10px;background:#f1f5f9;margin:5px;border-radius:8px">
        <strong>${a.curso}</strong> - ${a.disciplina}<br>
        ${a.data_inicio} até ${a.data_fim || "Atual"}
      </div>
    `;
  });

  conteudo.innerHTML = `
    <h2>📊 Dashboard</h2>

    <div class="cards">
      <div class="card">👨‍🎓<br><strong>${alunos}</strong><br>Alunos</div>
      <div class="card">👨‍🏫<br><strong>${professores}</strong><br>Professores</div>
      <div class="card">✅<br><strong>${ativos}</strong><br>Ativos</div>
    </div>

    <h3>📚 Matérias Atuais</h3>
    ${lista || "Nenhuma ativa"}
  `;
}

//////////////////////////////////////////////////
// 👤 CADASTROS
//////////////////////////////////////////////////

async function alunos(){

  const { data } = await client.from("usuarios").select("*");

  let html=`
  <h3>📋 Cadastros</h3>

  <input id="nome" placeholder="Nome">
  <input id="email" placeholder="Email">

  <select id="tipo">
    <option>Aluno</option>
    <option>Professor</option>
    <option>Coordenacao</option>
  </select>

  <select id="curso">
    <option value="">Curso</option>
    <option>Curso Básico</option>
    <option>Curso Médio</option>
  </select>

  <button class="btn" onclick="cadastrarUsuario()">Cadastrar</button>

  <table>
  <tr><th>Nome</th><th>Email</th><th>Curso</th><th>Tipo</th></tr>
  `;

  data.forEach(u=>{
    html+=`<tr>
      <td>${u.nome}</td>
      <td>${u.email}</td>
      <td>${u.curso||"-"}</td>
      <td>${u.tipo}</td>
    </tr>`;
  });

  html+="</table>";

  conteudo.innerHTML=html;
}

async function cadastrarUsuario(){
  await client.from("usuarios").insert([{
    nome:nome.value,
    email:email.value,
    tipo:tipo.value,
    curso:curso.value,
    status:"pendente"
  }]);
  alunos();
}

//////////////////////////////////////////////////
// 📚 DISCIPLINAS
//////////////////////////////////////////////////

async function disciplinasMaster(){

  conteudo.innerHTML=`
    <h3>📚 Disciplinas</h3>

    <select id="cursoMaster" onchange="carregarDisciplinasCurso()">
      <option>Curso Básico</option>
      <option>Curso Médio</option>
    </select>

    <input id="nomeDisc">
    <button class="btn" onclick="salvarDisc()">Salvar</button>

    <div id="tabela"></div>
  `;

  carregarDisciplinasCurso();
}

async function carregarDisciplinasCurso(){

  const { data }=await client
    .from("disciplinas_master")
    .select("*")
    .eq("curso",cursoMaster.value);

  let html="<table><tr><th>Disciplina</th></tr>";

  data.forEach(d=>{
    html+=`<tr><td>${d.nome}</td></tr>`;
  });

  html+="</table>";

  tabela.innerHTML=html;
}

async function salvarDisc(){
  await client.from("disciplinas_master").insert([{
    nome:nomeDisc.value,
    curso:cursoMaster.value
  }]);
  carregarDisciplinasCurso();
}

//////////////////////////////////////////////////
// 📝 NOTAS
//////////////////////////////////////////////////

async function notas(){

  const { data } = await client.from("usuarios").select("*").eq("tipo","Aluno");

  conteudo.innerHTML=`
  <h3>📝 Notas</h3>

  <select id="alunoSelect">
  ${data.map(a=>`<option value="${a.email}">${a.nome}</option>`).join("")}
  </select>

  <button class="btn" onclick="gerarBoletim()">Gerar Boletim</button>
  `;
}

//////////////////////////////////////////////////
// 📅 PRESENÇA
//////////////////////////////////////////////////

async function frequencia(){

  const { data: alunos } = await client.from("usuarios").select("*").eq("tipo","Aluno");
  const { data: disc } = await client.from("disciplinas_master").select("*");

  conteudo.innerHTML=`
  <h3>📅 Presença</h3>

  <select id="alunoP">
  ${alunos.map(a=>`<option value="${a.email}">${a.nome}</option>`)}
  </select>

  <select id="discP">
  ${disc.map(d=>`<option>${d.nome}</option>`)}
  </select>

  <input type="date" id="dataP">

  <button class="btn" onclick="salvarF()">Salvar</button>
  `;
}

async function salvarF(){
  await client.from("frequencia").insert([{
    email:alunoP.value,
    disciplina:discP.value,
    data:dataP.value,
    presente:true
  }]);
}

//////////////////////////////////////////////////
// 📊 BOLETIM
//////////////////////////////////////////////////

async function gerarBoletim(){

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const email = alunoSelect.value;

  const { data: notas } = await client.from("disciplinas").select("*").eq("email",email);

  doc.text("Boletim FAESP",20,20);

  notas.forEach((n,i)=>{
    doc.text(`${n.nome} - ${n.nota}`,20,40+(i*10));
  });

  doc.save("boletim.pdf");
}

//////////////////////////////////////////////////
// 🚀 INICIAL
//////////////////////////////////////////////////

dashboard();

</script>

</body>
</html>
