<!DOCTYPE html>
<html>
<head>
  <title>Ficha do Aluno</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { font-family:'Segoe UI'; background:#eef2f7; padding:20px; }
    .card {
      background:white; padding:20px; border-radius:12px;
      margin-bottom:20px; box-shadow:0 5px 15px rgba(0,0,0,0.05);
    }
    input { width:100%; padding:8px; margin:5px 0; }
    button { padding:8px 12px; margin-top:5px; cursor:pointer; }
    table { width:100%; border-collapse:collapse; margin-top:10px; }
    th, td { padding:10px; border-bottom:1px solid #ddd; text-align:center; }
    th { background:#f8fafc; }
  </style>
</head>

<body>

<h2>📋 Ficha do Aluno</h2>

<div id="dados"></div>
<div id="acoes"></div>
<div id="media"></div>
<div id="grafico"></div>
<div id="disciplinas"></div>
<div id="financeiro"></div>

<script>

const client = supabase.createClient(
  "https://nzygdvixqmiltelgzzrn.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56eWdkdml4cW1pbHRlbGd6enJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDk5MjQsImV4cCI6MjA5MTY4NTkyNH0.wMaTGEgL_VCbSewnB-4BmdoA6rcGJWDsWIVaIo5dTy8"
);

// 🔐 PROTEÇÃO
const usuario = JSON.parse(localStorage.getItem("usuario"));
if (!usuario || usuario.tipo !== "Coordenacao") {
  alert("Acesso restrito");
  window.location.href = "index.html";
}

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

let aluno = null;
let listaNotas = [];

// 🚀 CARREGAR
async function carregar() {

  const { data } = await client
    .from("usuarios")
    .select("*")
    .eq("id", id)
    .single();

  aluno = data;

  renderDados();
  renderAcoes();
  carregarDisciplinas();
  carregarFinanceiro();
}

// 👤 DADOS + EDIÇÃO
function renderDados() {

  document.getElementById("dados").innerHTML = `
    <div class="card">
      <h3>👤 Dados (editável)</h3>

      <input id="nome" value="${aluno.nome}">
      <input id="email" value="${aluno.email}">
      <input id="cpf" value="${aluno.cpf || ""}">
      <input id="rg" value="${aluno.rg || ""}">
      <input id="data" value="${aluno.data_nascimento || ""}">
      <input id="endereco" value="${aluno.endereco || ""}">
      <input id="celular" value="${aluno.celular || ""}">
      <input id="curso" value="${aluno.curso || ""}">

      <button onclick="salvarEdicao()">💾 Salvar</button>
    </div>
  `;
}

// 💾 SALVAR EDIÇÃO
async function salvarEdicao() {

  await client.from("usuarios").update({
    nome: document.getElementById("nome").value,
    email: document.getElementById("email").value,
    cpf: document.getElementById("cpf").value,
    rg: document.getElementById("rg").value,
    data_nascimento: document.getElementById("data").value,
    endereco: document.getElementById("endereco").value,
    celular: document.getElementById("celular").value,
    curso: document.getElementById("curso").value
  }).eq("id", id);

  alert("Dados atualizados!");
}

// ✅ AÇÕES
function renderAcoes() {

  document.getElementById("acoes").innerHTML = `
    <div class="card">
      <h3>⚙️ Ações</h3>

      <button onclick="aprovar()">✅ Aprovar</button>
      <button onclick="recusar()" style="background:red; color:white;">❌ Recusar</button>
    </div>
  `;
}

async function aprovar() {
  await client.from("usuarios")
    .update({ status:"ativo" })
    .eq("id", id);

  alert("Aprovado!");
  carregar();
}

async function recusar() {
  await client.from("usuarios")
    .update({ status:"recusado" })
    .eq("id", id);

  alert("Recusado!");
  carregar();
}

// 📚 DISCIPLINAS + MÉDIA + GRÁFICO
async function carregarDisciplinas() {

  const { data } = await client
    .from("disciplinas")
    .select("*")
    .eq("email", aluno.email);

  let soma = 0;
  let qtd = 0;
  let nomes = [];
  let notas = [];

  let html = `
    <div class="card">
    <h3>📊 Disciplinas</h3>
    <table>
      <tr>
        <th>Disciplina</th>
        <th>Nota</th>
      </tr>
  `;

  data.forEach(d => {
    html += `
      <tr>
        <td>${d.nome}</td>
        <td>${d.nota || "-"}</td>
      </tr>
    `;

    if (d.nota) {
      soma += Number(d.nota);
      qtd++;
      nomes.push(d.nome);
      notas.push(d.nota);
    }
  });

  html += "</table></div>";

  document.getElementById("disciplinas").innerHTML = html;

  // 📊 MÉDIA
  const media = qtd ? (soma / qtd).toFixed(1) : "-";

  document.getElementById("media").innerHTML = `
    <div class="card">
      <h3>📈 Média do Aluno</h3>
      <h2>${media}</h2>
    </div>
  `;

  // 📉 GRÁFICO
  document.getElementById("grafico").innerHTML = `
    <div class="card">
      <h3>📊 Gráfico de Notas</h3>
      <canvas id="chart"></canvas>
    </div>
  `;

  setTimeout(() => {
    new Chart(document.getElementById("chart"), {
      type: 'bar',
      data: {
        labels: nomes,
        datasets: [{
          label: 'Notas',
          data: notas
        }]
      }
    });
  }, 200);
}

// 💰 FINANCEIRO
async function carregarFinanceiro() {

  const { data } = await client
    .from("financeiro")
    .select("*")
    .eq("email", aluno.email);

  let html = `
    <div class="card">
    <h3>💰 Financeiro</h3>
    <table>
      <tr>
        <th>Disciplina</th>
        <th>Valor</th>
        <th>Status</th>
      </tr>
  `;

  data.forEach(f => {
    html += `
      <tr>
        <td>${f.disciplina}</td>
        <td>R$ ${f.valor}</td>
        <td>${f.status}</td>
      </tr>
    `;
  });

  html += "</table></div>";

  document.getElementById("financeiro").innerHTML = html;
}

carregar();

</script>

</body>
</html>
