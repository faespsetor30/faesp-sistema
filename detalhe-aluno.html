<!DOCTYPE html>
<html>
<head>
  <title>Ficha do Aluno</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { font-family:'Segoe UI'; background:#eef2f7; padding:20px; }

    .card {
      background:white; padding:20px; border-radius:12px;
      margin-bottom:20px; box-shadow:0 5px 15px rgba(0,0,0,0.05);
    }

    input, select {
      width:100%; padding:8px; margin:5px 0;
    }

    input[readonly] {
      background:#f1f5f9;
      cursor:not-allowed;
    }

    .btn {
      padding:8px 12px;
      margin-top:10px;
      cursor:pointer;
      border:none;
      border-radius:8px;
    }

    .btn-primary { background:#2c5364; color:white; }
    .btn-edit { background:#f59e0b; color:white; }
  </style>
</head>

<body>

<div style="margin-bottom:15px;">
  <button onclick="voltar()" style="
    background:#2c5364;
    color:white;
    border:none;
    padding:8px 14px;
    border-radius:8px;
    cursor:pointer;
  ">
    ⬅️ Voltar
  </button>
</div>

<h2>📋 Ficha do Aluno</h2>

<div id="dados"></div>

<script>

function voltar() {
  window.location.href = "admin.html";
}

const client = supabase.createClient(
  "https://nzygdvixqmiltelgzzrn.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56eWdkdml4cW1pbHRlbGd6enJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDk5MjQsImV4cCI6MjA5MTY4NTkyNH0.wMaTGEgL_VCbSewnB-4BmdoA6rcGJWDsWIVaIo5dTy8"
);

const id = new URLSearchParams(window.location.search).get("id");

let aluno = null;
let editando = false;

// 🔢 MATRÍCULA AUTOMÁTICA
async function gerarMatricula(){
  const ano = new Date().getFullYear();

  const { data } = await client
    .from("usuarios")
    .select("matricula")
    .like("matricula", `${ano}%`);

  const numero = (data.length + 1).toString().padStart(3,"0");

  return `${ano}${numero}`;
}

// 💰 PAGAMENTOS
async function carregarPagamentos(){

  const { data, error } = await client
    .from("pagamentos")
    .select("*")
    .eq("aluno_id", id);

  if(error){
    console.log("Erro pagamentos:", error);
    return "<p>Erro ao carregar pagamentos</p>";
  }

  if(!data || data.length === 0){
    return "<p>Nenhum pagamento encontrado</p>";
  }

  let html = `
    <div class="card">
      <h3>💰 Pagamentos</h3>

      <table style="width:100%; border-collapse:collapse;">
        <tr>
          <th>Matéria</th>
          <th>Valor</th>
          <th>Forma</th>
          <th>Recibo</th>
        </tr>
  `;

  data.forEach(p=>{
    html += `
      <tr>
        <td>${p.materia}</td>
        <td>R$ ${p.valor}</td>
        <td>${p.forma_pagamento}</td>
        <td>
          <a href="${p.recibo_url}" target="_blank" class="btn btn-primary">
            📄 Ver Recibo
          </a>
        </td>
      </tr>
    `;
  });

  html += "</table></div>";

  return html;
}

// 🚀 CARREGAR
async function carregar(){
  const { data, error } = await client
    .from("usuarios")
    .select("*")
    .eq("id", id)
    .single();

  if(error || !data){
    console.error("ERRO AO CARREGAR:", error);
    document.getElementById("dados").innerHTML = "Erro ao carregar aluno";
    return;
  }

  aluno = data;
  await render();
}

// 🎨 RENDER (CORRIGIDO)
async function render(){

  if(!aluno){
    document.getElementById("dados").innerHTML = "Erro ao carregar aluno";
    return;
  }

  const travado = !editando;
  const ativo = aluno.status === "ativo";

  const pagamentosHTML = await carregarPagamentos();

  document.getElementById("dados").innerHTML =

  '<div class="card">' +

  '<h3>👤 Dados do Aluno</h3>' +

  '<label>Nome</label>' +
  '<input value="'+ (aluno.nome || "") +'" readonly>' +

  '<label>Email</label>' +
  '<input value="'+ (aluno.email || "") +'" readonly>' +

  '<label>Matrícula</label>' +
  '<input id="matricula" value="'+ (aluno.matricula || "") +'" readonly>' +

  '<label>Data início</label>' +
  '<input id="data_inicio" type="date" value="'+ (aluno.data_inicio || "") +'">' +

  '<label>Curso</label>' +
  '<select id="curso">' +
    '<option value="Curso Básico" '+ (aluno.curso==="Curso Básico"?"selected":"") +'>Curso Básico</option>' +
    '<option value="Curso Médio" '+ (aluno.curso==="Curso Médio"?"selected":"") +'>Curso Médio</option>' +
  '</select>' +

  '<label>Tipo</label>' +
  '<select id="tipo" '+ (travado?"disabled":"") +'>' +
    '<option value="Aluno" '+ (aluno.tipo==="Aluno"?"selected":"") +'>Aluno</option>' +
    '<option value="Professor" '+ (aluno.tipo==="Professor"?"selected":"") +'>Professor</option>' +
    '<option value="Coordenacao" '+ (aluno.tipo==="Coordenacao"?"selected":"") +'>Coordenação</option>' +
  '</select>' +

  '<label>CPF</label>' +
  '<input id="cpf" value="'+ (aluno.cpf || "") +'" '+ (travado?"readonly":"") +'>' +

  '<label>RG</label>' +
  '<input id="rg" value="'+ (aluno.rg || "") +'" '+ (travado?"readonly":"") +'>' +

  '<label>Celular</label>' +
  '<input id="celular" value="'+ (aluno.celular || "") +'" '+ (travado?"readonly":"") +'>' +

  '<label>Endereço</label>' +
  '<input id="endereco" value="'+ (aluno.endereco || "") +'" '+ (travado?"readonly":"") +'>' +

  '</div>' +

  pagamentosHTML +

  '<div class="card">' +

  '<h3>⚙️ Ações</h3>' +

  '<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">' +

    '<div style="font-weight:bold;">Status: ' +
      (ativo
        ? '<span style="color:green;">● Ativo</span>'
        : '<span style="color:red;">● Inativo</span>') +
    '</div>' +

    '<button class="btn" style="background:'+(ativo?'#ef4444':'#22c55e')+'; color:white;" onclick="toggleStatus()">' +
      (ativo ? 'Desativar' : 'Ativar') +
    '</button>' +

  '</div>' +

  '<button class="btn btn-edit" onclick="toggleEdit()">✏️ Editar dados</button>' +
  '<button class="btn btn-primary" onclick="salvar()">💾 Salvar</button>' +

  '</div>';
}

// 🔓 EDITAR
function toggleEdit(){
  editando = !editando;
  render();
}

// 💾 SALVAR
async function salvar(){

  function getValue(id){
    const el = document.getElementById(id);
    return el ? el.value : null;
  }

  let matricula = getValue("matricula");

  if(!matricula){
    matricula = await gerarMatricula();
  }

  const payload = {
    matricula,
    data_inicio: getValue("data_inicio"),
    curso: getValue("curso"),
    tipo: getValue("tipo"),
    cpf: getValue("cpf"),
    rg: getValue("rg"),
    celular: getValue("celular"),
    endereco: getValue("endereco")
  };

  const { error } = await client
    .from("usuarios")
    .update(payload)
    .eq("id", id);

  if(error){
    alert(error.message);
    return;
  }

  await client.from("usuarios_historico").insert([{
    usuario_id: id,
    alteracao: "Dados atualizados",
    data: new Date()
  }]);

  alert("Salvo com sucesso!");
  editando = false;
  carregar();
}

carregar();

</script>

</body>
</html>
