<!DOCTYPE html>
<html>
<head>
  <title>Ficha do Aluno</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { font-family:'Segoe UI'; background:#eef2f7; padding:20px; }

    .card {
      background:white; padding:20px; border-radius:12px;
      margin-bottom:20px; box-shadow:0 5px 15px rgba(0,0,0,0.05);
    }

    input, select {
      width:100%; padding:8px; margin:5px 0;
    }

    input[readonly] {
      background:#f1f5f9;
      cursor:not-allowed;
    }

    .btn {
      padding:8px 12px;
      margin-top:10px;
      cursor:pointer;
      border:none;
      border-radius:8px;
    }

    .btn-primary { background:#2c5364; color:white; }
    .btn-edit { background:#f59e0b; color:white; }
  </style>
</head>

<body>

<h2>📋 Ficha do Aluno</h2>

<div id="dados"></div>

<script>

const client = supabase.createClient(eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56eWdkdml4cW1pbHRlbGd6enJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDk5MjQsImV4cCI6MjA5MTY4NTkyNH0.wMaTGEgL_VCbSewnB-4BmdoA6rcGJWDsWIVaIo5dTy8);

const id = new URLSearchParams(window.location.search).get("id");

let aluno = null;
let editando = false;

// 🔢 MATRÍCULA AUTOMÁTICA
async function gerarMatricula(){
  const ano = new Date().getFullYear();

  const { data } = await client
    .from("usuarios")
    .select("matricula")
    .like("matricula", `${ano}%`);

  const numero = (data.length + 1).toString().padStart(3,"0");

  return `${ano}${numero}`;
}

// 🚀 CARREGAR
async function carregar(){
  const { data, error } = await client
    .from("usuarios")
    .select("*")
    .eq("id", id)
    .single();

  if(error){
    console.error("ERRO AO CARREGAR:", error);
    alert("Erro ao carregar aluno");
    return;
  }

  aluno = data;
  render();
}

// 🎨 RENDER
function render(){

  const travado = !editando;

  document.getElementById("dados").innerHTML = `
    <div class="card">

      <button class="btn btn-edit" onclick="toggleEdit()">✏️ Editar dados</button>

      <label>Nome</label>
      <input id="nome" value="${aluno.nome}" readonly>

      <label>Email</label>
      <input value="${aluno.email}" readonly>

      <label>Matrícula</label>
      <input id="matricula" value="${aluno.matricula || ""}" readonly>

      <label>Data início</label>
      <input id="data_inicio" type="date" value="${aluno.data_inicio || ""}">

      <label>Curso</label>
      <select id="curso">
        <option value="Curso Básico" ${aluno.curso==="Curso Básico"?"selected":""}>Curso Básico</option>
        <option value="Curso Médio" ${aluno.curso==="Curso Médio"?"selected":""}>Curso Médio</option>
      </select>

      <label>CPF</label>
      <input id="cpf" value="${aluno.cpf || ""}" ${travado?"readonly":""}>

      <label>RG</label>
      <input id="rg" value="${aluno.rg || ""}" ${travado?"readonly":""}>

      <label>Celular</label>
      <input id="celular" value="${aluno.celular || ""}" ${travado?"readonly":""}>

      <label>Endereço</label>
      <input id="endereco" value="${aluno.endereco || ""}" ${travado?"readonly":""}>

      <button class="btn btn-primary" onclick="salvar()">💾 Salvar</button>

    </div>
  `;
}

// 🔓 EDITAR
function toggleEdit(){
  editando = !editando;
  render();
}

// 💾 SALVAR
async function salvar(){

  let matricula = document.getElementById("matricula").value;

  if(!matricula){
    matricula = await gerarMatricula();
  }

  const payload = {
    matricula,
    data_inicio: document.getElementById("data_inicio").value,
    curso: document.getElementById("curso").value,
    cpf: document.getElementById("cpf").value,
    rg: document.getElementById("rg").value,
    celular: document.getElementById("celular").value,
    endereco: document.getElementById("endereco").value
  };

  const { error } = await client
    .from("usuarios")
    .update(payload)
    .eq("id", id);

  if(error){
    alert(error.message);
    return;
  }

  // 📜 HISTÓRICO
  await client.from("usuarios_historico").insert([{
    usuario_id: id,
    alteracao: "Dados atualizados",
    data: new Date()
  }]);

  alert("Salvo com sucesso!");
  editando = false;
  carregar();
}

carregar();

</script>

</body>
</html>
