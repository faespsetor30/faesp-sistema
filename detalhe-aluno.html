<!DOCTYPE html>
<html>
<head>
  <title>Ficha do Aluno</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { font-family:'Segoe UI'; background:#eef2f7; padding:20px; }

    .card {
      background:white; padding:20px; border-radius:12px;
      margin-bottom:20px; box-shadow:0 5px 15px rgba(0,0,0,0.05);
    }

    input {
      width:100%; padding:8px; margin:5px 0;
    }

    input[readonly] {
      background:#f1f5f9;
      cursor:not-allowed;
    }

    label {
      font-weight:600;
      display:block;
      margin-top:10px;
      color:#2c5364;
    }

    button {
      padding:8px 12px; margin-top:10px; cursor:pointer;
    }

    table {
      width:100%; border-collapse:collapse; margin-top:10px;
    }

    th, td {
      padding:10px; border-bottom:1px solid #ddd; text-align:center;
    }

    th {
      background:#f8fafc;
    }
  </style>
</head>

<body>

<h2>📋 Ficha do Aluno</h2>

<div id="dados"></div>
<div id="acoes"></div>
<div id="media"></div>
<div id="grafico"></div>
<div id="disciplinas"></div>
<div id="financeiro"></div>

<script>

const client = supabase.createClient(
  "https://nzygdvixqmiltelgzzrn.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56eWdkdml4cW1pbHRlbGd6enJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDk5MjQsImV4cCI6MjA5MTY4NTkyNH0.wMaTGEgL_VCbSewnB-4BmdoA6rcGJWDsWIVaIo5dTy8"
);

// 🔐 PROTEÇÃO
const usuario = JSON.parse(localStorage.getItem("usuario"));
if (!usuario || usuario.tipo !== "Coordenacao") {
  alert("Acesso restrito");
  window.location.href = "index.html";
}

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

let aluno = null;

// 🧠 FORMATAR NOME
function formatarNome(nome) {
  return nome?.toLowerCase().replace(/\b\w/g, l => l.toUpperCase());
}

// 🧠 MÁSCARAS
function formatarCPF(valor) {
  return valor.replace(/\D/g,'')
    .replace(/(\d{3})(\d)/,'$1.$2')
    .replace(/(\d{3})(\d)/,'$1.$2')
    .replace(/(\d{3})(\d{1,2})$/,'$1-$2');
}

function formatarCelular(valor) {
  return valor.replace(/\D/g,'')
    .replace(/(\d{2})(\d)/,'($1) $2')
    .replace(/(\d{5})(\d)/,'$1-$2');
}

function aplicarMascaras() {
  const cpf = document.getElementById("cpf");
  const celular = document.getElementById("celular");

  cpf.addEventListener("input", () => cpf.value = formatarCPF(cpf.value));
  celular.addEventListener("input", () => celular.value = formatarCelular(celular.value));
}

// 📋 COPIAR
function copiarDados() {
  const texto = `
Nome: ${document.getElementById("nome").value}
Email: ${document.getElementById("email").value}
CPF: ${document.getElementById("cpf").value}
Celular: ${document.getElementById("celular").value}
Curso: ${document.getElementById("curso").value}
  `;
  navigator.clipboard.writeText(texto);
  alert("Dados copiados!");
}

// 🚀 CARREGAR
async function carregar() {
  const { data } = await client.from("usuarios").select("*").eq("id", id).single();
  aluno = data;

  renderDados();
  renderAcoes();
  carregarDisciplinas();
  carregarFinanceiro();
}

// 👤 DADOS
function renderDados() {

  document.getElementById("dados").innerHTML = `
    <div class="card">
      <h3>👤 Dados do Aluno</h3>

      <label>Nome Completo</label>
      <input id="nome" value="${formatarNome(aluno.nome)}">

      <label>Email</label>
      <input id="email" value="${aluno.email}" readonly>

      <label>CPF</label>
      <input id="cpf" value="${aluno.cpf || ""}">

      <label>RG</label>
      <input id="rg" value="${aluno.rg || ""}">

      <label>Data de Nascimento</label>
      <input id="data" type="date" value="${aluno.data_nascimento || ""}">

      <label>Endereço</label>
      <input id="endereco" value="${aluno.endereco || ""}">

      <label>Celular</label>
      <input id="celular" value="${aluno.celular || ""}">

      <label>Curso</label>
      <input id="curso" value="${aluno.curso || ""}">

      <button onclick="salvarEdicao()">💾 Salvar</button>
      <button onclick="copiarDados()">📋 Copiar</button>
    </div>
  `;

  aplicarMascaras();
}

// 💾 SALVAR
async function salvarEdicao() {
  await client.from("usuarios").update({
    nome: document.getElementById("nome").value,
    cpf: document.getElementById("cpf").value,
    rg: document.getElementById("rg").value,
    data_nascimento: document.getElementById("data").value,
    endereco: document.getElementById("endereco").value,
    celular: document.getElementById("celular").value,
    curso: document.getElementById("curso").value
  }).eq("id", id);

  alert("Dados atualizados!");
}

// ⚙️ AÇÕES
function renderAcoes() {
  document.getElementById("acoes").innerHTML = `
    <div class="card">
      <h3>⚙️ Ações</h3>
      <button onclick="aprovar()">✅ Aprovar</button>
      <button onclick="recusar()" style="background:red;color:white;">❌ Recusar</button>
    </div>
  `;
}

async function aprovar() {
  await client.from("usuarios").update({ status:"ativo" }).eq("id", id);
  alert("Aprovado!");
  carregar();
}

async function recusar() {
  await client.from("usuarios").update({ status:"recusado" }).eq("id", id);
  alert("Recusado!");
  carregar();
}

// 📚 DISCIPLINAS
async function carregarDisciplinas() {

  const { data } = await client.from("disciplinas").select("*").eq("email", aluno.email);

  let soma = 0, qtd = 0;
  let nomes = [], notas = [];

  let html = `<div class="card"><h3>📊 Disciplinas</h3><table>
  <tr><th>Disciplina</th><th>Nota</th></tr>`;

  data.forEach(d => {
    html += `<tr><td>${d.nome}</td><td>${d.nota || "-"}</td></tr>`;

    if (d.nota) {
      soma += Number(d.nota);
      qtd++;
      nomes.push(d.nome);
      notas.push(d.nota);
    }
  });

  html += "</table></div>";
  document.getElementById("disciplinas").innerHTML = html;

  const media = qtd ? (soma/qtd).toFixed(1) : "-";

  document.getElementById("media").innerHTML = `
    <div class="card">
      <h3>📈 Média do Aluno</h3>
      <h2>${media}</h2>
    </div>
  `;

  document.getElementById("grafico").innerHTML = `
    <div class="card">
      <h3>📊 Gráfico</h3>
      <canvas id="chart"></canvas>
    </div>
  `;

  setTimeout(() => {
    new Chart(document.getElementById("chart"), {
      type:'bar',
      data:{ labels:nomes, datasets:[{label:'Notas',data:notas}] }
    });
  },200);
}

// 💰 FINANCEIRO
async function carregarFinanceiro() {

  const { data } = await client.from("financeiro").select("*").eq("email", aluno.email);

  let html = `<div class="card"><h3>💰 Financeiro</h3><table>
  <tr><th>Disciplina</th><th>Valor</th><th>Status</th></tr>`;

  data.forEach(f => {
    html += `<tr>
      <td>${f.disciplina}</td>
      <td>R$ ${f.valor}</td>
      <td>${f.status}</td>
    </tr>`;
  });

  html += "</table></div>";
  document.getElementById("financeiro").innerHTML = html;
}

carregar();

</script>

</body>
</html>
