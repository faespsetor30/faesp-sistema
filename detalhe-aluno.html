<!DOCTYPE html>
<html>
<head>
  <title>Ficha do Aluno</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { font-family:'Segoe UI'; background:#eef2f7; padding:20px; }

    .card {
      background:white; padding:20px; border-radius:12px;
      margin-bottom:20px; box-shadow:0 5px 15px rgba(0,0,0,0.05);
    }

    input, select {
      width:100%; padding:8px; margin:5px 0;
    }

    input[readonly] {
      background:#f1f5f9;
      cursor:not-allowed;
    }

    label {
      font-weight:600;
      display:block;
      margin-top:10px;
      color:#2c5364;
    }

    button {
      padding:8px 12px; margin-top:10px; cursor:pointer;
    }

    table {
      width:100%; border-collapse:collapse; margin-top:10px;
    }

    th, td {
      padding:10px; border-bottom:1px solid #ddd; text-align:center;
    }

    th { background:#f8fafc; }

    .top-bar { margin-bottom:15px; }

    .status-badge {
      display:inline-block;
      padding:6px 12px;
      border-radius:20px;
      font-size:13px;
      font-weight:bold;
    }

    .status-ativo {
      background:#dcfce7;
      color:#166534;
    }

    .status-inativo {
      background:#fee2e2;
      color:#991b1b;
    }

    .toggle {
      width:50px;
      height:26px;
      background:#ccc;
      border-radius:50px;
      position:relative;
      cursor:pointer;
      transition:0.3s;
    }

    .toggle::after {
      content:"";
      width:22px;
      height:22px;
      background:white;
      position:absolute;
      top:2px;
      left:2px;
      border-radius:50%;
      transition:0.3s;
    }

    .toggle.ativo {
      background:#22c55e;
    }

    .toggle.ativo::after {
      left:26px;
    }

    .btn-primary {
      background:#2c5364;
      color:white;
      border:none;
      border-radius:8px;
    }
  </style>
</head>

<body>

<div class="top-bar">
  <button onclick="voltar()">⬅️ Voltar</button>
</div>

<h2>📋 Ficha do Aluno</h2>

<div id="dados"></div>
<div id="acoes"></div>
<div id="media"></div>
<div id="grafico"></div>
<div id="disciplinas"></div>
<div id="financeiro"></div>

<script>

const client = supabase.createClient(
  "https://nzygdvixqmiltelgzzrn.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56eWdkdml4cW1pbHRlbGd6enJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDk5MjQsImV4cCI6MjA5MTY4NTkyNH0.wMaTGEgL_VCbSewnB-4BmdoA6rcGJWDsWIVaIo5dTy8"
);

// 🔐 PROTEÇÃO
const usuario = JSON.parse(localStorage.getItem("usuario"));
if (!usuario || usuario.tipo !== "Coordenacao") {
  alert("Acesso restrito");
  window.location.href = "index.html";
}

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

let aluno = null;

// 🔙 VOLTAR
function voltar() {
  window.location.href = "admin.html";
}

// FORMATOS
function formatarNome(nome) {
  return nome?.toLowerCase().replace(/\b\w/g, l => l.toUpperCase());
}

function formatarCPF(valor) {
  return valor.replace(/\D/g,'')
    .replace(/(\d{3})(\d)/,'$1.$2')
    .replace(/(\d{3})(\d)/,'$1.$2')
    .replace(/(\d{3})(\d{1,2})$/,'$1-$2');
}

function formatarCelular(valor) {
  return valor.replace(/\D/g,'')
    .replace(/(\d{2})(\d)/,'($1) $2')
    .replace(/(\d{5})(\d)/,'$1-$2');
}

function aplicarMascaras() {
  document.getElementById("cpf").addEventListener("input", e => e.target.value = formatarCPF(e.target.value));
  document.getElementById("celular").addEventListener("input", e => e.target.value = formatarCelular(e.target.value));
}

// COPIAR
function copiarDados() {
  const texto = `
Nome: ${document.getElementById("nome").value}
Matrícula: ${document.getElementById("matricula").value}
Curso: ${document.getElementById("curso").value}
  `;
  navigator.clipboard.writeText(texto);
  alert("Dados copiados!");
}

// 🚀 CARREGAR
async function carregar() {
  const { data } = await client.from("usuarios").select("*").eq("id", id).single();
  aluno = data;

  renderDados();
  renderAcoes();
  carregarDisciplinas();
  carregarFinanceiro();
}

// 👤 DADOS
function renderDados() {
  document.getElementById("dados").innerHTML = `
    <div class="card">
      <h3>👤 Dados do Aluno</h3>
      <label>Nome Completo</label>
      <input id="nome" value="${formatarNome(aluno.nome)}">
      <label>Email</label>
      <input id="email" value="${aluno.email}" readonly>
      <label>Número da Matrícula</label>
      <input id="matricula" value="${aluno.matricula || ""}">
      <label>Data de Início</label>
      <input id="data_inicio" type="date" value="${aluno.data_inicio || ""}">
      <label>Curso</label>
      <select id="curso">
        <option ${aluno.curso==="Curso Básico"?"selected":""}>Curso Básico</option>
        <option ${aluno.curso==="Curso Médio"?"selected":""}>Curso Médio</option>
      </select>
      <label>CPF</label>
      <input id="cpf" value="${aluno.cpf || ""}">
      <label>RG</label>
      <input id="rg" value="${aluno.rg || ""}">
      <label>Celular</label>
      <input id="celular" value="${aluno.celular || ""}">
      <label>Endereço</label>
      <input id="endereco" value="${aluno.endereco || ""}">
      <button onclick="salvarEdicao()">💾 Salvar</button>
      <button onclick="copiarDados()">📋 Copiar</button>
    </div>
  `;
  aplicarMascaras();
}

// 💾 SALVAR (AJUSTADO 🔥)
async function salvarEdicao() {
  await client.from("usuarios").update({
    nome: document.getElementById("nome").value,
    matricula: document.getElementById("matricula").value,
    data_inicio: document.getElementById("data_inicio").value,
    curso: document.getElementById("curso").value,
    cpf: document.getElementById("cpf").value,
    rg: document.getElementById("rg").value,
    celular: document.getElementById("celular").value,
    endereco: document.getElementById("endereco").value
  }).eq("id", id);

  alert("Atualizado!");

  // 🔄 ESSENCIAL: atualiza os dados na tela
  await carregar();
}

// 🔥 STATUS
function renderAcoes() {
  const ativo = aluno.status === "ativo";

  document.getElementById("acoes").innerHTML = `
    <div class="card">
      <h3>⚙️ Status do Aluno</h3>

      <div style="display:flex; justify-content:space-between; align-items:center;">
        <div class="status-badge ${ativo ? "status-ativo" : "status-inativo"}">
          ${ativo ? "Aluno Ativo" : "Aluno Inativo"}
        </div>

        <div class="toggle ${ativo ? "ativo" : ""}" onclick="toggleStatus()"></div>
      </div>

      <div id="confirmacao" style="margin-top:15px;"></div>
    </div>
  `;
}

function toggleStatus() {
  const novo = aluno.status === "ativo" ? "recusado" : "ativo";
  const texto = novo === "ativo" ? "Aluno ativo" : "Aluno inativo";

  document.getElementById("confirmacao").innerHTML = `
    <p><strong>${texto}</strong></p>
    <p>Deseja confirmar?</p>
    <button class="btn-primary" onclick="confirmarAlteracao('${novo}')">Sim</button>
    <button onclick="cancelarAlteracao()">Cancelar</button>
  `;
}

function cancelarAlteracao() {
  document.getElementById("confirmacao").innerHTML = "";
}

async function confirmarAlteracao(status) {
  await client.from("usuarios").update({ status }).eq("id", id);
  alert("Status atualizado!");
  carregar();
}

// RESTANTE
async function carregarDisciplinas() { }
async function carregarFinanceiro(){ }

carregar();

</script>

</body>
</html>
