<!DOCTYPE html>
<html>

<head>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      background: linear-gradient(180deg, #0f172a, #020617);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: rgba(0,0,0,0.85);
      padding: 40px;
      border-radius: 16px;
      width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      text-align: center;
      backdrop-filter: blur(10px);
    }

    .logo {
      width: 90px;
      margin-bottom: 10px;
    }

    h1 {
      margin: 5px 0;
      color: #22c55e;
      font-size: 22px;
      letter-spacing: 1px;
    }

    h2 {
      margin: 0 0 25px 0;
      color: #94a3b8;
      font-size: 13px;
      font-weight: normal;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: none;
      background: #1e293b;
      color: white;
      font-size: 14px;
    }

    input:focus {
      outline: none;
      border: 1px solid #22c55e;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      color: black;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #16a34a;
      transform: scale(1.02);
    }

    #resultado {
      margin-top: 12px;
      color: #22c55e;
      font-size: 13px;
    }
  </style>
</head>

<body>

<div class="card">

  <!-- LOGO -->
  img src="logo faesp.png" class="logo"

  <h1>FAESP</h1>
  <h2>Setor 30 • Campo Limpo Paulista</h2>

  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">

  <button onclick="login()">Entrar</button>

  <div id="resultado"></div>

</div>

<script>
const client = supabase.createClient(
  "https://nzygdvixqmiltelgzzrn.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56eWdkdml4cW1pbHRlbGd6enJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDk5MjQsImV4cCI6MjA5MTY4NTkyNH0.wMaTGEgL_VCbSewnB-4BmdoA6rcGJWDsWIVaIo5dTy8"
);

async function login() {

  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  if (!email || !senha) {
    document.getElementById("resultado").innerText = "Preencha email e senha";
    return;
  }

  document.getElementById("resultado").innerText = "Entrando...";

  const { error } = await client.auth.signInWithPassword({
    email: email,
    password: senha
  });

  if (error) {
    document.getElementById("resultado").innerText = "Email ou senha inválidos";
    return;
  }

  const { data: usuario } = await client
    .from("usuarios")
    .select("*")
    .eq("email", email)
    .single();

  localStorage.setItem("usuario", JSON.stringify(usuario));

  if (usuario.tipo === "Coordenacao") {
    window.location.href = "admin.html";
  } else if (usuario.tipo === "Professor") {
    window.location.href = "professor.html";
  } else {
    window.location.href = "dashboard.html";
  }
}
</script>

</body>
</html>
