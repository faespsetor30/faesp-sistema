<!DOCTYPE html>
<html>

<head>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div style="max-width:400px;margin:auto;margin-top:100px;text-align:center;">
  
  <h2>FAESP Login</h2>

  <input id="email" placeholder="Email" style="width:100%;padding:10px;margin:5px;"><br>
  <input id="senha" type="password" placeholder="Senha" style="width:100%;padding:10px;margin:5px;"><br>

  <button onclick="login()" style="width:100%;padding:10px;">Entrar</button>

  <div id="resultado" style="margin-top:10px;"></div>

</div>

<script>
const client = supabase.createClient(
  "https://nzygdvixqmiltelgzzrn.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56eWdkdml4cW1pbHRlbGd6enJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDk5MjQsImV4cCI6MjA5MTY4NTkyNH0.wMaTGEgL_VCbSewnB-4BmdoA6rcGJWDsWIVaIo5dTy8"
);

async function login() {

  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  if (!email || !senha) {
    document.getElementById("resultado").innerText = "Preencha email e senha";
    return;
  }

  document.getElementById("resultado").innerText = "Entrando...";

  const { error } = await client.auth.signInWithPassword({
    email: email,
    password: senha
  });

  if (error) {
    document.getElementById("resultado").innerText = "Email ou senha inválidos";
    return;
  }

  const { data: usuario } = await client
    .from("usuarios")
    .select("*")
    .eq("email", email)
    .single();

  localStorage.setItem("usuario", JSON.stringify(usuario));

  if (usuario.tipo === "Coordenacao") {
    window.location.href = "admin.html";
  } else if (usuario.tipo === "Professor") {
    window.location.href = "professor.html";
  } else {
    window.location.href = "dashboard.html";
  }
}
</script>

</body>
</html>
