<!DOCTYPE html>
<html>
<head>
  <title>FAESP Sistema</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 16px;
      width: 420px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.3);
      text-align: center;
    }

    .logo {
      width: 120px;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 18px;
      margin: 5px 0;
      color: #2c5364;
    }

    h2 {
      font-size: 14px;
      margin-bottom: 20px;
      color: #555;
    }

    input {
      width: 92%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #2c5364;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    .tabs button {
      margin-top: 10px;
      width: 48%;
      font-size: 12px;
    }

    #conteudo {
      margin-top: 15px;
      text-align: left;
      font-size: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    td, th {
      padding: 6px;
      border-bottom: 1px solid #ddd;
    }

    .aprovado { color: green; }
    .reprovado { color: red; }
  </style>
</head>

<body>

<div class="card">

  <img src="logo faesp.png" class="logo">

  <h1>FAESP - SETOR 30</h1>
  <h2>Campo Limpo Paulista/SP</h2>

  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">

  <button onclick="login()">Entrar</button>

  <div id="resultado"></div>

  <!-- 🔥 ABAS -->
  <div class="tabs" id="tabs" style="display:none;">
    <button onclick="mostrar('disciplinas')">📊 Disciplinas</button>
    <button onclick="mostrar('concluidas')">📚 Concluídas</button>
  </div>

  <div id="conteudo"></div>

</div>

<script>
const client = supabase.createClient(
  "https://nzygdvixqmiltelgzzrn.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56eWdkdml4cW1pbHRlbGd6enJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDk5MjQsImV4cCI6MjA5MTY4NTkyNH0.wMaTGEgL_VCbSewnB-4BmdoA6rcGJWDsWIVaIo5dTy8"
);

let emailGlobal = "";

async function login() {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  const { data, error } = await client.auth.signInWithPassword({
    email: email,
    password: senha
  });

  if (error) {
    document.getElementById("resultado").innerText = "❌ " + error.message;
    return;
  }

  emailGlobal = email;

  const { data: usuario } = await client
    .from("usuarios")
    .select("*")
    .eq("email", email)
    .single();

  document.getElementById("resultado").innerText =
    "✨ Bem-vinda, " + usuario.nome + "!";

  document.getElementById("tabs").style.display = "block";

  mostrar("disciplinas");
}

// 📊 DISCIPLINAS
async function carregarDisciplinas() {
  const { data } = await client
    .from("notas")
    .select("*")
    .eq("email", emailGlobal);

  let html = "<h3>📊 Disciplinas</h3><table>";
  html += "<tr><th>Matéria</th><th>Nota</th><th>Status</th></tr>";

  data.forEach(d => {
    let classe = d.status === "Aprovado" ? "aprovado" : "reprovado";

    html += `
      <tr>
        <td>${d.disciplina}</td>
        <td>${d.nota ?? 0}</td>
        <td class="${classe}">${d.status}</td>
      </tr>
    `;
  });

  html += "</table>";
  document.getElementById("conteudo").innerHTML = html;
}

// 📚 CONCLUÍDAS
async function carregarConcluidas() {
  const { data } = await client
    .from("disciplinas_concluidas")
    .select("*")
    .eq("email", emailGlobal);

  let html = "<h3>📚 Concluídas</h3><table>";
  html += "<tr><th>Matéria</th><th>Data</th><th>Professor</th><th>Livro</th></tr>";

  data.forEach(d => {
    html += `
      <tr>
        <td>${d.disciplina}</td>
        <td>${d.data_conclusao}</td>
        <td>${d.professor}</td>
        <td>${d.livro ? "Sim" : "Não"}</td>
      </tr>
    `;
  });

  html += "</table>";
  document.getElementById("conteudo").innerHTML = html;
}

// 🔁 CONTROLE
function mostrar(aba) {
  if (aba === "disciplinas") carregarDisciplinas();
  if (aba === "concluidas") carregarConcluidas();
}
</script>

</body>
</html>
