<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  "https://rivxqnwrgzdhboisysf.supabase.co",
  "sb_publishable_ghUuFhZvrQf6sEHURVwsWQ_z6ZWmYPV"
);

window.login = async function () {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  const { data, error } = await supabase.auth.signInWithPassword({
    email: email,
    password: senha
  });

  if (error) {
    document.getElementById("resultado").innerText = "Erro: " + error.message;
  } else {
    document.getElementById("resultado").innerText = "Login realizado!";
  }
}
</script>
