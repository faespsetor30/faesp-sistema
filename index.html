<!DOCTYPE html>
<html>

<head>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      background: linear-gradient(180deg, #0b1f2a, #020617);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* 🔥 ANIMAÇÃO ORIGINAL (VOLTOU!) */
    body::before {
      content: "";
      position: absolute;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,0,0,0.15) 0%, transparent 60%);
      animation: pulse 6s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.4; }
      50% { transform: scale(1.2); opacity: 0.2; }
      100% { transform: scale(1); opacity: 0.4; }
    }

    /* CARD */
    .card {
      position: relative;
      background: rgba(2,6,23,0.95);
      padding: 40px;
      border-radius: 16px;
      width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      text-align: center;
      backdrop-filter: blur(12px);
      animation: fadeUp 0.8s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      width: 90px;
      margin-bottom: 10px;
    }

    h1 {
      margin: 5px 0;
      color: white;
      font-size: 24px;
      letter-spacing: 2px;
    }

    h2 {
      margin: 0 0 25px 0;
      color: #cbd5e1;
      font-size: 13px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: none;
      background: #1e293b;
      color: white;
    }

    input:focus {
      outline: none;
      border: 1px solid #1e3a8a;
      box-shadow: 0 0 8px rgba(30,58,138,0.6);
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(90deg, #1e3a8a, #dc2626);
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.03);
      box-shadow: 0 5px 20px rgba(220,38,38,0.4);
    }

    #resultado {
      margin-top: 10px;
      color: #dc2626;
    }

    /* MODAL */
    #modalCadastro {
      display:none;
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.6);
      justify-content:center;
      align-items:center;
    }

    .modal-box {
      background:#020617;
      padding:25px;
      border-radius:12px;
      width:320px;
    }

  </style>
</head>

<body>

<div class="card">

  <img src="logo faesp.png" class="logo">

  <h1>FAESP</h1>
  <h2>Setor 30 • Campo Limpo Paulista</h2>

  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">

  <button onclick="login()">Entrar</button>
  <button onclick="abrirCadastro()">Criar conta</button>

  <div id="resultado"></div>

</div>

<!-- MODAL -->
<div id="modalCadastro">
  <div class="modal-box">

    <h3 style="color:white">Cadastro</h3>

    <input id="novoNome" placeholder="Nome completo">
    <input id="novoEmail" placeholder="Email">
    <input id="novoCpf" placeholder="CPF">
    <input id="novoRg" placeholder="RG">
    <input id="novoEndereco" placeholder="Endereço">
    <input id="novoTelefone" placeholder="Telefone">
    <input id="novaData" type="date">

    <button onclick="salvarCadastro()">Cadastrar</button>
    <button onclick="fecharCadastro()">Cancelar</button>

    <div id="msgCadastro" style="color:white;"></div>

  </div>
</div>

<script>

const client = supabase.createClient(
  "https://nzygdvixqmiltelgzzrn.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56eWdkdml4cW1pbHRlbGd6enJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDk5MjQsImV4cCI6MjA5MTY4NTkyNH0.wMaTGEgL_VCbSewnB-4BmdoA6rcGJWDsWIVaIo5dTy8"
);

async function login(){

  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  if(!email || !senha){
    resultado.innerText = "Preencha email e senha";
    return;
  }

  resultado.innerText = "Entrando...";

  const { error } = await client.auth.signInWithPassword({
    email,
    password: senha
  });

  if(error){
    resultado.innerText = "Email ou senha inválidos";
    return;
  }

  const { data: usuario } = await client
    .from("usuarios")
    .select("*")
    .eq("email", email)
    .single();

  localStorage.setItem("usuario", JSON.stringify(usuario));

  if (usuario.tipo === "Coordenacao") {
    window.location.href = "admin.html";
  } else if (usuario.tipo === "Professor") {
    window.location.href = "professor.html";
  } else {
    window.location.href = "dashboard.html";
  }
}

function abrirCadastro(){
  modalCadastro.style.display = "flex";
}

function fecharCadastro(){
  modalCadastro.style.display = "none";
}

async function salvarCadastro(){

  const nome = novoNome.value;
  const email = novoEmail.value;
  const cpf = novoCpf.value;
  const rg = novoRg.value;
  const endereco = novoEndereco.value;
  const telefone = novoTelefone.value;
  const data = novaData.value;

  if(!nome || !email){
    msgCadastro.innerText = "Preencha nome e email";
    return;
  }

  const { error } = await client.from("usuarios").insert([{
    nome,
    email,
    cpf,
    rg,
    endereco,
    celular: telefone,
    data_nascimento: data,
    status: "pendente",
    tipo: "Aluno"
  }]);

  if(error){
    msgCadastro.innerText = "Erro ao cadastrar";
  } else {
    msgCadastro.innerText = "Cadastro enviado!";
  }
}

</script>

</body>
</html>
