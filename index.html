<script>
const client = supabase.createClient(
  "https://nzygdvixqmiltelgzzrn.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
);

async function login() {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  try {
    const { data, error } = await client.auth.signInWithPassword({
      email: email,
      password: senha
    });

    if (error) {
      document.getElementById("resultado").innerText = "Erro: " + error.message;
    } else {

      // 🔥 pega usuário logado
      const user = data.user;

      // 🔥 busca no banco
      const { data: usuario, error: erroUsuario } = await client
        .from("usuarios")
        .select("*")
        .eq("email", user.email)
        .single();

      if (erroUsuario) {
        document.getElementById("resultado").innerText = "Erro ao buscar usuário";
      } else {
        document.getElementById("resultado").innerText =
          "Bem-vinda, " + usuario.nome + "!";
      }
    }
  } catch (e) {
    document.getElementById("resultado").innerText = "Erro geral: " + e.message;
  }
}
</script>
