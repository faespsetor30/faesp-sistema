// LOGIN
async function login() {

  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  if (!email || !senha) {
    document.getElementById("resultado").innerText = "Preencha email e senha";
    return;
  }

  document.getElementById("resultado").innerText = "Entrando...";

  const { error } = await client.auth.signInWithPassword({
    email: email,
    password: senha
  });

  if (error) {
    document.getElementById("resultado").innerText = "Email ou senha inválidos";
    return;
  }

  const { data: usuario, error: erroUsuario } = await client
    .from("usuarios")
    .select("*")
    .eq("email", email)
    .single();

  if (erroUsuario || !usuario) {
    document.getElementById("resultado").innerText = "Usuário não encontrado";
    return;
  }

  if (usuario.status !== "ativo") {
    document.getElementById("resultado").innerText =
      "Cadastro aguardando aprovação";
    return;
  }

  if (usuario.primeiro_acesso) {
    localStorage.setItem("usuario_temp", JSON.stringify(usuario));
    window.location.href = "primeiro-acesso.html";
    return;
  }

  localStorage.setItem("usuario", JSON.stringify(usuario));

  if (usuario.tipo === "Coordenacao") {
    window.location.href = "admin.html";
  } else if (usuario.tipo === "Professor") {
    window.location.href = "professor.html";
  } else {
    window.location.href = "dashboard.html";
  }
}

// MODAL
function abrirCadastro() {
  document.getElementById("modalCadastro").style.display = "flex";
}

function fecharCadastro() {
  document.getElementById("modalCadastro").style.display = "none";
}

// CADASTRO
async function salvarCadastro() {

  const nome = document.getElementById("novoNome").value;
  const email = document.getElementById("novoEmail").value;
  const cpf = document.getElementById("novoCpf").value;
  const rg = document.getElementById("novoRg").value;
  const data = document.getElementById("novaData").value;
  const endereco = document.getElementById("novoEndereco").value;
  const celular = document.getElementById("novoCelular").value;

  if (!nome || !email) {
    document.getElementById("msgCadastro").innerText = "Preencha nome e email";
    return;
  }

  const { error } = await client
    .from("usuarios")
    .insert([{
      nome,
      email,
      cpf,
      rg,
      data_nascimento: data,
      endereco,
      celular,
      status: "pendente",
      tipo: "Aluno"
    }]);

  if (error) {
    document.getElementById("msgCadastro").innerText = "Erro ao cadastrar";
  } else {
    document.getElementById("msgCadastro").innerText =
      "Cadastro enviado! Aguarde aprovação.";
  }
}

</script>
