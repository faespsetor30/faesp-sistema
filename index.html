<!DOCTYPE html>
<html>

<head>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      background: linear-gradient(180deg, #0b1f2a, #020617);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* 🔥 FUNDO ANIMADO (PARTÍCULAS) */
    .particula {
      position: absolute;
      width: 6px;
      height: 6px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      animation: subir linear infinite;
    }

    @keyframes subir {
      from {
        transform: translateY(100vh);
        opacity: 0;
      }
      20% { opacity: 1; }
      to {
        transform: translateY(-10vh);
        opacity: 0;
      }
    }

    /* 🎬 CARD */
    .card {
      position: relative;
      background: rgba(2,6,23,0.95);
      padding: 40px;
      border-radius: 16px;
      width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      text-align: center;
      backdrop-filter: blur(12px);
      z-index: 10;
      animation: fadeUp 0.8s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      width: 90px;
      margin-bottom: 10px;
    }

    h1 {
      margin: 5px 0;
      color: white;
      font-size: 24px;
      letter-spacing: 2px;
    }

    h2 {
      margin: 0 0 25px 0;
      color: #cbd5e1;
      font-size: 13px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: none;
      background: #1e293b;
      color: white;
    }

    input:focus {
      outline: none;
      border: 1px solid #1e3a8a;
      box-shadow: 0 0 8px rgba(30,58,138,0.6);
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(90deg, #1e3a8a, #dc2626);
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.03);
      box-shadow: 0 5px 20px rgba(220,38,38,0.4);
    }

    #resultado {
      margin-top: 12px;
      color: #dc2626;
      font-size: 13px;
    }

  </style>
</head>

<body>

<!-- 🔥 PARTÍCULAS -->
<script>
for(let i=0; i<40; i++){
  const p = document.createElement("div");
  p.className = "particula";
  p.style.left = Math.random()*100 + "vw";
  p.style.animationDuration = (5 + Math.random()*5) + "s";
  p.style.animationDelay = Math.random()*5 + "s";
  document.body.appendChild(p);
}
</script>

<div class="card">

  <img src="logo faesp.png" class="logo">

  <h1>FAESP</h1>
  <h2>Setor 30 • Campo Limpo Paulista</h2>

  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">

  <button onclick="login()">Entrar</button>

  <div id="resultado"></div>

</div>

<script>
const client = supabase.createClient(
  "https://nzygdvixqmiltelgzzrn.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56eWdkdml4cW1pbHRlbGd6enJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDk5MjQsImV4cCI6MjA5MTY4NTkyNH0.wMaTGEgL_VCbSewnB-4BmdoA6rcGJWDsWIVaIo5dTy8"
);

async function login() {

  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  if (!email || !senha) {
    resultado.innerText = "Preencha email e senha";
    return;
  }

  resultado.innerText = "Entrando...";

  const { error } = await client.auth.signInWithPassword({
    email: email,
    password: senha
  });

  if (error) {
    resultado.innerText = "Email ou senha inválidos";
    return;
  }

  const { data: usuario } = await client
    .from("usuarios")
    .select("*")
    .eq("email", email)
    .single();

  // 🔥 VALIDAÇÃO DE APROVAÇÃO
  if (usuario.status !== "ativo") {
    resultado.innerText = "Cadastro aguardando aprovação";
    return;
  }

  localStorage.setItem("usuario", JSON.stringify(usuario));

  if (usuario.tipo === "Coordenacao") {
    window.location.href = "admin.html";
  } else if (usuario.tipo === "Professor") {
    window.location.href = "professor.html";
  } else {
    window.location.href = "dashboard.html";
  }
}
</script>

</body>
</html>
