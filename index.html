<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script>
const client = supabase.createClient(
  "https://rivxqnwrgzdhboisysf.supabase.co",
  "sb_publishable_ghUuFhZvrQf6sEHURVwsWQ_z6ZWmYPV"
);

async function login() {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  try {
    const { data, error } = await client.auth.signInWithPassword({
      email: email,
      password: senha
    });

    if (error) {
      document.getElementById("resultado").innerText = "Erro: " + error.message;
    } else {
      document.getElementById("resultado").innerText = "Login realizado!";
    }
  } catch (e) {
    document.getElementById("resultado").innerText = "Erro geral: " + e.message;
  }
}
</script>
