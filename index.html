<!DOCTYPE html>
<html>

<head>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      background: #020617;
      display: flex;
      justify-content: center;
      align-items: center;

    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 10;
      background: rgba(2,6,23,0.95);
      padding: 40px;
      border-radius: 16px;
      width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);

      backdrop-filter: blur(12px);

    .logo {
      width: 90px;
      margin-bottom: 10px;
    }

    h2 { color:#cbd5e1; font-size:13px; }

    input {

      padding:12px;
      margin:6px 0;
      border-radius:8px;
      border:none;
      background:#1e293b;
      color:white;
    }

    button {
      width:100%;
      padding:12px;
      margin-top:10px;
      border:none;
      border-radius:8px;
      background:linear-gradient(90deg,#1e3a8a,#dc2626);
      color:white;
      font-weight:bold;
      cursor:pointer;
    }

    #resultado { color:#dc2626; margin-top:10px; }

    #modalCadastro {
      display:none;
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.7);
      justify-content:center;
      align-items:center;
      z-index:20;
    }

    .modal-box {
      background:#020617;
      padding:25px;
      border-radius:12px;
      width:320px;
    }

  </style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="card">

  <img src="logo faesp.png" class="logo">

  <h1>FAESP</h1>
  <h2>Setor 30 • Campo Limpo Paulista</h2>

  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">

  <button onclick="login()">Entrar</button>
  <button onclick="abrirCadastro()">Criar conta</button>

  <div id="resultado"></div>

</div>

<div id="modalCadastro">
  <div class="modal-box">

    <h3 style="color:white">Cadastro</h3>

    <input id="novoNome" placeholder="Nome">
    <input id="novoEmail" placeholder="Email">
    <input id="novoCpf" placeholder="CPF">
    <input id="novoRg" placeholder="RG">
    <input id="novoEndereco" placeholder="Endereço">
    <input id="novoTelefone" placeholder="Telefone">
    <input id="novaData" type="date">

    <button onclick="salvarCadastro()">Cadastrar</button>
    <button onclick="fecharCadastro()">Cancelar</button>

    <div id="msgCadastro" style="color:white"></div>

  </div>
</div>

<script>
// 🎬 CANVAS ANIMATION
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<80;i++){
  particles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    vx: (Math.random()-0.5)*0.5,
    vy: (Math.random()-0.5)*0.5
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    p.x+=p.vx;
    p.y+=p.vy;

    ctx.beginPath();
    ctx.arc(p.x,p.y,2,0,Math.PI*2);
    ctx.fillStyle="rgba(255,255,255,0.4)";
    ctx.fill();
  });

  for(let i=0;i<particles.length;i++){
    for(let j=i;j<particles.length;j++){
      let dx=particles[i].x-particles[j].x;
      let dy=particles[i].y-particles[j].y;
      let dist=Math.sqrt(dx*dx+dy*dy);

      if(dist<120){
        ctx.strokeStyle="rgba(30,58,138,0.2)";
        ctx.beginPath();
        ctx.moveTo(particles[i].x,particles[i].y);
        ctx.lineTo(particles[j].x,particles[j].y);
        ctx.stroke();
      }
    }
  }

  requestAnimationFrame(draw);
}

draw();
</script>

    resultado.innerText="Preencha email e senha";

  });

if(error){

  .single();

// 🚫 VALIDA APROVAÇÃO

// ✅ CADASTRO INTEGRADO COM AUTH

  const rg = document.getElementById("novoRg").value;

  if(!nome || !email){

    return;
  }

  try {

    const senhaPadrao = "123456";

    // 🔐 cria no Auth
    const { error: authError } = await client.auth.signUp({
      email: email,

    });

}
</script>
