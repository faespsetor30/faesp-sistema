<!DOCTYPE html>
<html>
<head>
  <title>FAESP Sistema</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 16px;
      width: 420px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.3);
      text-align: center;
    }

    .logo {
      width: 120px;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 18px;
      margin: 5px 0;
      color: #2c5364;
    }

    h2 {
      font-size: 14px;
      margin-bottom: 20px;
      color: #555;
    }

    input {
      width: 92%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #2c5364;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 5px;
    }

    #resultado {
      margin-top: 15px;
      font-weight: bold;
      color: #2c5364;
    }
  </style>
</head>

<body>

<div class="card">

  <img src="logo faesp.png" class="logo">

  <h1>FAESP - SETOR 30</h1>
  <h2>Campo Limpo Paulista/SP</h2>

  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">

  <button onclick="login()">Entrar</button>

  <!-- 🔥 NOVO BOTÃO -->
  <button onclick="abrirCadastro()">➕ Criar conta</button>

  <div id="resultado"></div>

</div>

<!-- 🔥 MODAL CADASTRO -->
<div id="modalCadastro" style="
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
">

  <div style="
    background:white;
    padding:20px;
    border-radius:10px;
    width:300px;
  ">

    <h3>📋 Cadastro de Aluno</h3>

    <input id="novoNome" placeholder="Nome"><br>
    <input id="novoEmail" placeholder="Email"><br>
    <input id="novaMatricula" placeholder="Matrícula"><br>

    <button onclick="salvarCadastro()">Cadastrar</button>
    <button onclick="fecharCadastro()">Cancelar</button>

    <p id="msgCadastro"></p>

  </div>
</div>

<script>
const client = supabase.createClient(
  "https://nzygdvixqmiltelgzzrn.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56eWdkdml4cW1pbHRlbGd6enJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDk5MjQsImV4cCI6MjA5MTY4NTkyNH0.wMaTGEgL_VCbSewnB-4BmdoA6rcGJWDsWIVaIo5dTy8"
);

// LOGIN
async function login() {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  const { data, error } = await client.auth.signInWithPassword({
    email: email,
    password: senha
  });

  if (error) {
    document.getElementById("resultado").innerText = "❌ " + error.message;
    return;
  }

  const { data: usuario } = await client
    .from("usuarios")
    .select("*")
    .eq("email", email)
    .single();

  // 🔥 BLOQUEIO SE NÃO APROVADO
  if (usuario.status !== "ativo") {
    document.getElementById("resultado").innerText =
      "⏳ Cadastro aguardando aprovação.";
    return;
  }

  localStorage.setItem("usuario", JSON.stringify(usuario));
  window.location.href = "dashboard.html";
}

// ABRIR MODAL
function abrirCadastro() {
  document.getElementById("modalCadastro").style.display = "flex";
}

// FECHAR MODAL
function fecharCadastro() {
  document.getElementById("modalCadastro").style.display = "none";
}

// SALVAR CADASTRO
async function salvarCadastro() {
  const nome = document.getElementById("novoNome").value;
  const email = document.getElementById("novoEmail").value;
  const matricula = document.getElementById("novaMatricula").value;

  const { error } = await client
    .from("usuarios")
    .insert([{ nome, email, matricula, status: "pendente" }]);

  if (error) {
    document.getElementById("msgCadastro").innerText =
      "❌ " + error.message;
  } else {
    document.getElementById("msgCadastro").innerText =
      "✅ Cadastro enviado! Aguarde aprovação.";
  }
}
</script>

</body>
</html>
