<body>

<div class="main">

  <div class="sidebar">

    <div style="width:100%;">
      <img src="logo faesp.png" class="logo">
      <h3 id="nomeAluno" style="text-align:center;"></h3>

      <div class="menu">
        <button onclick="disciplinas()">📊 Disciplinas</button>
        <button onclick="concluidas()">📚 Concluídas</button>
        <button onclick="financeiro()">💰 Financeiro</button>
        <button onclick="avisos()">📢 Avisos</button>
        <button onclick="cronograma()">📅 Cronograma</button>
      </div>
    </div>

    <button class="logout" onclick="sair()">🚪 Sair</button>

  </div>

  <div class="content">

    <div class="header">
      <h2>FAESP - SETOR 30</h2>
      <p id="boasVindas"></p>
    </div>

    <div class="box" id="conteudo">
      Bem-vindo ao portal 👈
    </div>

  </div>

</div>

<div class="footer">
  AD. Belém - Rua Rio Tiete, 126 - Campo Limpo Paulista - SP
</div>

<script>
const client = supabase.createClient(
  "https://nzygdvixqmiltelgzzrn.supabase.co",
  "SUA_CHAVE_AQUI"
);

const usuario = JSON.parse(localStorage.getItem("usuario"));

if (!usuario) window.location.href = "index.html";

document.getElementById("nomeAluno").innerText = usuario.nome;
document.getElementById("boasVindas").innerText = "Bem-vinda, " + usuario.nome;

const isAdmin = usuario.tipo === "admin";

function sair() {
  localStorage.removeItem("usuario");
  window.location.href = "index.html";
}

// 📢 AVISOS
async function avisos() {
  const { data } = await client.from("avisos").select("*").order("data", { ascending: false });

  let html = "<h3>📢 Avisos</h3>";

  if (isAdmin) {
    html += `
      <button class="btn" onclick="abrirNovoAviso()">➕ Novo Aviso</button>
      <div id="formAviso" style="display:none;">
        <input id="tituloAviso" placeholder="Título">
        <textarea id="msgAviso" placeholder="Mensagem"></textarea>
        <button class="btn" onclick="salvarAviso()">Salvar</button>
      </div>
    `;
  }

  data.forEach(a => {
    html += `
      <div style="margin-top:10px; padding:10px; border-left:5px solid #2c5364; background:#f8fafc;">
        <strong>${a.titulo}</strong><br>
        <small>${a.data}</small>
        <p>${a.mensagem}</p>
      </div>
    `;
  });

  document.getElementById("conteudo").innerHTML = html;
}

function abrirNovoAviso() {
  document.getElementById("formAviso").style.display = "block";
}

async function salvarAviso() {
  const titulo = document.getElementById("tituloAviso").value;
  const mensagem = document.getElementById("msgAviso").value;

  await client.from("avisos").insert([{ titulo, mensagem }]);
  avisos();
}

// 📅 CRONOGRAMA
async function cronograma() {
  const { data } = await client.from("cronograma").select("*").order("data");

  let html = "<h3>📅 Cronograma de Aulas</h3>";

  if (isAdmin) {
    html += `
      <button class="btn" onclick="abrirFormCronograma()">➕ Nova Aula</button>
      <div id="formCrono" style="display:none;">
        <input id="disciplina" placeholder="Disciplina">
        <input id="dataAula" type="date">
        <input id="horario" placeholder="Horário">
        <input id="professor" placeholder="Professor">
        <input id="local" placeholder="Local">
        <button class="btn" onclick="salvarCronograma()">Salvar</button>
      </div>
    `;
  }

  html += "<table><tr><th>Data</th><th>Horário</th><th>Disciplina</th><th>Professor</th><th>Local</th></tr>";

  data.forEach(a => {
    html += `
      <tr>
        <td>${a.data}</td>
        <td>${a.horario}</td>
        <td>${a.disciplina}</td>
        <td>${a.professor}</td>
        <td>${a.local}</td>
      </tr>
    `;
  });

  html += "</table>";

  document.getElementById("conteudo").innerHTML = html;
}

function abrirFormCronograma() {
  document.getElementById("formCrono").style.display = "block";
}

async function salvarCronograma() {
  const disciplina = document.getElementById("disciplina").value;
  const data = document.getElementById("dataAula").value;
  const horario = document.getElementById("horario").value;
  const professor = document.getElementById("professor").value;
  const local = document.getElementById("local").value;

  await client.from("cronograma").insert([{ disciplina, data, horario, professor, local }]);

  cronograma();
}
</script>
