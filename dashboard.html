<!DOCTYPE html>
<html>
<head>
  <title>FAESP - Aluno</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      height: 100vh;
      background: #eef2f7;
      flex-direction: column;
    }

    .main { display: flex; flex: 1; }

    .sidebar {
      width: 240px;
      background: white;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border-right: 1px solid #ddd;
      align-items: center;
    }

    .logo { width: 120px; margin-bottom: 10px; }

    .menu { width: 100%; }

    .menu button {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border: none;
      background: #f1f5f9;
      border-radius: 10px;
      cursor: pointer;
      text-align: left;
    }

    .menu button:hover { background: #e2e8f0; }

    .logout {
      background: black;
      color: white;
      font-weight: bold;
      padding: 12px;
      border-radius: 10px;
      border: none;
      width: 100%;
      cursor: pointer;
    }

    .content { flex: 1; padding: 25px; }

    .header {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 12px;
    }

    table { width:100%; border-collapse: collapse; margin-top:10px; }

    th, td {
      padding:10px;
      border-bottom:1px solid #ddd;
      text-align:center;
    }

    .pago { color: green; font-weight: bold; }
    .pendente { color: red; font-weight: bold; }
  </style>
</head>

<body>

<div class="main">

  <div class="sidebar">
    <div style="width:100%; text-align:center;">
      <img src="logo faesp.png" class="logo">
      <h3>🎓 ALUNO</h3>

      <div class="menu">
        <button onclick="dashboard()">🏠 Dashboard</button>
        <button onclick="disciplinas()">📊 Disciplinas</button>
        <button onclick="financeiro()">💰 Financeiro</button>
        <button onclick="cronograma()">📅 Cronograma</button>
        <button onclick="avisos()">📢 Avisos</button>
      </div>
    </div>

    <button class="logout" onclick="sair()">🚪 Sair</button>
  </div>

  <div class="content">
    <div class="header">
      <h2 id="boasVindas">Bem-vinda</h2>
      <p>Painel do aluno</p>
    </div>

    <div class="box" id="conteudo">
      Carregando...
    </div>
  </div>

</div>

<script>

const client = supabase.createClient(
  "https://nzygdvixqmiltelgzzrn.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56eWdkdml4cW1pbHRlbGd6enJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDk5MjQsImV4cCI6MjA5MTY4NTkyNH0.wMaTGEgL_VCbSewnB-4BmdoA6rcGJWDsWIVaIo5dTy8"
);

// LOAD
document.addEventListener("DOMContentLoaded", () => {

  const usuario = JSON.parse(localStorage.getItem("usuario"));

  if (!usuario) {
    window.location.href = "index.html";
    return;
  }

  if (usuario.tipo !== "Aluno") {
    window.location.href = "admin.html";
    return;
  }

  document.getElementById("boasVindas").innerText =
    "Bem-vinda, " + usuario.nome;

  dashboard();
});

// LOGOUT
function sair() {
  localStorage.removeItem("usuario");
  window.location.href = "index.html";
}

// DASHBOARD
async function dashboard() {

  const { data } = await client
    .from("avisos")
    .select("*")
    .order("data", { ascending: false })
    .limit(5);

  let html = `<h3>📢 Avisos</h3>`;

  (data || []).forEach(a => {
    html += `
      <div style="margin-top:10px; padding:10px; background:#fef3c7; border-radius:8px;">
        <strong>${a.titulo}</strong><br>
        <small>${a.data}</small>
        <p>${a.mensagem}</p>
      </div>
    `;
  });

  document.getElementById("conteudo").innerHTML = html;
}

// DISCIPLINAS
async function disciplinas() {

  const usuario = JSON.parse(localStorage.getItem("usuario"));

  const { data } = await client
    .from("disciplinas")
    .select("*")
    .eq("email", usuario.email);

  let html = `<h3>📊 Disciplinas</h3>`;

  html += `<table>
    <tr>
      <th>Disciplina</th>
      <th>Nota</th>
    </tr>`;

  (data || []).forEach(d => {
    html += `
      <tr>
        <td>${d.nome}</td>
        <td>${d.nota || "-"}</td>
      </tr>
    `;
  });

  html += "</table>";

  document.getElementById("conteudo").innerHTML = html;
}

// FINANCEIRO
async function financeiro(){

  const usuario = JSON.parse(localStorage.getItem("usuario"));

  const { data } = await client
    .from("financeiro")
    .select("*")
    .eq("email", usuario.email);

  let html = `<h3>💰 Financeiro</h3>`;

  html += `<table>
    <tr>
      <th>Disciplina</th>
      <th>Status</th>
    </tr>`;

  (data || []).forEach(f=>{
    html += `
      <tr>
        <td>${f.disciplina}</td>
        <td class="${f.status === 'pago' ? 'pago' : 'pendente'}">${f.status}</td>
      </tr>
    `;
  });

  html += "</table>";

  document.getElementById("conteudo").innerHTML = html;
}

// CRONOGRAMA
function cronograma(){
  document.getElementById("conteudo").innerHTML = `
    <h3>📅 Cronograma</h3>
    <p>Em desenvolvimento...</p>
  `;
}

// AVISOS COMPLETO
async function avisos(){

  const { data } = await client
    .from("avisos")
    .select("*")
    .order("data", { ascending: false });

  let html = `<h3>📢 Avisos</h3>`;

  (data || []).forEach(a => {
    html += `
      <div style="margin-top:10px; padding:15px; background:#fef3c7; border-radius:10px;">
        <strong>${a.titulo}</strong><br>
        <small>${a.data}</small>
        <p>${a.mensagem}</p>
      </div>
    `;
  });

  document.getElementById("conteudo").innerHTML = html;
}

</script>

</body>
</html>
