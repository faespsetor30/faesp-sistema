<!DOCTYPE html>
<html>
<head>
  <title>FAESP - Portal</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      height: 100vh;
      background: #f5f6fa;
    }

    /* 🔵 MENU */
    .sidebar {
      width: 240px;
      background: white;
      color: #1e293b;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border-right: 1px solid #ddd;
    }

    .logo {
      width: 120px;
      margin-bottom: 20px;
    }

    .menu button {
      width: 100%;
      padding: 12px;
      margin-bottom: 8px;
      border: none;
      background: #f1f5f9;
      color: #1e293b;
      border-radius: 8px;
      cursor: pointer;
      text-align: left;
      font-weight: 500;
    }

    .menu button:hover {
      background: #e2e8f0;
    }

    /* 🔥 BOTÃO SAIR */
    .logout {
      background: black;
      color: white;
      font-weight: bold;
      border-radius: 8px;
      padding: 12px;
      border: none;
      cursor: pointer;
    }

    .logout:hover {
      background: #222;
    }

    /* ⚪ CONTEÚDO */
    .content {
      flex: 1;
      padding: 20px;
    }

    .header {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }

    .aprovado { color: green; font-weight: bold; }
    .reprovado { color: red; font-weight: bold; }
  </style>
</head>

<body>

<!-- MENU -->
<div class="sidebar">

  <div>
    <img src="logo faesp.png" class="logo">
    <h3 id="nomeAluno"></h3>

    <div class="menu">
      <button onclick="disciplinas()">📊 Disciplinas</button>
      <button onclick="concluidas()">📚 Concluídas</button>
    </div>
  </div>

  <!-- 🔥 BOTÃO SAIR -->
  <button class="logout" onclick="sair()">🚪 Sair</button>

</div>

<!-- CONTEÚDO -->
<div class="content">

  <div class="header">
    <h2>FAESP - SETOR 30</h2>
    <p>Campo Limpo Paulista/SP</p>
  </div>

  <div class="box" id="conteudo">
    Bem-vindo ao portal 👈
  </div>

</div>

<script>
const client = supabase.createClient(
  "https://nzygdvixqmiltelgzzrn.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56eWdkdml4cW1pbHRlbGd6enJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDk5MjQsImV4cCI6MjA5MTY4NTkyNH0.wMaTGEgL_VCbSewnB-4BmdoA6rcGJWDsWIVaIo5dTy8"
);

// 🔥 PROTEÇÃO
const usuario = JSON.parse(localStorage.getItem("usuario"));

if (!usuario) {
  window.location.href = "index.html";
}

// MOSTRAR NOME
document.getElementById("nomeAluno").innerText = "👤 " + usuario.nome;

// 🚪 LOGOUT
function sair() {
  localStorage.removeItem("usuario");
  window.location.href = "index.html";
}

// 📊 DISCIPLINAS
async function disciplinas() {
  const { data } = await client
    .from("notas")
    .select("*")
    .eq("email", usuario.email);

  let html = "<h3>📊 Disciplinas</h3><table>";
  html += "<tr><th>Matéria</th><th>Nota</th><th>Status</th></tr>";

  data.forEach(d => {
    let classe = d.status === "Aprovado" ? "aprovado" : "reprovado";

    html += `
      <tr>
        <td>${d.disciplina}</td>
        <td>${d.nota ?? 0}</td>
        <td class="${classe}">${d.status}</td>
      </tr>
    `;
  });

  html += "</table>";
  document.getElementById("conteudo").innerHTML = html;
}

// 📚 CONCLUÍDAS
async function concluidas() {
  const { data } = await client
    .from("disciplinas_concluidas")
    .select("*")
    .eq("email", usuario.email);

  let html = "<h3>📚 Concluídas</h3><table>";
  html += "<tr><th>Matéria</th><th>Data</th><th>Professor</th><th>Livro</th></tr>";

  data.forEach(d => {
    html += `
      <tr>
        <td>${d.disciplina}</td>
        <td>${d.data_conclusao}</td>
        <td>${d.professor}</td>
        <td>${d.livro ? "Sim" : "Não"}</td>
      </tr>
    `;
  });

  html += "</table>";
  document.getElementById("conteudo").innerHTML = html;
}
</script>

</body>
</html>
