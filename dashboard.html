// DASHBOARD SIMPLES (mantido)
async function carregarAvisosDashboard() {

  const { data } = await client
    .from("avisos")
    .select("*")
    .order("data", { ascending: false })
    .limit(5);

  let html = `<h3>📢 Avisos</h3>`;

  if (!data || data.length === 0) {
    html += "Nenhum aviso disponível";
  } else {
    data.forEach(a => {
      html += `
        <div style="margin-top:10px; padding:10px; background:#fef3c7; border-radius:8px;">
          <strong>${a.titulo}</strong><br>
          <small>📅 ${a.data}</small>
          <p>${a.mensagem}</p>
        </div>
      `;
    });
  }

  document.getElementById("conteudo").innerHTML = html;
}

// STATUS
function getStatusClass(status) {
  if (status === "pago") return "pago";
  return "pendente";
}

// DISCIPLINAS
async function disciplinas() {
  const usuario = JSON.parse(localStorage.getItem("usuario"));

  const { data: existentes } = await client
    .from("disciplinas")
    .select("*")
    .eq("email", usuario.email);

  const { data: master } = await client
    .from("disciplinas_master")
    .select("*")
    .eq("curso", usuario.curso);

  const { data: financeiro } = await client
    .from("financeiro")
    .select("*")
    .eq("email", usuario.email);

  // 🔒 PROTEÇÃO (evita erro se vier null)
  const listaExistentes = existentes || [];
  const listaMaster = master || [];

  for (const m of listaMaster) {
    const jaExiste = listaExistentes.find(d => d.nome === m.nome);

    if (!jaExiste) {
      await client.from("disciplinas").insert([{
        email: usuario.email,
        nome: m.nome,
        curso: usuario.curso
      }]);
    }
  }

  const { data } = await client
    .from("disciplinas")
    .select("*")
    .eq("email", usuario.email);

  let html = `<h3>📊 Disciplinas</h3>`;
  html += `<p><strong>Curso:</strong> ${usuario.curso || "-"}</p>`;

  html += `<table>
    <tr>
      <th>Disciplina</th>
      <th>Professor</th>
      <th>Nota</th>
      <th>Status</th>
      <th>Acesso</th>
    </tr>`;

  data.forEach(d => {

    let statusNota = "Em andamento";
    let cor = "#6b7280";

    if (d.nota) {
      if (d.nota >= 7) {
        statusNota = "Aprovado";
        cor = "green";
      } else {
        statusNota = "Reprovado";
        cor = "red";
      }
    }

    // 🔒 PROTEÇÃO AQUI (IMPORTANTE)
    const pagamento = (financeiro || []).find(f => f.disciplina === d.nome);

    let acesso = "🔒 Bloqueado";
    let corAcesso = "red";

    if (pagamento && pagamento.status === "pago") {
      acesso = "✅ Liberado";
      corAcesso = "green";
    }

    html += `
      <tr>
        <td>${d.nome}</td>
        <td>${d.professor || "-"}</td>
        <td>${d.nota || "-"}</td>
        <td style="color:${cor}; font-weight:bold;">${statusNota}</td>
        <td style="color:${corAcesso}; font-weight:bold;">${acesso}</td>
      </tr>
    `;
  });

  html += "</table>";
  document.getElementById("conteudo").innerHTML = html;
}

// FINANCEIRO (adicionei porque faltava)
async function financeiro(){
  const usuario = JSON.parse(localStorage.getItem("usuario"));

  const { data } = await client
    .from("financeiro")
    .select("*")
    .eq("email", usuario.email);

  let html = `<h3>💰 Financeiro</h3>`;

  html += `<table>
    <tr>
      <th>Disciplina</th>
      <th>Status</th>
    </tr>`;

  (data || []).forEach(f=>{
    html += `
      <tr>
        <td>${f.disciplina}</td>
        <td class="${getStatusClass(f.status)}">${f.status}</td>
      </tr>
    `;
  });

  html += "</table>";

  document.getElementById("conteudo").innerHTML = html;
}
