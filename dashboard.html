<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Dashboard FAESP</title>

  <!-- ✅ SUPABASE -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body { font-family: Arial; margin:0; background:#f1f5f9; }

    .sidebar {
      width:250px; height:100vh; position:fixed;
      background:#fff; padding:20px;
      box-shadow:2px 0 10px rgba(0,0,0,0.05);
    }

    .sidebar button {
      width:100%; padding:10px; margin-bottom:10px;
      border:none; border-radius:8px;
      background:#f1f5f9; cursor:pointer;
    }

    .sidebar button:hover {
      background:#2c5364; color:#fff;
    }

    .header {
      margin-left:270px;
      padding:20px;
      background:#fff;
      display:flex;
      justify-content:space-between;
    }

    .conteudo {
      margin-left:270px;
      padding:20px;
    }

    table { width:100%; border-collapse:collapse; }
    th, td { padding:10px; border-bottom:1px solid #eee; }

    .pago { color:green; font-weight:bold; }
    .pendente { color:red; font-weight:bold; }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>🎓 FAESP</h3>

  <button onclick="disciplinas()">📊 Disciplinas</button>
  <button onclick="financeiro()">💰 Financeiro</button>
  <button onclick="cronograma()">📅 Cronograma</button>
  <button onclick="avisos()">📢 Avisos</button>
  <button onclick="sair()">🚪 Sair</button>
</div>

<!-- HEADER -->
<div class="header">
  <div id="boasVindas"></div>
</div>

<!-- CONTEÚDO -->
<div class="conteudo" id="conteudo"></div>

<!-- 🔥 SCRIPT CORRETO -->
<script>
const client = supabase.createClient(
  "https://nzygdvixqmiltelgzzrn.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56eWdkdml4cW1pbHRlbGd6enJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDk5MjQsImV4cCI6MjA5MTY4NTkyNH0.wMaTGEgL_VCbSewnB-4BmdoA6rcGJWDsWIVaIo5dTy8"
);

// 🚀 LOAD
document.addEventListener("DOMContentLoaded", () => {
  const usuario = JSON.parse(localStorage.getItem("usuario"));

  if (!usuario) {
    alert("⚠️ Faça login primeiro!");
    window.location.href = "index.html";
    return;
  }

  if (usuario.tipo !== "Aluno") {
    window.location.href = "admin.html";
    return;
  }

  document.getElementById("boasVindas").innerText =
    "Bem-vinda, " + usuario.nome;

  disciplinas();
});

// LOGOUT
function sair() {
  localStorage.removeItem("usuario");
  window.location.href = "index.html";
}

// STATUS
function getStatusClass(status) {
  if (status === "pago") return "pago";
  return "pendente";
}

// DISCIPLINAS
async function disciplinas() {
  const usuario = JSON.parse(localStorage.getItem("usuario"));

  const { data } = await client
    .from("disciplinas")
    .select("*")
    .eq("email", usuario.email);

  let html = `<h3>📊 Disciplinas</h3>`;
  html += `<p><strong>Curso:</strong> ${usuario.curso || "Não informado"}</p>`;
  html += `<table>
    <tr>
      <th>Disciplina</th>
      <th>Professor</th>
      <th>Nota</th>
      <th>Início</th>
      <th>Conclusão</th>
    </tr>`;

  data.forEach(d => {
    html += `
      <tr>
        <td>${d.nome}</td>
        <td>${d.professor}</td>
        <td>${d.nota || "-"}</td>
        <td>${d.data_inicio || "-"}</td>
        <td>${d.data_fim || "-"}</td>
      </tr>
    `;
  });

  html += "</table>";
  document.getElementById("conteudo").innerHTML = html;
}

// FINANCEIRO + UPLOAD
async function financeiro() {
  const usuario = JSON.parse(localStorage.getItem("usuario"));

  const { data } = await client
    .from("financeiro")
    .select("*")
    .eq("email", usuario.email);

  let html = "<h3>💰 Financeiro</h3>";
  html += `<table>
    <tr>
      <th>Disciplina</th>
      <th>Valor</th>
      <th>Status</th>
      <th>Pagamento</th>
      <th>Comprovante</th>
    </tr>`;

  data.forEach(f => {
    html += `
      <tr>
        <td>${f.disciplina}</td>
        <td>R$ ${f.valor}</td>
        <td class="${getStatusClass(f.status)}">${f.status}</td>
        <td>${f.data_pagamento || "-"}</td>
        <td>
          ${
            f.status === "pago"
              ? `<a href="${f.comprovante}" target="_blank">📄 Ver PDF</a>`
              : f.status === "aguardando"
              ? "⏳ Em análise"
              : `<input type="file" accept="application/pdf"
                  onchange="uploadComprovante(event, '${f.id}')">`
          }
        </td>
      </tr>
    `;
  });

  html += "</table>";
  document.getElementById("conteudo").innerHTML = html;
}

// UPLOAD
async function uploadComprovante(event, id) {
  const file = event.target.files[0];
  if (!file) return;

  const usuario = JSON.parse(localStorage.getItem("usuario"));
  const fileName = `${usuario.email}_${Date.now()}.pdf`;

  const { error } = await client.storage
    .from("comprovantes")
    .upload(fileName, file);

  if (error) {
    alert("Erro ao enviar 😢");
    return;
  }

  const { data } = client.storage
    .from("comprovantes")
    .getPublicUrl(fileName);

  await client.from("financeiro").update({
    comprovante: data.publicUrl,
    status: "aguardando"
  }).eq("id", id);

  alert("Comprovante enviado! ⏳");
  financeiro();
}

// CRONOGRAMA
async function cronograma() {
  const { data } = await client.from("cronograma").select("*");

  let html = "<h3>📅 Cronograma</h3><table>";

  data.forEach(a => {
    html += `
      <tr>
        <td>${a.data}</td>
        <td>${a.disciplina}</td>
        <td>${a.descricao || ""}</td>
      </tr>
    `;
  });

  html += "</table>";
  document.getElementById("conteudo").innerHTML = html;
}

// AVISOS
async function avisos() {
  const { data } = await client
    .from("avisos")
    .select("*")
    .order("data", { ascending: false });

  let html = "<h3>📢 Avisos</h3>";

  data.forEach(a => {
    html += `
      <div style="margin-top:10px; padding:10px; border-left:5px solid #2c5364;">
        <strong>${a.titulo}</strong><br>
        <small>${a.data}</small>
        <p>${a.mensagem}</p>
      </div>
    `;
  });

  document.getElementById("conteudo").innerHTML = html;
}
</script>

</body>
</html>
