<!DOCTYPE html>
<html>
<head>
  <title>FAESP - Aluno</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; background: #eef2f7; flex-direction: column; }
    .main { display: flex; flex: 1; }

    .sidebar {
      width: 240px; background: white; padding: 20px;
      display: flex; flex-direction: column; justify-content: space-between;
      border-right: 1px solid #ddd; align-items: center;
    }

    .logo { width: 120px; margin-bottom: 10px; }

    .menu { width: 100%; }

    .menu button {
      width: 100%; padding: 12px; margin-bottom: 10px;
      border: none; background: #f1f5f9; border-radius: 10px;
      cursor: pointer; text-align: left; font-weight: 500;
    }

    .menu button:hover { background: #e2e8f0; }

    .logout {
      background: black; color: white; font-weight: bold;
      padding: 12px; border-radius: 10px; border: none;
      width: 100%; cursor: pointer;
    }

    .content { flex: 1; padding: 25px; }

    .header {
      background: white; padding: 20px; border-radius: 12px;
      margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    .box {
      background: white; padding: 20px; border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    .footer {
      background: #1e293b; color: white;
      text-align: center; padding: 10px; font-size: 13px;
    }

    table { width:100%; border-collapse: collapse; margin-top:10px; }

    th, td {
      padding:10px;
      border-bottom:1px solid #ddd;
      text-align:center;
    }

    th { background:#f8fafc; }

    .pago { color: green; font-weight: bold; }
    .pendente { color: red; font-weight: bold; }

    input { margin-top:5px; }
  </style>
</head>

<body>

<div class="main">

  <div class="sidebar">
    <div style="width:100%; text-align:center;">
      <img src="logo faesp.png" class="logo">
      <h3>🎓 ALUNO</h3>

      <div class="menu">
        <button onclick="disciplinas()">📊 Disciplinas</button>
        <button onclick="financeiro()">💰 Financeiro</button>
        <button onclick="cronograma()">📅 Cronograma</button>
        <button onclick="avisos()">📢 Avisos</button>
      </div>
    </div>

    <button class="logout" onclick="sair()">🚪 Sair</button>
  </div>

  <div class="content">
    <div class="header">
      <h2 id="boasVindas">Bem-vinda</h2>
      <p>Painel do aluno</p>
    </div>

    <div class="box" id="conteudo">
      Carregando...
    </div>
  </div>

</div>

<div class="footer">
  AD. Belém - Rua Rio Tiete, 126 - Campo Limpo Paulista - SP
</div>

<script>
const client = supabase.createClient(
  "https://nzygdvixqmiltelgzzrn.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56eWdkdml4cW1pbHRlbGd6enJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDk5MjQsImV4cCI6MjA5MTY4NTkyNH0.wMaTGEgL_VCbSewnB-4BmdoA6rcGJWDsWIVaIo5dTy8"
);

// LOAD
document.addEventListener("DOMContentLoaded", () => {
  const usuario = JSON.parse(localStorage.getItem("usuario"));

  if (!usuario) {
    window.location.href = "index.html";
    return;
  }

  if (usuario.tipo !== "Aluno") {
    window.location.href = "admin.html";
    return;
  }

  document.getElementById("boasVindas").innerText =
    "Bem-vinda, " + usuario.nome;

  disciplinas();
});

// LOGOUT
function sair() {
  localStorage.removeItem("usuario");
  window.location.href = "index.html";
}

// STATUS
function getStatusClass(status) {
  if (status === "pago") return "pago";
  return "pendente";
}

// 🚀 DISCIPLINAS COM BLOQUEIO POR PAGAMENTO
async function disciplinas() {
  const usuario = JSON.parse(localStorage.getItem("usuario"));

  // existentes
  const { data: existentes } = await client
    .from("disciplinas")
    .select("*")
    .eq("email", usuario.email);

  // master
  const { data: master } = await client
    .from("disciplinas_master")
    .select("*")
    .eq("curso", usuario.curso);

  // financeiro
  const { data: financeiro } = await client
    .from("financeiro")
    .select("*")
    .eq("email", usuario.email);

  // criar automático
  for (const m of master) {
    const jaExiste = existentes.find(d => d.nome === m.nome);

    if (!jaExiste) {
      await client.from("disciplinas").insert([{
        email: usuario.email,
        nome: m.nome,
        curso: usuario.curso
      }]);
    }
  }

  // buscar final
  const { data } = await client
    .from("disciplinas")
    .select("*")
    .eq("email", usuario.email);

  let html = `<h3>📊 Disciplinas</h3>`;
  html += `<p><strong>Curso:</strong> ${usuario.curso || "-"}</p>`;

  html += `<table>
    <tr>
      <th>Disciplina</th>
      <th>Professor</th>
      <th>Nota</th>
      <th>Status</th>
      <th>Acesso</th>
    </tr>`;

  data.forEach(d => {

    let statusNota = "Em andamento";
    let cor = "#6b7280";

    if (d.nota) {
      if (d.nota >= 7) {
        statusNota = "Aprovado";
        cor = "green";
      } else {
        statusNota = "Reprovado";
        cor = "red";
      }
    }

    // 🔥 VERIFICA PAGAMENTO
    const pagamento = financeiro.find(f => f.disciplina === d.nome);

    let acesso = "🔒 Bloqueado";
    let corAcesso = "red";

    if (pagamento && pagamento.status === "pago") {
      acesso = "✅ Liberado";
      corAcesso = "green";
    }

    html += `
      <tr>
        <td>${d.nome}</td>
        <td>${d.professor || "-"}</td>
        <td>${d.nota || "-"}</td>
        <td style="color:${cor}; font-weight:bold;">${statusNota}</td>
        <td style="color:${corAcesso}; font-weight:bold;">${acesso}</td>
      </tr>
    `;
  });

  html += "</table>";
  document.getElementById("conteudo").innerHTML = html;
}

// RESTO IGUAL...

async function financeiro() {
  const usuario = JSON.parse(localStorage.getItem("usuario"));

  const { data } = await client
    .from("financeiro")
    .select("*")
    .eq("email", usuario.email);

  let html = `<h3>💰 Financeiro</h3><table>
    <tr>
      <th>Disciplina</th>
      <th>Valor</th>
      <th>Status</th>
      <th>Pagamento</th>
      <th>Comprovante</th>
    </tr>`;

  data.forEach(f => {
    html += `
      <tr>
        <td>${f.disciplina}</td>
        <td>R$ ${f.valor}</td>
        <td class="${getStatusClass(f.status)}">${f.status}</td>
        <td>${f.data_pagamento || "-"}</td>
        <td>
          ${
            f.status === "pago"
              ? `<a href="${f.comprovante}" target="_blank">📄 PDF</a>`
              : f.status === "aguardando"
              ? "⏳ Em análise"
              : `<input type="file" accept="application/pdf"
                 onchange="uploadComprovante(event,'${f.id}')">`
          }
        </td>
      </tr>
    `;
  });

  html += "</table>";
  document.getElementById("conteudo").innerHTML = html;
}

async function uploadComprovante(event, id) {
  const file = event.target.files[0];
  if (!file) return;

  const usuario = JSON.parse(localStorage.getItem("usuario"));
  const fileName = `${usuario.email}_${Date.now()}.pdf`;

  await client.storage.from("comprovantes").upload(fileName, file);

  const { data } = client.storage
    .from("comprovantes")
    .getPublicUrl(fileName);

  await client.from("financeiro").update({
    comprovante: data.publicUrl,
    status: "aguardando"
  }).eq("id", id);

  alert("Comprovante enviado!");
  financeiro();
}

async function cronograma() {
  const { data } = await client.from("cronograma").select("*");

  let html = "<h3>📅 Cronograma</h3><table>";

  data.forEach(a => {
    html += `
      <tr>
        <td>${a.data}</td>
        <td>${a.disciplina}</td>
        <td>${a.descricao || ""}</td>
      </tr>
    `;
  });

  html += "</table>";
  document.getElementById("conteudo").innerHTML = html;
}

async function avisos() {
  const { data } = await client
    .from("avisos")
    .select("*")
    .order("data", { ascending: false });

  let html = "<h3>📢 Avisos</h3>";

  data.forEach(a => {
    html += `
      <div style="margin-top:10px; padding:10px; border-left:5px solid #2c5364;">
        <strong>${a.titulo}</strong><br>
        <small>${a.data}</small>
        <p>${a.mensagem}</p>
      </div>
    `;
  });

  document.getElementById("conteudo").innerHTML = html;
}
</script>

</body>
</html>
