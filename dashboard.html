<!DOCTYPE html>
<html>
<head>
  <title>FAESP - Portal</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      height: 100vh;
      background: #eef2f7;
      flex-direction: column;
    }

    .main {
      display: flex;
      flex: 1;
    }

    .sidebar {
      width: 240px;
      background: white;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border-right: 1px solid #ddd;
      align-items: center;
    }

    .logo {
      width: 120px;
      margin-bottom: 20px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    .menu {
      width: 100%;
    }

    .menu button {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border: none;
      background: #f1f5f9;
      border-radius: 10px;
      cursor: pointer;
      text-align: left;
      transition: 0.3s;
      font-weight: 500;
    }

    .menu button:hover {
      background: #e2e8f0;
      transform: translateX(3px);
    }

    .menu .ativo {
      background: #2c5364;
      color: white;
    }

    .logout {
      background: black;
      color: white;
      font-weight: bold;
      padding: 12px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      width: 100%;
    }

    .content {
      flex: 1;
      padding: 25px;
    }

    .header {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.08);
    }

    .cards {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
    }

    .card-mini {
      flex: 1;
      background: white;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
      text-align: center;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.08);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }

    .aprovado { color: green; font-weight: bold; }
    .reprovado { color: red; font-weight: bold; }

    .footer {
      background: #1e293b;
      color: white;
      text-align: center;
      padding: 10px;
      font-size: 13px;
    }
  </style>
</head>

<body>

<div class="main">

  <div class="sidebar">

    <div style="width:100%;">
      <img src="logo faesp.png" class="logo">
      <h3 id="nomeAluno" style="text-align:center;"></h3>

      <div class="menu">
        <button id="btnDisciplinas" onclick="disciplinas()">📊 Disciplinas</button>
        <button id="btnConcluidas" onclick="concluidas()">📚 Concluídas</button>
        <button id="btnFinanceiro" onclick="financeiro()">💰 Financeiro</button>
      </div>
    </div>

    <button class="logout" onclick="sair()">🚪 Sair</button>

  </div>

  <div class="content">

    <div class="header">
      <h2>FAESP - SETOR 30</h2>
      <p id="boasVindas"></p>
    </div>

    <div class="cards">
      <div class="card-mini">
        <h4>📊 Disciplinas</h4>
        <p id="totalDisciplinas">0</p>
      </div>

      <div class="card-mini">
        <h4>📚 Concluídas</h4>
        <p id="totalConcluidas">0</p>
      </div>

      <div class="card-mini">
        <h4>⭐ Média</h4>
        <p id="mediaGeral">0</p>
      </div>
    </div>

    <div class="box" id="conteudo">
      Bem-vindo ao portal 👈
    </div>

  </div>

</div>

<div class="footer">
  AD. Belém - Rua Rio Tiete, número 126 - Jardim Europa - Campo Limpo Paulista - SP
</div>

<script>
const client = supabase.createClient(
  "https://nzygdvixqmiltelgzzrn.supabase.co",
  "SUA_CHAVE_AQUI"
);

const usuario = JSON.parse(localStorage.getItem("usuario"));

if (!usuario) {
  window.location.href = "index.html";
}

document.getElementById("nomeAluno").innerText = "👤 " + usuario.nome;
document.getElementById("boasVindas").innerText =
  "Bem-vinda, " + usuario.nome + " 👋";

function ativar(botao) {
  document.querySelectorAll(".menu button").forEach(b => b.classList.remove("ativo"));
  botao.classList.add("ativo");
}

function sair() {
  localStorage.removeItem("usuario");
  window.location.href = "index.html";
}

// DISCIPLINAS
async function disciplinas() {
  ativar(document.getElementById("btnDisciplinas"));

  const { data } = await client.from("notas").select("*").eq("email", usuario.email);

  let soma = 0;

  let html = "<h3>📊 Disciplinas</h3><table>";
  html += "<tr><th>Matéria</th><th>Nota</th><th>Status</th></tr>";

  data.forEach(d => {
    soma += Number(d.nota || 0);
    let classe = d.status === "Aprovado" ? "aprovado" : "reprovado";

    html += `<tr>
      <td>${d.disciplina}</td>
      <td>${d.nota ?? 0}</td>
      <td class="${classe}">${d.status}</td>
    </tr>`;
  });

  html += "</table>";
  document.getElementById("conteudo").innerHTML = html;

  document.getElementById("totalDisciplinas").innerText = data.length;
  document.getElementById("mediaGeral").innerText = (soma / data.length).toFixed(1);
}

// CONCLUÍDAS
async function concluidas() {
  ativar(document.getElementById("btnConcluidas"));

  const { data } = await client.from("disciplinas_concluidas").select("*").eq("email", usuario.email);

  let html = "<h3>📚 Concluídas</h3><table>";
  html += "<tr><th>Matéria</th><th>Data</th><th>Professor</th><th>Livro</th></tr>";

  data.forEach(d => {
    html += `<tr>
      <td>${d.disciplina}</td>
      <td>${d.data_conclusao}</td>
      <td>${d.professor}</td>
      <td>${d.livro ? "Sim" : "Não"}</td>
    </tr>`;
  });

  html += "</table>";
  document.getElementById("conteudo").innerHTML = html;

  document.getElementById("totalConcluidas").innerText = data.length;
}

// 💰 FINANCEIRO
async function financeiro() {
  ativar(document.getElementById("btnFinanceiro"));

  const { data } = await client.from("financeiro").select("*").eq("email", usuario.email);

  let html = "<h3>💰 Financeiro</h3><table>";
  html += "<tr><th>Matéria</th><th>Valor</th><th>Status</th><th>Data</th><th>Comprovante</th></tr>";

  data.forEach(f => {
    let status = f.status === "Pago"
      ? "<span style='color:green;font-weight:bold;'>✅ Pago</span>"
      : "<span style='color:red;font-weight:bold;'>⏳ Pendente</span>";

    html += `<tr>
      <td>${f.disciplina}</td>
      <td>R$ ${f.valor}</td>
      <td>${status}</td>
      <td>${f.data_pagamento ?? "-"}</td>
      <td>${f.comprovante ? `<a href="${f.comprovante}" target="_blank">📄 Baixar</a>` : "-"}</td>
    </tr>`;
  });

  html += "</table>";
  document.getElementById("conteudo").innerHTML = html;
}
</script>

</body>
</html>
