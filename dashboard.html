<!DOCTYPE html>
<html>
<head>
  <title>FAESP - Aluno</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      height: 100vh;
      background: #0f172a;
      color: white;
      flex-direction: column;
    }

    .main { display: flex; flex: 1; }

    .sidebar {
      width: 240px;
      background: #020617;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border-right: 1px solid #1e293b;
      align-items: center;
    }

    .logo { width: 120px; margin-bottom: 10px; }

    .menu { width: 100%; }

    .menu button {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border: none;
      background: #1e293b;
      color: white;
      border-radius: 10px;
      cursor: pointer;
      text-align: left;
    }

    .menu button:hover { background: #334155; }

    .logout {
      background: #dc2626;
      color: white;
      font-weight: bold;
      padding: 12px;
      border-radius: 10px;
      border: none;
      width: 100%;
      cursor: pointer;
    }

    .content { flex: 1; padding: 25px; }

    .header {
      background: linear-gradient(90deg,#1e293b,#334155);
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .box {
      background: #020617;
      padding: 20px;
      border-radius: 12px;
    }

    /* 🎬 CARDS */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px,1fr));
      gap: 15px;
      margin-top: 15px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 14px;
      transition: all 0.35s ease;
    }

    .card:hover {
      transform: scale(1.05);
      background: #334155;
    }

    .progress {
      height: 8px;
      background: #334155;
      border-radius: 5px;
      margin-top: 10px;
      overflow: hidden;
    }

    .bar {
      height: 100%;
      background: #22c55e;
      transition: width 0.6s ease;
    }

    .aviso {
      margin-top: 10px;
      padding: 15px;
      background: #1e293b;
      border-radius: 10px;
    }

    .pago { color: #22c55e; font-weight: bold; }
    .pendente { color: #ef4444; font-weight: bold; }

    /* ✨ ANIMAÇÃO SUAVE */
    #conteudo {
      opacity: 1;
      transform: translateY(0);
      transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }

    #conteudo.fade-out {
      opacity: 0;
      transform: translateY(10px);
    }

    #conteudo.fade-in {
      opacity: 1;
      transform: translateY(0);
    }

  </style>
</head>

<body>

<div class="main">

  <div class="sidebar">
    <div style="width:100%; text-align:center;">
      <img src="logo faesp.png" class="logo">
      <h3>🎓 ALUNO</h3>

      <div class="menu">
        <button onclick="dashboard()">🏠 Dashboard</button>
        <button onclick="disciplinas()">📊 Disciplinas</button>
        <button onclick="financeiro()">💰 Financeiro</button>
        <button onclick="cronograma()">📅 Cronograma</button>
        <button onclick="avisos()">📢 Avisos</button>
      </div>
    </div>

    <button class="logout" onclick="sair()">🚪 Sair</button>
  </div>

  <div class="content">
    <div class="header">
      <h2 id="boasVindas">Bem-vinda</h2>
      <p>Painel do aluno ✨</p>
    </div>

    <div class="box" id="conteudo">
      Carregando...
    </div>
  </div>

</div>

<script>

const client = supabase.createClient(
  "https://nzygdvixqmiltelgzzrn.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56eWdkdml4cW1pbHRlbGd6enJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDk5MjQsImV4cCI6MjA5MTY4NTkyNH0.wMaTGEgL_VCbSewnB-4BmdoA6rcGJWDsWIVaIo5dTy8"
);

// 🔥 FUNÇÃO DE TRANSIÇÃO (ADICIONADA)
function trocarConteudo(html){
  const el = document.getElementById("conteudo");

  el.classList.add("fade-out");

  setTimeout(() => {
    el.innerHTML = html;
    el.classList.remove("fade-out");
    el.classList.add("fade-in");

    setTimeout(()=>{
      el.classList.remove("fade-in");
    }, 300);

  }, 150);
}

// LOAD
document.addEventListener("DOMContentLoaded", () => {

  const usuario = JSON.parse(localStorage.getItem("usuario"));

  if (!usuario) {
    window.location.href = "index.html";
    return;
  }

  if (usuario.tipo !== "Aluno") {
    window.location.href = "admin.html";
    return;
  }

  document.getElementById("boasVindas").innerText =
    "Bem-vinda, " + usuario.nome + " ✨";

  dashboard();
});

// LOGOUT
function sair() {
  localStorage.removeItem("usuario");
  window.location.href = "index.html";
}

// DASHBOARD
async function dashboard() {

  const { data } = await client
    .from("avisos")
    .select("*")
    .order("data", { ascending: false })
    .limit(5);

  let html = `<h3>📢 Avisos</h3>`;

  (data || []).forEach(a => {
    html += `
      <div class="aviso">
        <strong>${a.titulo}</strong><br>
        <small>${a.data}</small>
        <p>${a.mensagem}</p>
      </div>
    `;
  });

  trocarConteudo(html);
}

// DISCIPLINAS 🎬
async function disciplinas() {

  const usuario = JSON.parse(localStorage.getItem("usuario"));

  const { data } = await client
    .from("disciplinas")
    .select("*")
    .eq("email", usuario.email);

  let html = `<h3>📊 Disciplinas</h3><div class="cards">`;

  (data || []).forEach(d => {

    let progresso = (d.nota || 0) * 10;

    html += `
      <div class="card">
        <h4>${d.nome}</h4>
        <p>Nota: ${d.nota || "-"}</p>

        <div class="progress">
          <div class="bar" style="width:${progresso}%"></div>
        </div>
      </div>
    `;
  });

  html += "</div>";

  trocarConteudo(html);
}

// FINANCEIRO 🎬
async function financeiro(){

  const usuario = JSON.parse(localStorage.getItem("usuario"));

  const { data } = await client
    .from("financeiro")
    .select("*")
    .eq("email", usuario.email);

  let html = `<h3>💰 Financeiro</h3><div class="cards">`;

  (data || []).forEach(f=>{
    html += `
      <div class="card">
        <h4>${f.disciplina}</h4>
        <p class="${f.status === 'pago' ? 'pago' : 'pendente'}">
          ${f.status}
        </p>
      </div>
    `;
  });

  html += "</div>";

  trocarConteudo(html);
}

// CRONOGRAMA
function cronograma(){
  trocarConteudo(`
    <h3>📅 Cronograma</h3>
    <p>Em desenvolvimento...</p>
  `);
}

// AVISOS
async function avisos(){

  const { data } = await client
    .from("avisos")
    .select("*")
    .order("data", { ascending: false });

  let html = `<h3>📢 Avisos</h3>`;

  (data || []).forEach(a => {
    html += `
      <div class="aviso">
        <strong>${a.titulo}</strong><br>
        <small>${a.data}</small>
        <p>${a.mensagem}</p>
      </div>
    `;
  });

  trocarConteudo(html);
}

</script>

</body>
</html>
