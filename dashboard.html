<!DOCTYPE html>
<html>
<head>
  <title>FAESP - Portal</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      height: 100vh;
      background: #eef2f7;
      flex-direction: column;
    }

    .main { display: flex; flex: 1; }

    .sidebar {
      width: 240px;
      background: white;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border-right: 1px solid #ddd;
      align-items: center;
    }

    .logo {
      width: 120px;
      margin-bottom: 20px;
    }

    .menu {
      width: 100%;
    }

    .menu button {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border: none;
      background: #f1f5f9;
      border-radius: 10px;
      cursor: pointer;
      text-align: left;
      font-weight: 500;
    }

    .menu button:hover {
      background: #e2e8f0;
    }

    .logout {
      background: black;
      color: white;
      font-weight: bold;
      padding: 12px;
      border-radius: 10px;
      border: none;
      width: 100%;
      cursor: pointer;
    }

    .content {
      flex: 1;
      padding: 25px;
    }

    .header {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    .footer {
      background: #1e293b;
      color: white;
      text-align: center;
      padding: 10px;
    }

    table {
      width:100%;
      border-collapse: collapse;
      margin-top:10px;
    }

    th, td {
      padding:10px;
      border-bottom:1px solid #ddd;
    }

    th {
      background:#f8fafc;
    }

    .btn {
      background:#2c5364;
      color:white;
      border:none;
      padding:10px;
      border-radius:8px;
      cursor:pointer;
      margin-top:10px;
    }
  </style>
</head>

<body>

<div class="main">

  <div class="sidebar">

    <div style="width:100%;">
      <img src="logo faesp.png" class="logo">
      <h3 id="nomeAluno" style="text-align:center;"></h3>

      <div class="menu">
        <button onclick="disciplinas()">📊 Disciplinas</button>
        <button onclick="concluidas()">📚 Concluídas</button>
        <button onclick="financeiro()">💰 Financeiro</button>
        <button onclick="avisos()">📢 Avisos</button>
        <button onclick="cronograma()">📅 Cronograma</button>
        <button onclick="alunos()">👨‍🎓 Alunos</button>
      </div>
    </div>

    <button class="logout" onclick="sair()">🚪 Sair</button>

  </div>

  <div class="content">

    <div class="header">
      <h2>FAESP - SETOR 30</h2>
      <p id="boasVindas"></p>
    </div>

    <div class="box" id="conteudo">
      Bem-vindo ao portal 👈
    </div>

  </div>

</div>

<div class="footer">
  AD. Belém - Rua Rio Tiete, 126 - Campo Limpo Paulista - SP
</div>

<script>
const client = supabase.createClient(
  "https://nzygdvixqmiltelgzzrn.supabase.co",
  "SUA_CHAVE_AQUI"
);

const usuario = JSON.parse(localStorage.getItem("usuario"));

if (!usuario) window.location.href = "index.html";

document.getElementById("nomeAluno").innerText = usuario.nome;
document.getElementById("boasVindas").innerText = "Bem-vinda, " + usuario.nome;

const isAdmin = usuario.tipo === "admin";

function sair() {
  localStorage.removeItem("usuario");
  window.location.href = "index.html";
}

function disciplinas() {
  document.getElementById("conteudo").innerHTML = "<h3>📊 Disciplinas</h3><p>Em desenvolvimento</p>";
}

function concluidas() {
  document.getElementById("conteudo").innerHTML = "<h3>📚 Concluídas</h3><p>Em desenvolvimento</p>";
}

// 💰 FINANCEIRO COM COBRANÇA
async function financeiro() {
  const { data } = await client.from("financeiro").select("*");

  let html = "<h3>💰 Financeiro</h3>";
  html += "<table>";
  html += "<tr><th>Aluno</th><th>Disciplina</th><th>Valor</th><th>Status</th><th>Ação</th></tr>";

  for (const f of data) {
    const { data: u } = await client.from("usuarios").select("*").eq("email", f.email).single();

    html += `
      <tr>
        <td>${u?.nome || "-"}</td>
        <td>${f.disciplina}</td>
        <td>R$ ${f.valor}</td>
        <td>${f.status}</td>
        <td>
          ${f.status !== "pago"
            ? `<button class="btn" onclick="cobrarAluno('${u?.nome}','${u?.celular}','${f.disciplina}','${f.valor}')">📲 Cobrar</button>`
            : "✔️ Pago"}
        </td>
      </tr>
    `;
  }

  html += "</table>";

  document.getElementById("conteudo").innerHTML = html;
}

// 📲 COBRANÇA
async function cobrarAluno(nome, celular, disciplina, valor) {
  await enviarWhatsApp(
    celular,
    `Olá ${nome} 💰

Identificamos uma mensalidade pendente:

📚 Disciplina: ${disciplina}
💵 Valor: R$ ${valor}

Por favor, regularize 🙏

FAESP`
  );

  alert("Cobrança enviada!");
}

async function avisos() {
  const { data } = await client.from("avisos").select("*").order("data", { ascending: false });

  let html = "<h3>📢 Avisos</h3>";

  data.forEach(a => {
    html += `
      <div style="margin-top:10px; padding:10px; border-left:5px solid #2c5364; background:#f8fafc;">
        <strong>${a.titulo}</strong><br>
        <small>${a.data}</small>
        <p>${a.mensagem}</p>
      </div>
    `;
  });

  document.getElementById("conteudo").innerHTML = html;
}

async function cronograma() {
  const { data } = await client.from("cronograma").select("*");

  let html = "<h3>📅 Cronograma</h3><table>";

  data.forEach(a => {
    html += `
      <tr>
        <td>${a.data}</td>
        <td>${a.disciplina}</td>
      </tr>
    `;
  });

  html += "</table>";

  document.getElementById("conteudo").innerHTML = html;
}

// 🔥 WHATSAPP
async function enviarWhatsApp(numero, mensagem) {
  await fetch("https://api.z-api.io/instances/3F19C61174D6225336C73A7D2450AC8D/token/DE43E25197F9AEE0CB640CA5/send-text", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ phone: numero, message: mensagem })
  });
}

// 👨‍🎓 ALUNOS
async function alunos() {
  const { data } = await client.from("usuarios").select("*");

  let html = "<h3>👨‍🎓 Alunos</h3><table>";

  data.forEach(u => {
    html += `
      <tr>
        <td>${u.nome}</td>
        <td>${u.status}</td>
        <td>
          ${u.status !== "ativo"
            ? `<button class="btn" onclick="aprovarAluno('${u.id}','${u.nome}','${u.celular}')">Aprovar</button>`
            : "✔️"}
        </td>
      </tr>
    `;
  });

  html += "</table>";

  document.getElementById("conteudo").innerHTML = html;
}

async function aprovarAluno(id, nome, celular) {
  await client.from("usuarios").update({ status: "ativo" }).eq("id", id);

  await enviarWhatsApp(celular, `Olá ${nome} 🙌 Seu cadastro foi aprovado na FAESP!`);

  alert("Aluno aprovado!");
  alunos();
}
</script>

</body>
</html>
