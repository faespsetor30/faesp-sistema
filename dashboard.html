<!DOCTYPE html>
<html>
<head>
  <title>FAESP - Portal</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      height: 100vh;
      background: #eef2f7;
      flex-direction: column;
    }

    .main { display: flex; flex: 1; }

    .sidebar {
      width: 240px;
      background: white;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border-right: 1px solid #ddd;
      align-items: center;
    }

    .logo {
      width: 120px;
      margin-bottom: 20px;
    }

    .menu {
      width: 100%;
    }

    .menu button {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border: none;
      background: #f1f5f9;
      border-radius: 10px;
      cursor: pointer;
      text-align: left;
      font-weight: 500;
    }

    .menu button:hover {
      background: #e2e8f0;
    }

    .logout {
      background: black;
      color: white;
      font-weight: bold;
      padding: 12px;
      border-radius: 10px;
      border: none;
      width: 100%;
      cursor: pointer;
    }

    .content {
      flex: 1;
      padding: 25px;
    }

    .header {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    .footer {
      background: #1e293b;
      color: white;
      text-align: center;
      padding: 10px;
    }

    table {
      width:100%;
      border-collapse: collapse;
      margin-top:10px;
    }

    th, td {
      padding:10px;
      border-bottom:1px solid #ddd;
    }

    th {
      background:#f8fafc;
    }

    .btn {
      background:#2c5364;
      color:white;
      border:none;
      padding:10px;
      border-radius:8px;
      cursor:pointer;
      margin-top:10px;
    }
  </style>
</head>

<body>

<div class="main">

  <div class="sidebar">

    <div style="width:100%;">
      <img src="logo faesp.png" class="logo">
      <h3 id="nomeAluno" style="text-align:center;"></h3>

      <div class="menu">
        <button onclick="disciplinas()">📊 Disciplinas</button>
        <button onclick="concluidas()">📚 Concluídas</button>
        <button onclick="financeiro()">💰 Financeiro</button>
        <button onclick="avisos()">📢 Avisos</button>
        <button onclick="cronograma()">📅 Cronograma</button>
      </div>
    </div>

    <button class="logout" onclick="sair()">🚪 Sair</button>

  </div>

  <div class="content">

    <div class="header">
      <h2>FAESP - SETOR 30</h2>
      <p id="boasVindas"></p>
    </div>

    <div class="box" id="conteudo">
      Bem-vindo ao portal 👈
    </div>

  </div>

</div>

<div class="footer">
  AD. Belém - Rua Rio Tiete, 126 - Campo Limpo Paulista - SP
</div>

<script>
const client = supabase.createClient(
  "https://nzygdvixqmiltelgzzrn.supabase.co",
  "SUA_CHAVE_AQUI"
);

const usuario = JSON.parse(localStorage.getItem("usuario"));

if (!usuario) window.location.href = "index.html";

document.getElementById("nomeAluno").innerText = usuario.nome;
document.getElementById("boasVindas").innerText = "Bem-vinda, " + usuario.nome;

const isAdmin = usuario.tipo === "admin";

function sair() {
  localStorage.removeItem("usuario");
  window.location.href = "index.html";
}

function disciplinas() {
  document.getElementById("conteudo").innerHTML = "<h3>📊 Disciplinas</h3><p>Em desenvolvimento</p>";
}

function concluidas() {
  document.getElementById("conteudo").innerHTML = "<h3>📚 Concluídas</h3><p>Em desenvolvimento</p>";
}

function financeiro() {
  document.getElementById("conteudo").innerHTML = "<h3>💰 Financeiro</h3><p>Em desenvolvimento</p>";
}

async function avisos() {
  try {
    const { data } = await client.from("avisos").select("*").order("data", { ascending: false });

    let html = "<h3>📢 Avisos</h3>";

    if (isAdmin) {
      html += `
        <button class="btn" onclick="abrirNovoAviso()">➕ Novo Aviso</button>
        <div id="formAviso" style="display:none;">
          <input id="tituloAviso" placeholder="Título">
          <textarea id="msgAviso" placeholder="Mensagem"></textarea>
          <button class="btn" onclick="salvarAviso()">Salvar</button>
        </div>
      `;
    }

    if (!data || data.length === 0) {
      html += "<p>Sem avisos</p>";
    } else {
      data.forEach(a => {
        html += `
          <div style="margin-top:10px; padding:10px; border-left:5px solid #2c5364; background:#f8fafc;">
            <strong>${a.titulo}</strong><br>
            <small>${a.data}</small>
            <p>${a.mensagem}</p>
          </div>
        `;
      });
    }

    document.getElementById("conteudo").innerHTML = html;

  } catch (e) {
    document.getElementById("conteudo").innerHTML = "Erro ao carregar avisos";
  }
}

function abrirNovoAviso() {
  document.getElementById("formAviso").style.display = "block";
}

async function salvarAviso() {
  const titulo = document.getElementById("tituloAviso").value;
  const mensagem = document.getElementById("msgAviso").value;

  await client.from("avisos").insert([{ titulo, mensagem }]);
  avisos();
}

async function cronograma() {
  try {
    const { data } = await client
      .from("cronograma")
      .select("*")
      .order("data");

    let html = "<h3>📅 Cronograma</h3>";

    if (!data || data.length === 0) {
      html += "<p>Nenhuma aula cadastrada</p>";
    } else {
      html += "<table>";
      html += "<tr><th>Data</th><th>Horário</th><th>Disciplina</th><th>Professor</th><th>Local</th></tr>";

      data.forEach(a => {
        html += `
          <tr>
            <td>${a.data}</td>
            <td>${a.horario}</td>
            <td>${a.disciplina}</td>
            <td>${a.professor}</td>
            <td>${a.local}</td>
          </tr>
        `;
      });

      html += "</table>";
    }

    document.getElementById("conteudo").innerHTML = html;

  } catch (e) {
    document.getElementById("conteudo").innerHTML = "Erro ao carregar cronograma";
  }
}
</script>

</body>
</html>
