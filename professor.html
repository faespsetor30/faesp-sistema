async function minhasDisciplinas(){

    .from("disciplinas_historico")

async function lancarNotas(){

  const { data: alunos } = await client
    .from("usuarios")
    .select("*")
    .eq("tipo","Aluno");

  let html = `<h3>📝 Lançar Notas</h3>`;

  (alunos || []).forEach(a=>{
    html += `
      <div style="margin-bottom:10px">
        ${a.nome}
        <input placeholder="Nota"
          onchange="salvarNota('${a.email}', this.value)">

    `;
  });

  conteudo.innerHTML = html;
}

async function salvarNota(email, nota){

}
