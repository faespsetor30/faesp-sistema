<!DOCTYPE html>
<html>

<head>

<title>FAESP - Professor</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
  margin:0;
  font-family:'Segoe UI';
  background:#eef2f7;
}

.main{
  display:flex;
  min-height:100vh;
}

.sidebar{
  width:240px;
  background:white;
  padding:20px;
  border-right:1px solid #ddd;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  align-items:center;
}

.logo{
  width:120px;
  margin-bottom:10px;
}

.menu{
  width:100%;
}

.menu button{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:none;
  border-radius:10px;
  background:#f1f5f9;
  cursor:pointer;
  text-align:left;
  transition:0.3s;
}

.menu button:hover{
  background:#2c5364;
  color:white;
}

.logout{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:black;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.content{
  flex:1;
  padding:25px;
}

.header{
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.box{
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.card-disciplina{
  background:#f8fafc;
  padding:20px;
  border-radius:12px;
  margin-bottom:15px;
  border:1px solid #e2e8f0;
}

.btn{
  background:#2c5364;
  color:white;
  border:none;
  padding:10px 14px;
  border-radius:8px;
  cursor:pointer;
}

.btn:hover{
  background:#1e3c4a;
}

input{
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
}

</style>

</head>

<body>

<div class="main">

  <div class="sidebar">

    <div style="width:100%; text-align:center;">

      <img src="logo faesp.png" class="logo">

      <h3>👨‍🏫 PROFESSOR</h3>

      <div class="menu">

        <button onclick="minhasDisciplinas()">📚 Minhas Disciplinas</button>

        <button onclick="lancarNotas()">📝 Lançar Notas</button>

        <button onclick="lancarPresenca()">📅 Presença</button>

        <button onclick="cronograma()">📆 Cronograma</button>

      </div>

    </div>

    <button class="logout" onclick="sair()">
      🚪 Sair
    </button>

  </div>

  <div class="content">

    <div class="header">
      <h2>FAESP - Painel do Professor</h2>
    </div>

    <div class="box" id="conteudo"></div>

  </div>

</div>

<script>

const client = supabase.createClient(
  "https://nzygdvixqmiltelgzzrn.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56eWdkdml4cW1pbHRlbGd6enJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDk5MjQsImV4cCI6MjA5MTY4NTkyNH0.wMaTGEgL_VCbSewnB-4BmdoA6rcGJWDsWIVaIo5dTy8"
);

let conteudo;

//////////////////////////////////////////////////
// 🚀 LOGIN PROFESSOR
//////////////////////////////////////////////////

document.addEventListener("DOMContentLoaded", () => {

  conteudo = document.getElementById("conteudo");

  const usuario = JSON.parse(localStorage.getItem("usuario"));

  // 🔒 sem login
  if (!usuario) {
    window.location.href = "index.html";
    return;
  }

  // 🔒 tipo inválido
  const tipo = String(usuario.tipo || "")
    .trim()
    .toLowerCase();

  if (tipo !== "professor") {
    window.location.href = "index.html";
    return;
  }

  console.log("Professor logado ✅");

  minhasDisciplinas();

});

//////////////////////////////////////////////////
// 🚪 SAIR
//////////////////////////////////////////////////

function sair(){

  localStorage.removeItem("usuario");
  window.location.href = "index.html";

}

//////////////////////////////////////////////////
// 📚 MINHAS DISCIPLINAS
//////////////////////////////////////////////////

async function minhasDisciplinas(){

  const usuario = JSON.parse(localStorage.getItem("usuario"));

  const { data } = await client
    .from("disciplinas_historico")
    .select("*")
    .eq("professor", usuario.nome);

  let html = `

    <div style="
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:30px;
      flex-wrap:wrap;
      gap:20px;
    ">

      <div>
        <h1 style="
          color:#1e293b;
          margin:0;
          font-size:32px;
        ">
          🎬 Painel do Professor
        </h1>

        <p style="
          color:#94a3b8;
          margin-top:5px;
        ">
          Bem-vindo, ${usuario.nome}
        </p>
      </div>

      <button onclick="sair()" style="
        background:#e50914;
        color:white;
        border:none;
        padding:12px 18px;
        border-radius:10px;
        cursor:pointer;
        font-weight:bold;
      ">
        Sair
      </button>

    </div>

    <h2 style="
  color:#1e293b;
      margin-bottom:20px;
    ">
      📚 Minhas Disciplinas
    </h2>

    <div style="
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
    ">
  `;

  (data || []).forEach(d => {

    html += `

      <div style="
    background:white;
border:1px solid #e2e8f0;;
        border-radius:18px;
        padding:20px;
        box-shadow:0 10px 25px rgba(0,0,0,0.4);
        transition:0.3s;
      ">

        <div style="
          height:120px;
          border-radius:12px;
          background:linear-gradient(135deg,#dc2626,#7f1d1d);
          display:flex;
          align-items:center;
          justify-content:center;
          font-size:40px;
          margin-bottom:15px;
        ">
          📖
        </div>

<h3 style="
  color:#1e293b;
  margin:0;
  margin-bottom:10px;
">
  ${d.disciplina}
</h3>

<p style="
  color:#64748b;
  margin-top:8px;
">
  ${d.curso}
</p>

        <div style="
          display:flex;
          gap:10px;
          margin-top:15px;
          flex-wrap:wrap;
        ">

          <button onclick="lancarNotas()" style="
            flex:1;
            padding:10px;
            border:none;
            border-radius:10px;
            background:#e50914;
            color:white;
            font-weight:bold;
            cursor:pointer;
          ">
            📝 Notas
          </button>

          <button onclick="lancarPresenca()" style="
            flex:1;
            padding:10px;
            border:none;
            border-radius:10px;
            background:#2563eb;
            color:white;
            font-weight:bold;
            cursor:pointer;
          ">
            📅 Presença
          </button>

        </div>

      </div>

    `;

  });

  html += `</div>`;

  conteudo.innerHTML = html;

}

//////////////////////////////////////////////////
// 📝 LANÇAR NOTAS
//////////////////////////////////////////////////

async function lancarNotas(){

  const { data: alunos } = await client
    .from("usuarios")
    .select("*")
    .eq("tipo","aluno");

  let html = `

    <h1 style="
      color:white;
      margin-bottom:25px;
    ">
      📝 Lançamento de Notas
    </h1>

  `;

  (alunos || []).forEach(a => {

    html += `

      <div style="
      background:white;
border:1px solid #e2e8f0;
        padding:20px;
        border-radius:14px;
        margin-bottom:15px;
        display:flex;
        justify-content:space-between;
        align-items:center;
        gap:15px;
      ">

        <div style="color:white;">
          👨‍🎓 ${a.nome}
        </div>

        <input
          placeholder="Nota"
          onchange="salvarNota('${a.email}', this.value)"
          style="
            width:120px;
            padding:10px;
            border:none;
            border-radius:8px;
            background:#1e293b;
            color:white;
          "
        >

      </div>

    `;

  });

  conteudo.innerHTML = html;

}

//////////////////////////////////////////////////
// 💾 SALVAR NOTA
//////////////////////////////////////////////////

async function salvarNota(email, nota){

  await client.from("disciplinas").insert([{
    email,
    nome: "Disciplina Professor",
    nota
  }]);

  alert("Nota salva com sucesso 🚀");

}

//////////////////////////////////////////////////
// 📅 PRESENÇA
//////////////////////////////////////////////////

async function lancarPresenca(){

  const { data: alunos } = await client
    .from("usuarios")
    .select("*")
    .eq("tipo","aluno");

  let html = `

    <h1 style="
  color:#1e293b;
      margin-bottom:25px;
    ">
      📅 Controle de Presença
    </h1>

  `;

  (alunos || []).forEach(a => {

    html += `

      <div style="
        background:#111827;
        padding:20px;
        border-radius:14px;
        margin-bottom:15px;
        display:flex;
        justify-content:space-between;
        align-items:center;
      ">

        <div style="color:white;">
          👨‍🎓 ${a.nome}
        </div>

        <div style="
          display:flex;
          gap:10px;
        ">

          <button
            onclick="marcarPresenca('${a.email}', true)"
            style="
              background:#16a34a;
              color:white;
              border:none;
              padding:10px 15px;
              border-radius:8px;
              cursor:pointer;
            "
          >
            ✔️
          </button>

          <button
            onclick="marcarPresenca('${a.email}', false)"
            style="
              background:#dc2626;
              color:white;
              border:none;
              padding:10px 15px;
              border-radius:8px;
              cursor:pointer;
            "
          >
            ❌
          </button>

        </div>

      </div>

    `;

  });

  conteudo.innerHTML = html;

}

//////////////////////////////////////////////////
// 💾 SALVAR PRESENÇA
//////////////////////////////////////////////////

async function marcarPresenca(email, presente){

  await client.from("frequencia").insert([{
    email,
    presente,
    data: new Date()
  }]);

  alert("Presença salva 🚀");

}

//////////////////////////////////////////////////
// 📅 CRONOGRAMA
//////////////////////////////////////////////////

function cronograma(){

  conteudo.innerHTML = `

    <h1 style="
      color:white;
    ">
      📅 Cronograma
    </h1>

    <div style="
      background:#111827;
      padding:25px;
      border-radius:16px;
      color:#cbd5e1;
      margin-top:20px;
    ">
      Em breve integração completa do cronograma 🎬
    </div>

  `;

}

</script>

</body>
</html>
